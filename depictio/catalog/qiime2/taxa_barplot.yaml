id: qiime2_taxa_barplot
mode: taxa-barplot
description: Relative-abundance barplot table at a taxonomic level (wide).
nf_core_url: https://github.com/nf-core/modules/tree/master/modules/nf-core/qiime2/barplot
edam_operations:
  - http://edamontology.org/operation_3460 # Taxonomic classification
edam_formats:
  - http://edamontology.org/format_3752 # CSV
find:
  path_glob: "**/qiime2/barplot/level-*.csv"
read_options: {format: csv}
file_schema:
  index: String # sample id; remaining columns are one Float64 per taxon (vary by run)
recipe: nf-core/ampliseq/taxonomy_composition.py
feeds_viz: [stacked_taxonomy]
