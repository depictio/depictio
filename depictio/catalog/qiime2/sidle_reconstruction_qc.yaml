id: qiime2_sidle_reconstruction_qc
mode: sidle-qc
description: >-
  SIDLE per-feature reconstruction confidence (multiregion route): how many
  amplified regions and k-mers support each reconstructed feature.
find: { path_glob: "**/sidle/DB/3_reconstructed/reconstruction_summary/metadata.tsv" }
recipe: nf-core/ampliseq/sidle_reconstruction_qc.py
# fixture: synthetic illustrative sample (no real multiregion/SIDLE run data in repo)
fixture: sidle_reconstruction_qc.tsv
renders_as:
  # How many regions each feature was reconstructed from — the core confidence
  # signal. One chart, three reads: feature-count distribution across region
  # support, stoplight colour by confidence tier (1=low / 2=medium / >=3=high),
  # and a secondary-axis line for mean k-mer evidence per tier (which should
  # climb with region support). Headline QC stat (% from >=2 regions) in title.
  - id: cross_region_support
    component: figure
    code: |
      g = (
          df.group_by('num_regions')
            .agg(pl.len().alias('features'), pl.col('total_kmers_mapped').mean().alias('mean_kmers'))
            .sort('num_regions')
            .to_pandas()
      )
      pct_multi = 100 * df.filter(pl.col('num_regions') >= 2).height / df.height
      tier_color = ['#59a14f' if n >= 3 else '#f0a202' if n == 2 else '#e15759' for n in g['num_regions']]
      fig = go.Figure()
      fig.add_bar(
          x=g['num_regions'], y=g['features'], text=g['features'], textposition='outside',
          marker_color=tier_color, name='Reconstructed features',
          hovertemplate='%{x} region(s)<br>%{y} features<extra></extra>',
      )
      fig.add_scatter(
          x=g['num_regions'], y=g['mean_kmers'], yaxis='y2', mode='lines+markers',
          name='Mean k-mers / feature', line=dict(color='#4e79a7', width=2), marker=dict(size=9),
          hovertemplate='%{x} region(s)<br>%{y:.0f} mean k-mers<extra></extra>',
      )
      fig.update_layout(
          title=f'Cross-region support — {pct_multi:.0f}% of features reconstructed from ≥2 regions',
          xaxis=dict(title='# regions mapped (reconstruction confidence)', dtick=1),
          yaxis=dict(title='Reconstructed features'),
          yaxis2=dict(title='Mean k-mers / feature', overlaying='y', side='right', showgrid=False),
          legend=dict(orientation='h', yanchor='bottom', y=1.02, xanchor='right', x=1),
      )
  # K-mer evidence per feature vs how many regions support it.
  - id: kmer_support
    component: figure
    code: |
      fig = px.scatter(
          df.to_pandas(),
          x='num_regions', y='total_kmers_mapped', size='mean_kmer_per_region',
          hover_data=['feature_id', 'mean_kmer_per_region', 'stdv_kmer_per_region'],
          title='K-mer support vs region coverage',
          labels={'num_regions': '# regions mapped', 'total_kmers_mapped': 'Total k-mers mapped'},
      )
      fig.update_traces(marker=dict(line=dict(width=1, color='DarkSlateGrey')))
      fig.update_xaxes(dtick=1)
  - { id: mean_regions_card, component: card, column: num_regions, aggregation: average } # mean regions / feature
  - { id: sidleqc_table, component: table }
