id: qiime2_rel_abundance
mode: rel-abundance
description: Per-sample relative-abundance table with taxonomy ranks.
nf_core_url: https://github.com/nf-core/modules/tree/master/modules/nf-core/qiime2/relativeabundancetables
find: { path_glob: "**/qiime2/rel_abundance_tables/rel-table-*.tsv" }
recipe: nf-core/ampliseq/taxonomy_rel_abundance.py
fixture: rel_abundance.tsv
renders_as:
  # wide per-rank columns (Kingdom/Phylum) → sunburst + complex_heatmap fit;
  # stacked_taxonomy needs a single long-format rank column this table lacks.
  - { id: sunburst, component: advanced_viz, kind: sunburst, roles: {abundance: rel_abundance} }
  - { id: complex_heatmap, component: advanced_viz, kind: complex_heatmap, roles: {} }
