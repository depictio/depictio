# QIIME 2 — multi-output tool → a folder. module.yaml holds the tool fields;
# each sibling *.yaml is one output. QIIME 2 has NO single nf-core module, so
# `nf_core_url` is per-output and identity cannot be derived from a meta.yml —
# this is the documented exception where identity stays declared in full here.
id: qiime2
name: QIIME 2
logo: https://raw.githubusercontent.com/qiime2/logos/master/raster/transparent/qiime2-square-400.png
description: >-
  Decentralised microbiome bioinformatics platform; emits many distinct
  artefacts depending on the plugin/subcommand invoked.
homepage: https://qiime2.org
biotools_url: https://bio.tools/qiime2
edam_topics:
  - http://edamontology.org/topic_3174 # Metagenomics
  - http://edamontology.org/topic_0080 # Sequence analysis
