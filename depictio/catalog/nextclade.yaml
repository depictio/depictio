# yaml-language-server: $schema=./catalog.schema.json
# nextclade — single-output tool → a single file.
schema_version: 1

module:
  id: nextclade
  name: Nextclade
  description: Viral genome clade assignment, mutation calling and sequence QC.
  homepage: https://clades.nextstrain.org
  nf_core_url: https://github.com/nf-core/modules/tree/master/modules/nf-core/nextclade/run
  biotools_url: https://bio.tools/nextclade
  edam_topics:
    - http://edamontology.org/topic_3305 # Public health and epidemiology

outputs:
  - id: nextclade_report
    mode: run
    description: Per-sample clade assignment + sequence QC metrics.
    edam_operations:
      - http://edamontology.org/operation_3460 # Taxonomic classification
    edam_formats:
      - http://edamontology.org/format_3752 # CSV
    find:
      path_glob: "**/nextclade/*.csv"
      required_columns: [seqName, clade]
    read_options: {format: csv, separator: ";"}
    file_schema:
      seqName: String
      clade: String
      Nextclade_pango: String
      qc.overallStatus: String
      totalSubstitutions: Int64
      totalDeletions: Int64
      totalMissing: Int64
      coverage: Float64
    recipe: nf-core/viralrecon/nextclade_results.py
    feeds_viz: []
