# yaml-language-server: $schema=./catalog.schema.json
id: nextclade
name: Nextclade
description: Viral genome clade assignment, mutation calling and sequence QC.
homepage: https://clades.nextstrain.org
biotools_url: https://bio.tools/nextclade
nf_core_url: https://github.com/nf-core/modules/tree/master/modules/nf-core/nextclade/run
edam_topics:
  - http://edamontology.org/topic_3305 # Public health and epidemiology

outputs:
  - id: nextclade_report
    mode: run
    description: Per-sample clade assignment + sequence QC (rendered as a table).
    find: { path_glob: "**/nextclade/*.csv" }
    recipe: nf-core/viralrecon/nextclade_results.py
    renders_as:
      - { component: table }
