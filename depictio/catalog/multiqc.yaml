# yaml-language-server: $schema=./catalog.schema.json
# MultiQC — single aggregate output (native parquet) → a single file.
schema_version: 1

module:
  id: multiqc
  name: MultiQC
  description: Aggregates QC results from many tools into a single report.
  homepage: https://multiqc.info
  nf_core_module: multiqc
  biotools_id: multiqc
  edam_topics:
    - topic_3168 # Sequencing

outputs:
  - id: multiqc_parquet
    mode: report
    description: MultiQC aggregated metrics + plots (native parquet, multi-table).
    edam_operations:
      - operation_3218 # Sequencing quality control
    find:
      path_glob: "**/multiqc/multiqc_data/multiqc.parquet"
      filename: "multiqc.parquet"
    read_options: {format: parquet}
    file_schema: {} # multi-table parquet, handled by the MultiQC DC type
    reshape: {kind: identity}
    feeds_viz: []
    pipelines: ["nf-core/viralrecon", "nf-core/ampliseq"]
