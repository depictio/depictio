id: mosdepth_genome_coverage
mode: genome
description: Genome-wide coverage in windows, aggregated across all samples.
edam_formats:
  - http://edamontology.org/format_3475 # TSV
find:
  path_glob: "**/mosdepth/genome/all_samples.mosdepth.coverage.tsv"
read_options: {format: tsv}
file_schema:
  chrom: String
  start: Int64
  end: Int64
  coverage: Float64
  sample: String
recipe: nf-core/viralrecon/coverage_track_canonical.py
feeds_viz: [coverage_track]
role_mapping:
  coverage_track: {chromosome: chrom, position: start, value: coverage}
