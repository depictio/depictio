# QIIME 2 — community bio-catalog entry
# ============================================================================
# The headline "tool with many running modes" case. QIIME 2 is not one output
# but a platform: each subcommand (diversity, composition/ancombc, taxa
# barplot, …) emits a differently-shaped artefact in a different location.
# We model that the way nf-core models a module's many output channels and the
# way bio.tools models a tool's many EDAM operations: ONE tool, MANY outputs,
# each tagged with its `mode`, its file pattern, the reshape it needs, and the
# visualisation(s) it ultimately feeds.
#
# Paths/recipes below are grounded in the bundled nf-core/ampliseq seed
# project (depictio/projects/nf-core/ampliseq/recipes/).
# ============================================================================
schema_version: 1

tool:
  id: qiime2
  name: QIIME 2
  description: >-
    Decentralised, community-developed microbiome bioinformatics platform.
    Emits many distinct artefacts depending on the plugin/subcommand invoked.
  homepage: https://qiime2.org
  biotools_id: qiime2
  edam_topics:
    - topic_3174 # Metagenomics
    - topic_0080 # Sequence analysis

outputs:
  # -- mode: diversity (alpha) -------------------------------------------------
  # Per-sample Faith PD vector. Fingerprintable at the raw stage; a recipe
  # cleans the QIIME2 metadata sidecar into a tidy per-sample table.
  - id: qiime2_alpha_faith_pd
    mode: diversity
    description: Faith's phylogenetic diversity vector (per-sample alpha diversity).
    nf_core_module: qiime2/diversitycore
    edam_operations:
      - operation_3200 # Community profiling
    edam_formats:
      - format_3475 # TSV
    file_patterns:
      - "qiime2/diversity/alpha_diversity/faith_pd_vector/metadata.tsv"
    read_options:
      format: tsv
    reshape:
      kind: recipe
      recipe: nf-core/ampliseq/alpha_diversity.py
    fingerprint:
      required_columns: [id, faith_pd]
    # No single advanced-viz kind for a lone alpha metric yet — surfaced as a
    # provenance/discovery badge only (like alpha_diversity_wide in producers.py).
    feeds_viz: []

  # -- mode: composition (ANCOM-BC) -------------------------------------------
  # Per-contrast differential-abundance slices. The raw lfc/p/q/se/w slice
  # files only become bindable after a recipe joins + melts them, so there is
  # no reliable raw-stage fingerprint — the recipe is the bridge.
  - id: qiime2_ancombc_differentials
    mode: composition/ancombc
    description: ANCOM-BC differential-abundance results (log-fold-change + q-value per contrast).
    nf_core_module: qiime2/ancombc
    edam_operations:
      - operation_3223 # Differential expression / abundance analysis
    edam_formats:
      - format_3752 # CSV
    file_patterns:
      - "qiime2/ancombc/differentials/*/lfc_slice.csv"
      - "qiime2/ancombc/differentials/*/q_val_slice.csv"
    read_options:
      format: csv
    reshape:
      # Join the per-statistic slice files + melt across contrast columns into
      # the long (id × contrast × lfc × q_val) shape the volcano/da_barplot
      # canonical schemas expect.
      kind: recipe
      recipe: nf-core/ampliseq/ancombc.py
    fingerprint: null # realised post-recipe (see ancombc_results_joined producer)
    feeds_viz:
      - volcano
      - da_barplot

  # -- mode: taxa barplot ------------------------------------------------------
  # Wide relative-abundance table (one column per taxon at a given rank). Needs
  # a melt to long form before it can drive a stacked-taxonomy / sunburst.
  - id: qiime2_taxa_barplot
    mode: taxa-barplot
    description: Relative-abundance barplot table at a given taxonomic level (wide).
    nf_core_module: qiime2/barplot
    edam_operations:
      - operation_3460 # Taxonomic classification
    edam_formats:
      - format_3752 # CSV
    file_patterns:
      - "qiime2/barplot/level-*.csv"
    read_options:
      format: csv
    reshape:
      kind: melt
      id_vars: [index]
      variable_name: taxon
      value_name: abundance
    fingerprint: null # taxon column names vary by sample set; melt then bind
    feeds_viz:
      - stacked_taxonomy
      - sunburst
    role_mapping:
      stacked_taxonomy:
        sample_id: index
        taxon: taxon
        abundance: abundance
      sunburst:
        abundance: abundance
