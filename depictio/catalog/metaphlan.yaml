# yaml-language-server: $schema=./catalog.schema.json
# MetaPhlAn — no recipe: the raw profile is bindable, so `columns` is declared here.
id: metaphlan
name: MetaPhlAn
description: Species-level microbial community profiling from metagenomic shotgun reads.
homepage: https://github.com/biobakery/MetaPhlAn
biotools_url: https://bio.tools/metaphlan
nf_core_url: https://github.com/nf-core/modules/tree/master/modules/nf-core/metaphlan/metaphlan
edam_topics:
  - http://edamontology.org/topic_3174 # Metagenomics

outputs:
  - id: metaphlan_profile
    mode: profile
    description: Per-sample taxonomic relative-abundance profile.
    find: { filename: "*_profile.txt" }
    # no recipe → bindable as-is; declare the columns so roles can bind:
    columns:
      clade_name: String
      NCBI_tax_id: String
      relative_abundance: Float64
      additional_species: String
    renders_as:
      - { component: advanced_viz, kind: stacked_taxonomy, roles: {taxon: clade_name, abundance: relative_abundance} }
      - { component: advanced_viz, kind: sunburst, roles: {abundance: relative_abundance} }
