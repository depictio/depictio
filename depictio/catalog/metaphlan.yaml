# yaml-language-server: $schema=./catalog.schema.json
# MetaPhlAn — single-output tool → a single file.
schema_version: 1

module:
  id: metaphlan
  name: MetaPhlAn
  description: Species-level microbial community profiling from metagenomic shotgun reads.
  homepage: https://github.com/biobakery/MetaPhlAn
  nf_core_module: metaphlan/metaphlan
  biotools_id: metaphlan
  edam_topics:
    - topic_3174 # Metagenomics

outputs:
  - id: metaphlan_profile
    mode: profile
    description: Per-sample taxonomic relative-abundance profile.
    edam_operations:
      - operation_3460 # Taxonomic classification
    edam_formats:
      - format_3475 # TSV
    find:
      filename: "*_profile.txt"
      required_columns: [clade_name, NCBI_tax_id]
    read_options: {format: tsv}
    file_schema:
      clade_name: String
      NCBI_tax_id: String
      relative_abundance: Float64
      additional_species: String
    reshape: {kind: identity} # already long; depictio adds sample_id from the filename
    feeds_viz: [stacked_taxonomy, sunburst]
    role_mapping:
      stacked_taxonomy: {taxon: clade_name, abundance: relative_abundance}
      sunburst: {abundance: relative_abundance}
    pipelines: []
