# yaml-language-server: $schema=./catalog.schema.json
# iVar — single-output tool (one flat file = tool fields + outputs).
id: ivar
name: iVar
description: Reference-based variant calling for viral amplicon sequencing.
homepage: https://andersen-lab.github.io/ivar/html/
biotools_url: https://bio.tools/ivar
nf_core_url: https://github.com/nf-core/modules/tree/master/modules/nf-core/ivar/variants
edam_topics:
  - http://edamontology.org/topic_0199 # Genetic variation

outputs:
  - id: ivar_variants_long
    mode: variants
    description: Per-sample annotated variant calls (long table).
    find: { filename: "variants_long_table.csv" } # raw nf-core file
    recipe: nf-core/viralrecon/variants_long.py # owns the output columns
    fixture: nf-core/viralrecon/3.0.0/variants_long.tsv # bundled bindable sample
    renders_as:
      - { component: advanced_viz, kind: lollipop, roles: {feature_id: GENE, position: POS, category: EFFECT} }
      - { component: advanced_viz, kind: oncoplot, roles: {sample_id: sample, gene: GENE, mutation_type: EFFECT} }
      - { component: advanced_viz, kind: manhattan, roles: {chr: CHROM, pos: POS, score: AF} }
      - { component: figure, visu_type: histogram, dict_kwargs: {x: AF, color: EFFECT} } # allele-frequency distribution
