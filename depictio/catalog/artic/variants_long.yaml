id: artic_variants_long
mode: variants
description: Per-sample annotated nanopore variant calls (clair3/medaka, long table).
# Nanopore variants land under artic_minion/ as per-sample pass VCFs (clair3).
find: { path_glob: "**/artic_minion/**/*.pass.vcf.gz" } # raw nf-core file
recipe: artic/variants_long.py # owns the output columns
fixture: variants_long.tsv # co-located bindable sample
renders_as:
  - { id: lollipop, component: advanced_viz, kind: lollipop, roles: {feature_id: GENE, position: POS, category: EFFECT} }
  - { id: oncoplot, component: advanced_viz, kind: oncoplot, roles: {sample_id: sample, gene: GENE, mutation_type: EFFECT} }
  - { id: manhattan, component: advanced_viz, kind: manhattan, roles: {chr: CHROM, pos: POS, score: AF} }
  # Variant counts per gene, stacked by functional class.
  - id: variants_by_gene
    component: figure
    code: |
      df_modified = df.group_by(['GENE', 'FUNCLASS']).agg(pl.count().alias('count')).sort('count', descending=True)
      fig = px.bar(df_modified.to_pandas(), x='GENE', y='count', color='FUNCLASS',
          labels={'GENE': 'Gene', 'count': 'Number of Variants', 'FUNCLASS': 'Functional Class'},
          barmode='stack')
      fig.update_layout(xaxis={'categoryorder': 'total descending'})
      fig.update_xaxes(tickangle=-45)
  # Variant burden per sample, stacked by functional class.
  - id: variants_per_sample
    component: figure
    code: |
      df_modified = df.group_by(['sample', 'FUNCLASS']).agg(pl.count().alias('count')).sort('sample')
      fig = px.bar(df_modified.to_pandas(), x='sample', y='count', color='FUNCLASS',
          labels={'sample': 'Sample', 'count': 'Number of Variants', 'FUNCLASS': 'Functional Class'},
          barmode='stack')
      fig.update_xaxes(tickangle=-45, tickfont={'size': 9})
  - { id: af_histogram, component: figure, visu_type: histogram, dict_kwargs: {x: AF, color: EFFECT} } # allele-frequency distribution
  - { id: variant_count, component: card, column: POS, aggregation: count } # total variant calls
  - { id: distinct_positions, component: card, column: POS, aggregation: nunique } # distinct genomic positions
  - { id: samples_with_variants, component: card, column: sample, aggregation: nunique } # samples carrying calls
  - { id: unique_aa_changes, component: card, column: AA, aggregation: nunique } # distinct amino-acid changes
  - { id: sample_filter, component: interactive, interactive_component_type: MultiSelect, column: sample } # filter by sample
  - { id: gene_filter, component: interactive, interactive_component_type: MultiSelect, column: GENE } # filter by gene
  - { id: effect_filter, component: interactive, interactive_component_type: MultiSelect, column: EFFECT } # filter by variant effect
  - { id: af_slider, component: interactive, interactive_component_type: RangeSlider, column: AF } # filter by allele frequency
  - { id: table, component: table }
