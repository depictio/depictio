        column_type: int64
        display:
            icon_name: mdi:dna
            icon_color: '#FF9800'
            title_color: '#FF9800'
            title_font_size: xl
            value_font_size: xl
        tag: card-viral-total-variants-j0k1l2
        layout:
            x: 6
            y: 0
            w: 2
            h: 2
        title: Total Variants
