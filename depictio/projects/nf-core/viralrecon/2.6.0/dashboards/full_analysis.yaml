            w: 1
            h: 3
        title: Variant Effect
    -   component_type: interactive
        workflow_tag: viralrecon
        data_collection_tag: nextclade_results
        interactive_component_type: MultiSelect
        column_name: qc_overallStatus
        column_type: object
        display:
            title_size: md
            custom_color: '#4CAF50'
            icon_name: mdi:check-circle
        tag: interactive-viral-qc-status-filter-y5z6a7
        index: viral-qc-status-filter
        layout:
            x: 0
            y: 12
            w: 1
            h: 2
        title: QC Status
    -   component_type: interactive
        workflow_tag: viralrecon
        data_collection_tag: summary_metrics
        interactive_component_type: RangeSlider
        column_name: coverage_median
        column_type: float64
        display:
            title_size: md
            custom_color: '#2196F3'
            icon_name: mdi:chart-line
        tag: interactive-viral-coverage-slider-b8c9d0
        index: viral-coverage-slider
        layout:
            x: 0
            y: 14
            w: 1
            h: 3
        title: Coverage Range
    -   component_type: interactive
        workflow_tag: viralrecon
        data_collection_tag: variants_long
        interactive_component_type: RangeSlider
        column_name: AF
        column_type: float64
        display:
            title_size: md
            custom_color: '#F44336'
            icon_name: mdi:percent
        tag: interactive-viral-af-slider-e1f2g3
        index: viral-af-slider
        layout:
            x: 0
            y: 17
            w: 1
            h: 3
        title: Allele Frequency
    # --- Figures (main panel) ---
    # Lineage Distribution (Pangolin)
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: pangolin_lineages
        visu_type: bar
        figure_params:
            x: lineage
            y: count
            color: lineage
            title: Pangolin Lineage Distribution
            labels:
                lineage: Lineage
                count: Number of Samples
        mode: code
        code_content: "lineage_counts = df.group_by('lineage').agg(pl.count().alias('count')).sort('count',\
            \ descending=True)\nfig = px.bar(\n    lineage_counts.to_pandas(),\n\
            \    x='lineage', y='count', color='lineage',\n    title='Pangolin Lineage\
            \ Distribution',\n    labels={'lineage': 'Lineage', 'count': 'Number\
            \ of Samples'}\n)\nfig.update_layout(xaxis={'categoryorder': 'total descending'},\
            \ showlegend=False)\nfig.update_xaxes(tickangle=-45)"
        selection_enabled: false
        tag: figure-viral-lineage-dist-h4i5j6
        layout:
            x: 0
            y: 2
            w: 4
            h: 5
    # Nextclade QC Status Overview
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: nextclade_results
        visu_type: bar
        figure_params:
            x: qc_overallStatus
            y: count
            color: qc_overallStatus
            title: Nextclade QC Status Overview
        mode: code
        code_content: "qc_counts = df.group_by('qc_overallStatus').agg(pl.count().alias('count')).sort('count',\
            \ descending=True)\ncolor_map = {'good': '#4CAF50', 'mediocre': '#FF9800',\
            \ 'bad': '#F44336'}\nfig = px.bar(\n    qc_counts.to_pandas(),\n    x='qc_overallStatus',\
            \ y='count',\n    color='qc_overallStatus',\n    color_discrete_map=color_map,\n\
            \    title='Nextclade QC Status Overview',\n    labels={'qc_overallStatus':\
            \ 'QC Status', 'count': 'Number of Samples'}\n)\nfig.update_layout(showlegend=False)"
        selection_enabled: false
        tag: figure-viral-nextclade-qc-k7l8m9
        layout:
            x: 4
            y: 2
            w: 4
            h: 5
    # Variant Landscape: AF vs Genome Position
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: variants_long
        visu_type: scatter
        figure_params:
            x: POS
            y: AF
            color: EFFECT
            hover_data:
            - sample
            - GENE
            - AA
            - mutation_label
            title: Variant Landscape - Allele Frequency vs Genome Position
            labels:
                POS: Genome Position
                AF: Allele Frequency
                EFFECT: Variant Effect
        mode: code
        code_content: "fig = px.scatter(\n    df.to_pandas(),\n    x='POS', y='AF',\
            \ color='EFFECT',\n    hover_data=['sample', 'GENE', 'AA', 'mutation_label'],\n\
            \    title='Variant Landscape - Allele Frequency vs Genome Position',\n\
            \    labels={'POS': 'Genome Position', 'AF': 'Allele Frequency', 'EFFECT':\
            \ 'Variant Effect'},\n    opacity=0.7\n)\nfig.update_traces(marker=dict(size=6))\n\
            fig.update_layout(xaxis_title='Genome Position (nt)', yaxis_title='Allele\
            \ Frequency')"
        selection_enabled: false
        tag: figure-viral-variant-landscape-n0o1p2
        layout:
            x: 0
            y: 7
            w: 8
            h: 6
    # Mutations per Gene (bar chart)
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: variants_long
        visu_type: bar
        figure_params:
            x: GENE
            y: count
            color: FUNCLASS
            title: Variant Count by Gene and Functional Class
            labels:
                GENE: Gene
                count: Number of Variants
                FUNCLASS: Functional Class
        mode: code
        code_content: "gene_counts = df.group_by(['GENE', 'FUNCLASS']).agg(pl.count().alias('count')).sort('count',\
            \ descending=True)\nfig = px.bar(\n    gene_counts.to_pandas(),\n    x='GENE',\
            \ y='count', color='FUNCLASS',\n    title='Variant Count by Gene and Functional\
            \ Class',\n    labels={'GENE': 'Gene', 'count': 'Number of Variants',\
            \ 'FUNCLASS': 'Functional Class'},\n    barmode='stack'\n)\nfig.update_layout(xaxis={'categoryorder':\
            \ 'total descending'})\nfig.update_xaxes(tickangle=-45)"
        selection_enabled: false
        tag: figure-viral-mutations-by-gene-q3r4s5
        layout:
            x: 0
            y: 13
            w: 4
            h: 5
    # Coverage vs Variants Scatter
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: summary_metrics
        visu_type: scatter
        figure_params:
            x: coverage_median
            y: num_variants_total
            color: lineage
            hover_data:
            - sample
            - pct_genome_covered_10x
            title: Coverage vs Total Variants by Lineage
            labels:
                coverage_median: Median Coverage Depth
                num_variants_total: Total Variants
                lineage: Lineage
        mode: code
        code_content: "fig = px.scatter(\n    df.to_pandas(),\n    x='coverage_median',\
            \ y='num_variants_total',\n    color='lineage',\n    hover_data=['sample',\
            \ 'pct_genome_covered_10x'],\n    title='Coverage vs Total Variants by\
            \ Lineage',\n    labels={'coverage_median': 'Median Coverage Depth', 'num_variants_total':\
            \ 'Total Variants', 'lineage': 'Lineage'},\n    size_max=12\n)\nfig.update_traces(marker=dict(size=10,\
            \ line=dict(width=1, color='DarkSlateGrey')))"
        selection_enabled: false
        tag: figure-viral-coverage-vs-variants-t6u7v8
        layout:
            x: 4
            y: 13
            w: 4
            h: 5
    # Genome Coverage Bar Chart (per sample)
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: summary_metrics
        visu_type: bar
        figure_params:
            x: sample
            y: pct_genome_covered_10x
            color: lineage
            title: Genome Coverage per Sample (>= 10x Depth)
            labels:
                sample: Sample
                pct_genome_covered_10x: "% Genome >= 10x"
                lineage: Lineage
        mode: code
        code_content: "df_sorted = df.sort('pct_genome_covered_10x', descending=True)\n\
            fig = px.bar(\n    df_sorted.to_pandas(),\n    x='sample', y='pct_genome_covered_10x',\n\
            \    color='lineage',\n    title='Genome Coverage per Sample (>= 10x\
            \ Depth)',\n    labels={'sample': 'Sample', 'pct_genome_covered_10x':\
            \ '% Genome >= 10x', 'lineage': 'Lineage'}\n)\nfig.add_hline(y=80, line_dash='dash',\
            \ line_color='red', annotation_text='80% threshold')\nfig.update_xaxes(tickangle=-45,\
            \ tickfont={'size': 9})"
        selection_enabled: false
        tag: figure-viral-genome-coverage-w9x0y1
        layout:
            x: 0
            y: 18
            w: 8
            h: 5
    # Nextclade Substitutions vs Deletions
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: nextclade_results
        visu_type: scatter
        figure_params:
            x: totalSubstitutions
            y: totalDeletions
            color: clade
            hover_data:
            - sample
            - qc_overallStatus
            - coverage
            title: Nextclade - Substitutions vs Deletions by Clade
            labels:
                totalSubstitutions: Total Substitutions
                totalDeletions: Total Deletions
                clade: Clade
        mode: code
        code_content: "fig = px.scatter(\n    df.to_pandas(),\n    x='totalSubstitutions',\
            \ y='totalDeletions',\n    color='clade',\n    hover_data=['sample', 'qc_overallStatus',\
            \ 'coverage'],\n    title='Nextclade - Substitutions vs Deletions by\
            \ Clade',\n    labels={'totalSubstitutions': 'Total Substitutions', 'totalDeletions':\
            \ 'Total Deletions', 'clade': 'Clade'},\n    opacity=0.8\n)\nfig.update_traces(marker=dict(size=10,\
            \ line=dict(width=1, color='DarkSlateGrey')))"
        selection_enabled: false
        tag: figure-viral-nextclade-scatter-z2a3b4
        layout:
            x: 0
            y: 23
            w: 4
            h: 5
    # Variant Effect Summary (pie chart)
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: variants_long
        visu_type: pie
        figure_params:
            names: FUNCLASS
            values: count
            title: Variant Functional Class Distribution
        mode: code
        code_content: "funclass_counts = df.group_by('FUNCLASS').agg(pl.count().alias('count'))\n\
            fig = px.pie(\n    funclass_counts.to_pandas(),\n    names='FUNCLASS',\
            \ values='count',\n    title='Variant Functional Class Distribution',\n\
            \    hole=0.3\n)\nfig.update_traces(textposition='inside', textinfo='percent+label')"
        selection_enabled: false
        tag: figure-viral-funclass-pie-c5d6e7
        layout:
            x: 4
            y: 23
            w: 4
            h: 5
    # --- Data Tables ---
    -   component_type: table
        workflow_tag: viralrecon
        data_collection_tag: summary_metrics
        row_selection_enabled: false
        tag: table-viral-summary-metrics-f8g9h0
        layout:
            x: 0
            y: 28
            w: 8
            h: 6
    -   component_type: table
        workflow_tag: viralrecon
        data_collection_tag: pangolin_lineages
        row_selection_enabled: false
        tag: table-viral-pangolin-i1j2k3
        layout:
            x: 0
            y: 34
            w: 8
            h: 6
    -   component_type: table
        workflow_tag: viralrecon
        data_collection_tag: variants_long
        row_selection_enabled: false
        tag: table-viral-variants-l4m5n6
        layout:
            x: 0
            y: 40
            w: 8
            h: 6
