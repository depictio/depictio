version: 1
main_dashboard:
  title: nf-core/viralrecon
  subtitle: MultiQC Analysis - Sequencing, Alignment & Variant Calling QC
  project_tag: Viralrecon Viral Genome Analysis
  main_tab_name: MultiQC
  tab_icon: /assets/images/logos/multiqc.png
  tab_icon_color: orange
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 746b0f3c1e4a2d7f8e5b9ca2
  components:
  - component_type: text
    tag: text-main-intro
    title: MultiQC Pipeline QC Overview
    order: 3
    alignment: left
    body: Per-sample QC metrics aggregated from every stage of the nf-core/viralrecon pipeline. Start
      here to triage which samples to drill into. The tiles are grouped into **Read QC** (fastp + Kraken2),
      **Alignment & Coverage** (bowtie2 + mosdepth), **Variants & Assembly** (iVar / snpEff / bcftools
      / QUAST), then **FastQC** sanity checks at the bottom.
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    layout:
      x: 0
      y: 0
      w: 8
      h: 1
  # FLAG (bespoke): bound to the raw multiqc_data parquet (not a single nf-core
  # module output) so the MultiQC tab keeps a working sample filter even on routes
  # where summary_metrics is pruned (e.g. nanopore/ARTIC). The picked sample is
  # expanded to its per-report variants by _resolve_multiqc_sample_filter.
  - component_type: interactive
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    interactive_component_type: MultiSelect
    column_name: sample
    column_type: object
    display:
      title_size: md
      custom_color: '#45B8AC'
      icon_name: mdi:flask
    tag: interactive-mqc-sample-filter-a1b2c3
    index: mqc-sample-filter
    layout:
      x: 0
      y: 2
      w: 1
      h: 2
    title: Sample ID
  - use: multiqc/lineage_filter
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    column_type: object
    display:
      title_size: md
      custom_color: '#E74C3C'
      icon_name: mdi:virus
    tag: interactive-mqc-lineage-filter-d4e5f6
    index: mqc-lineage-filter
    layout:
      x: 0
      y: 4
      w: 1
      h: 2
    title: Lineage
  # FLAG (bespoke): MultiQC's cross-module "General Statistics" aggregate is not
  # a single nf-core module output, so it has no catalog render to `use:`.
  - component_type: multiqc
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_module: general_stats
    selected_plot: general_stats
    tag: multiqc-general-stats-table-v1a2b3
    title: MultiQC general statistics
    description: Per-sample KPIs across the full pipeline. The QC triage entry point.
    title_size: h3
    layout:
      x: 0
      y: 1
      w: 8
      h: 4
  - use: multiqc/fastp
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Filtered Reads
    tag: multiqc-fastp-filtered-reads-c4d5e6
    title: fastp - filtered reads
    description: Reads retained vs filtered before alignment.
    title_size: h3
    layout:
      x: 0
      y: 5
      w: 4
      h: 4
  - use: multiqc/kraken
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Top taxa
    tag: multiqc-kraken-taxa-d4e5f6
    title: Kraken2 - top taxa
    description: Off-target reads = contamination / low viral load.
    title_size: h3
    layout:
      x: 4
      y: 5
      w: 4
      h: 4
  - use: multiqc/bowtie2
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Paired-end alignments
    tag: multiqc-bowtie2-alignment-f7g8h9
    title: bowtie2 - paired-end alignment
    description: Uniquely / multi-mapped / unmapped read fractions.
    title_size: h3
    layout:
      x: 0
      y: 9
      w: 4
      h: 4
  - use: multiqc/mosdepth
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Cumulative coverage distribution
    tag: multiqc-mosdepth-coverage-l3m4n5
    title: mosdepth - cumulative coverage
    description: Genome fraction covered at >= X depth, per sample.
    title_size: h3
    layout:
      x: 4
      y: 9
      w: 4
      h: 4
  # FLAG (bespoke): viralrecon's MultiQC anchors this under `ivar_variants`,
  # which differs from the catalog `ivar` module section — left inline.
  - component_type: multiqc
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_module: ivar_variants
    selected_plot: ivar_variants-section
    tag: multiqc-ivar-variants-o6p7q8
    title: iVar - variant counts
    description: Raw iVar variant calls per sample.
    title_size: h3
    layout:
      x: 0
      y: 13
      w: 4
      h: 4
  - use: multiqc/snpeff
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Variant Effects by Impact
    tag: multiqc-snpeff-effects-r9s0t1
    title: snpEff - effects by impact
    description: HIGH / MODERATE / LOW / MODIFIER per sample.
    title_size: h3
    layout:
      x: 4
      y: 13
      w: 4
      h: 4
  - use: multiqc/bcftools
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Variant Substitution Types
    tag: multiqc-bcftools-subtypes-j0k1l2
    title: bcftools - substitution types
    description: Transitions vs transversions per sample.
    title_size: h3
    layout:
      x: 0
      y: 17
      w: 4
      h: 4
  # FLAG (bespoke): viralrecon's MultiQC anchors this under `quast_variants`,
  # which differs from the catalog `quast` module section — left inline.
  - component_type: multiqc
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_module: quast_variants
    selected_plot: Number of Contigs
    tag: multiqc-quast-contigs-u2v3w4
    title: QUAST - number of contigs
    description: Assembly contiguity per sample.
    title_size: h3
    layout:
      x: 4
      y: 17
      w: 4
      h: 4
  - use: multiqc/fastqc
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Sequence Quality Histograms
    tag: multiqc-fastqc-quality-d4e5f6
    title: FastQC - sequence quality histograms
    description: Per-position mean quality across all samples - primary read-QC signal.
    title_size: h3
    layout:
      x: 0
      y: 21
      w: 8
      h: 5
  - use: multiqc/fastqc
    workflow_tag: viralrecon
    data_collection_tag: multiqc_data
    selected_plot: Status Checks
    tag: multiqc-fastqc-status-checks-a1b2c3
    title: FastQC - status checks
    description: Pass/Warn/Fail status per FastQC module per sample. Red columns flag systematic library
      / sequencing issues.
    title_size: h3
    layout:
      x: 0
      y: 26
      w: 8
      h: 5
tabs:
- title: Coverage & Depth
  subtitle: Amplicon and Genome Coverage (mosdepth)
  tab_order: 1
  tab_icon: mdi:chart-areaspline
  tab_icon_color: teal
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 746b0f3c1e4a2d7f8e5b9cb5
  components:
  - component_type: text
    tag: text-coverage-and-depth-intro
    title: Coverage & Depth - Amplicon and Genome Coverage
    order: 3
    alignment: left
    body: Did each sample's amplicons get adequate sequencing depth? The **genome track** shows per-position
      coverage (log y-axis); look for systematic drop-outs across samples. The **clustered amplicon heatmap**
      flags amplicons that consistently fail (dark rows). The tables below carry the underlying numbers
      for ad-hoc inspection.
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    layout:
      x: 0
      y: 0
      w: 8
      h: 1
  - use: mosdepth/amplicons_tracked
    workflow_tag: viralrecon
    data_collection_tag: mosdepth_amplicon_coverage
    column_type: object
    config:
      secondary_layout: coverage
      coverage_max: 99
    display:
      icon_name: mdi:dna
      icon_color: '#FF9800'
      title_color: '#FF9800'
      title_font_size: xl
      value_font_size: xl
    tag: card-cov-amplicons-d4e5f6
    layout:
      x: 0
      y: 1
      w: 2
      h: 2
    title: Amplicons Tracked
  - use: mosdepth/mean_coverage
    workflow_tag: viralrecon
    data_collection_tag: mosdepth_amplicon_coverage
    column_type: float64
    config:
      aggregations:
      - box_plot_stats
      secondary_layout: box_plot
    icon_name: mdi:chart-areaspline
    icon_color: '#009688'
    tag: card-cov-amplicon-stats-g7h8i9
    layout:
      x: 2
      y: 1
      w: 3
      h: 2
    title: Amplicon Coverage
  # FLAG (bespoke): binds the raw per-window genome-coverage DC (column `coverage`);
  # the catalog `mosdepth/genome_coverage` output is the canonical track (`value`).
  - component_type: card
    workflow_tag: viralrecon
    data_collection_tag: mosdepth_genome_coverage
    aggregation: average
    aggregations:
    - box_plot_stats
    column_name: coverage
    column_type: float64
    secondary_layout: box_plot
    icon_name: mdi:chart-line
    icon_color: '#2196F3'
    tag: card-cov-genome-stats-j0k1l2
    layout:
      x: 5
      y: 1
      w: 3
      h: 2
    title: Genome Coverage
  # Bound to mosdepth_genome_coverage (present on every coverage-bearing run,
  # incl. genome-only/non-amplicon runs like HIV) rather than the amplicon DC,
  # which is pruned on genome-only runs and would leave the Coverage tab with no
  # filter. Genome coverage is per-sample too, so sample-slicing stays meaningful.
  - use: mosdepth/sample_filter
    workflow_tag: viralrecon
    data_collection_tag: mosdepth_genome_coverage
    column_type: object
    display:
      title_size: md
      custom_color: '#45B8AC'
      icon_name: mdi:flask
    tag: interactive-cov-sample-filter-m3n4o5
    index: cov-sample-filter
    layout:
      x: 0
      y: 2
      w: 1
      h: 2
    title: Sample ID
  - component_type: advanced_viz
    workflow_tag: viralrecon
    use: mosdepth/coverage_track_genome
    data_collection_tag: genome_coverage_track
    config:
      end_col: end
      sample_col: sample
      y_scale: linear
      smoothing_window: 5
      show_annotation_lane: false
    tag: adv-cov-genome-track-p6q7r8
    index: adv-cov-genome-track
    title: Genome coverage track per sample
    description: Per-position genome coverage (log y-axis), one sub-track per sample. Drop-outs stand
      out as gaps.
    title_size: h3
    layout:
      x: 0
      y: 3
      w: 8
      h: 6
  - component_type: advanced_viz
    workflow_tag: viralrecon
    data_collection_tag: amplicon_coverage_matrix
    use: mosdepth/complex_heatmap
    config:
      viz_kind: complex_heatmap
      index_column: sample
      cluster_rows: true
      cluster_cols: false
      normalize: none
      colorscale: Viridis
    tag: adv-cov-heatmap-v2w3x4
    index: adv-cov-heatmap
    title: Amplicon coverage heatmap (clustered)
    description: Log10-scaled per-amplicon coverage; rows clustered. Dark = dropout, bright = high coverage.
    title_size: h3
    layout:
      x: 0
      y: 9
      w: 8
      h: 6
  - use: mosdepth/table
    workflow_tag: viralrecon
    data_collection_tag: mosdepth_amplicon_coverage
    row_selection_enabled: false
    tag: table-cov-amplicon-y5z6a7
    title: Amplicon coverage table
    description: Per-amplicon median coverage depth for each sample.
    title_size: h3
    layout:
      x: 0
      y: 15
      w: 8
      h: 4
- title: Lineage & Clustering
  subtitle: Pangolin / Nextclade typing + classification funnel + variant-profile PCA
  tab_order: 2
  tab_icon: mdi:virus
  tab_icon_color: red
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 746b0f3c1e4a2d7f8e5b9cb3
  components:
  - component_type: text
    tag: text-lineage-and-clustering-intro
    title: Lineage & Clustering - Pangolin, Nextclade & Variant-Profile PCA
    order: 3
    alignment: left
    body: Three complementary views of viral lineage. **Pangolin / Nextclade bar charts** show classification
      frequencies. The **Sankey** traces each sample's path QC -> Pangolin lineage -> Nextclade clade;
      mismatched calls show up as crossing ribbons. The **PCA** clusters samples by their mutation profile
      - points are coloured by lineage, so well-defined lineage groups appear as distinct clusters.
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    layout:
      x: 0
      y: 0
      w: 8
      h: 1
  - use: pangolin/lineage_count
    workflow_tag: viralrecon
    data_collection_tag: pangolin_lineages
    column_type: object
    config:
      secondary_layout: top_n
      breakdown_col: lineage
      top_n_count: 3
    display:
      icon_name: mdi:virus
      icon_color: '#E74C3C'
      title_color: '#E74C3C'
      title_font_size: xl
      value_font_size: xl
    tag: card-lin-unique-lineages-d4e5f6
    layout:
      x: 0
      y: 1
      w: 4
      h: 2
    title: Unique Lineages
  - use: nextclade/clade_count
    workflow_tag: viralrecon
    data_collection_tag: nextclade_results
    column_type: object
    config:
      secondary_layout: top_n
      breakdown_col: clade
      top_n_count: 3
    display:
      icon_name: mdi:family-tree
      icon_color: '#9C27B0'
      title_color: '#9C27B0'
      title_font_size: xl
      value_font_size: xl
    tag: card-lin-unique-clades-g7h8i9
    layout:
      x: 4
      y: 1
      w: 4
      h: 2
    title: Unique Clades
  - use: multiqc/sample_filter
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    column_type: object
    display:
      title_size: md
      custom_color: '#45B8AC'
      icon_name: mdi:flask
    tag: interactive-lin-sample-filter-m3n4o5
    index: lin-sample-filter
    layout:
      x: 0
      y: 2
      w: 1
      h: 2
    title: Sample ID
  - use: pangolin/lineage_filter
    workflow_tag: viralrecon
    data_collection_tag: pangolin_lineages
    column_type: object
    display:
      title_size: md
      custom_color: '#E74C3C'
      icon_name: mdi:virus
    tag: interactive-lin-lineage-filter-p6q7r8
    index: lin-lineage-filter
    layout:
      x: 0
      y: 4
      w: 1
      h: 2
    title: Lineage
  - use: nextclade/clade_filter
    workflow_tag: viralrecon
    data_collection_tag: nextclade_results
    column_type: object
    display:
      title_size: md
      custom_color: '#9C27B0'
      icon_name: mdi:family-tree
    tag: interactive-lin-clade-filter-s9t0u1
    index: lin-clade-filter
    layout:
      x: 0
      y: 6
      w: 1
      h: 2
    title: Clade
  - use: pangolin/lineage_barplot
    workflow_tag: viralrecon
    data_collection_tag: pangolin_lineages
    selection_enabled: false
    tag: figure-lin-lineage-dist-b8c9d0
    title: Pangolin lineage distribution
    description: Number of samples per PANGO lineage, sorted by frequency.
    title_size: h3
    layout:
      x: 0
      y: 3
      w: 4
      h: 4
  - use: nextclade/clade_barplot
    workflow_tag: viralrecon
    data_collection_tag: nextclade_results
    selection_enabled: false
    tag: figure-lin-clade-dist-h4i5j6
    title: Nextclade clade distribution
    description: WHO-style clade designations, complementary to Pangolin lineage.
    title_size: h3
    layout:
      x: 4
      y: 3
      w: 4
      h: 4
  # FLAG (bespoke): bound to the dashboard's `classification_sankey` reshape
  # (qc_status → lineage → clade funnel) — a composition specific to this template.
  - component_type: advanced_viz
    workflow_tag: viralrecon
    data_collection_tag: classification_sankey
    viz_kind: sankey
    config:
      viz_kind: sankey
      step_cols:
      - qc_status
      - lineage
      - clade
      value_col: null
      sort_mode: total_flow
      color_mode: source
      link_opacity: 0.5
      min_link_value: 0.0
      show_node_labels: true
    tag: adv-lin-sankey
    index: adv-lin-sankey
    title: Classification sankey (QC -> lineage -> clade)
    description: Ribbon width = samples on that path. Surfaces mismatched calls and dominant lineage->clade
      pairs.
    title_size: h3
    layout:
      x: 0
      y: 7
      w: 8
      h: 6
  # FLAG (bespoke): bound to the dashboard's `variant_pca_matrix`
  # reshape (sample × mutation binary matrix for PCA) — template-specific composition.
  - component_type: advanced_viz
    workflow_tag: viralrecon
    data_collection_tag: variant_pca_matrix
    viz_kind: embedding
    config:
      viz_kind: embedding
      sample_id_col: sample_id
      dim_1_col: dim_1
      dim_2_col: dim_2
      compute_method: pca
      color_col: lineage
      cluster_col: clade
      point_size: 8
      show_density: false
    tag: adv-lin-embedding
    index: adv-lin-embedding
    title: Variant-profile PCA embedding (coloured by lineage)
    description: 2D PCA of the sample x mutation binary matrix. Points coloured by Pangolin lineage, marker
      shape encodes Nextclade clade. Samples sharing variants cluster together.
    title_size: h3
    layout:
      x: 0
      y: 13
      w: 8
      h: 6
  - use: pangolin/table
    workflow_tag: viralrecon
    data_collection_tag: pangolin_lineages
    row_selection_enabled: false
    tag: table-lin-pangolin-t6u7v8
    title: Pangolin lineage assignments
    description: Per-sample lineage, conflict, scorpio, QC status.
    title_size: h3
    layout:
      x: 0
      y: 19
      w: 4
      h: 4
  - use: nextclade/table
    workflow_tag: viralrecon
    data_collection_tag: nextclade_results
    row_selection_enabled: false
    tag: table-lin-nextclade-w9x0y1
    title: Nextclade clade assignments
    description: Per-sample clade, substitutions, deletions, QC.
    title_size: h3
    layout:
      x: 4
      y: 19
      w: 4
      h: 4
- title: Sample QC
  subtitle: Per-Sample Coverage, Variant Yield, Substitution Patterns & Genome Completeness
  tab_order: 3
  tab_icon: mdi:stethoscope
  tab_icon_color: indigo
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 746b0f3c1e4a2d7f8e5b9cc2
  components:
  - component_type: text
    tag: text-sample-qc-diagnostics-intro
    title: Sample QC Diagnostics - Coverage vs Variant Yield
    order: 3
    alignment: left
    body: Diagnostic plots to catch problematic samples before drawing biological conclusions. The **coverage-vs-variants
      scatter** flags low-coverage samples with inflated / deflated variant counts (usually partial drop-out
      or contamination). The **substitutions-vs-deletions** plot surfaces clade-specific deletion patterns
      or assembly artefacts. The bar at the bottom shows the per-sample % >= 10x with the 80% reliability
      cut-off.
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    layout:
      x: 0
      y: 0
      w: 8
      h: 1
  - use: multiqc/pct_10x
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    column_type: float64
    config:
      aggregations:
      - box_plot_stats
      secondary_layout: box_plot
    display:
      icon_name: mdi:chart-line
      icon_color: '#2196F3'
      title_color: '#2196F3'
      title_font_size: xl
      value_font_size: xl
    tag: card-qcdx-avg-10x-d4e5f6
    layout:
      x: 0
      y: 1
      w: 4
      h: 2
    title: Avg % Genome >= 10x
  - use: multiqc/variants_total
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    column_type: float64
    config:
      aggregation: median
      aggregations:
      - box_plot_stats
      secondary_layout: box_plot
    display:
      icon_name: mdi:dna
      icon_color: '#FF9800'
      title_color: '#FF9800'
      title_font_size: xl
      value_font_size: xl
    tag: card-qcdx-median-variants-g7h8i9
    layout:
      x: 4
      y: 1
      w: 4
      h: 2
    title: Median Variants / Sample
  - use: multiqc/sample_filter
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    column_type: object
    display:
      title_size: md
      custom_color: '#45B8AC'
      icon_name: mdi:flask
    tag: interactive-qcdx-sample-filter-j0k1l2
    index: qcdx-sample-filter
    layout:
      x: 0
      y: 2
      w: 1
      h: 2
    title: Sample ID
  - use: multiqc/lineage_filter
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    column_type: object
    display:
      title_size: md
      custom_color: '#E74C3C'
      icon_name: mdi:virus
    tag: interactive-qcdx-lineage-filter-m3n4o5
    index: qcdx-lineage-filter
    layout:
      x: 0
      y: 4
      w: 1
      h: 2
    title: Lineage
  - use: multiqc/coverage_vs_variants
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    selection_enabled: false
    tag: figure-qcdx-coverage-vs-variants-p6q7r8
    title: Median coverage vs total variants
    description: Spot low-coverage samples with inflated / deflated variant counts.
    title_size: h3
    layout:
      x: 0
      y: 3
      w: 4
      h: 4
  - use: nextclade/subs_vs_dels
    workflow_tag: viralrecon
    data_collection_tag: nextclade_results
    selection_enabled: false
    tag: figure-qcdx-nextclade-scatter-s9t0u1
    title: Nextclade substitutions vs deletions
    description: Per-sample mutation profile shape. Outliers signal clade-specific patterns.
    title_size: h3
    layout:
      x: 4
      y: 3
      w: 4
      h: 4
  - use: multiqc/genome_coverage_barplot
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    selection_enabled: false
    tag: figure-qcdx-genome-coverage-v2w3x4
    title: Genome coverage per sample (>=10x)
    description: Per-sample %-genome >=10x, sorted. Red = 80% reliability cut-off.
    title_size: h3
    layout:
      x: 0
      y: 7
      w: 8
      h: 4
  - use: multiqc/table
    workflow_tag: viralrecon
    data_collection_tag: summary_metrics
    row_selection_enabled: false
    tag: table-qcdx-summary-metrics-y5z6a7
    title: Summary metrics
    description: Per-sample alignment, coverage, and variant calling summary - QC backbone for downstream
      tabs.
    title_size: h3
    layout:
      x: 0
      y: 11
      w: 8
      h: 4
- title: Variants
  subtitle: Per-Call AF Track + Per-Gene / Per-Sample Effect Breakdowns + Sample × Gene Co-Occurrence
  tab_order: 4
