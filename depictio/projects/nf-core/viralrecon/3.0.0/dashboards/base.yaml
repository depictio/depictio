tabs:
-   title: Coverage & Depth
    subtitle: Amplicon Coverage, Genome Coverage & Coverage Heatmap (mosdepth)
    tab_order: 1
    tab_icon: mdi:chart-areaspline
    tab_icon_color: teal
    icon: /assets/images/workflows/nf-core.png
    icon_color: green
    workflow_system: nf-core
    dashboard_id: 746b0f3c1e4a2d7f8e5b9cb5
    components:
    -   component_type: card
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_amplicon_coverage
        aggregation: count
        column_name: sample
        column_type: object
        display:
            icon_name: mdi:flask
            icon_color: '#45B8AC'
            title_color: '#45B8AC'
            title_font_size: xl
            value_font_size: xl
        tag: card-cov-total-samples-a1b2c3
        layout:
            x: 0
            y: 0
            w: 2
            h: 2
        title: Total Samples
    -   component_type: card
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_amplicon_coverage
        aggregation: nunique
        column_name: region
        column_type: object
        display:
            icon_name: mdi:dna
            icon_color: '#FF9800'
            title_color: '#FF9800'
            title_font_size: xl
            value_font_size: xl
        tag: card-cov-total-amplicons-d4e5f6
        layout:
            x: 2
            y: 0
            w: 2
            h: 2
        title: Amplicons Tracked
    -   component_type: card
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_amplicon_coverage
        aggregation: average
        aggregations:
        - median
        - min
        - max
        column_name: coverage
        column_type: float64
        icon_name: mdi:chart-areaspline
        icon_color: '#009688'
        tag: card-cov-amplicon-stats-g7h8i9
        layout:
            x: 4
            y: 0
            w: 2
            h: 5
        title: Amplicon Coverage
    -   component_type: card
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_genome_coverage
        aggregation: average
        aggregations:
        - median
        - min
        - max
        column_name: coverage
        column_type: float64
        icon_name: mdi:chart-line
        icon_color: '#2196F3'
        tag: card-cov-genome-stats-j0k1l2
        layout:
            x: 6
            y: 0
            w: 2
            h: 5
        title: Genome Coverage
    -   component_type: interactive
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_amplicon_coverage
        interactive_component_type: MultiSelect
        column_name: sample
        column_type: object
        display:
            title_size: md
            custom_color: '#45B8AC'
            icon_name: mdi:flask
        tag: interactive-cov-sample-filter-m3n4o5
        index: cov-sample-filter
        layout:
            x: 0
            y: 0
            w: 1
            h: 4
        title: Sample ID
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_genome_coverage
        visu_type: line
        figure_params:
            x: start
            y: coverage
            color: sample
            title: Genome Coverage per Sample
            labels:
                start: Position (bp)
                coverage: Coverage Depth
                sample: Sample
        mode: code
        code_content: |
            df_modified = df.to_pandas().sort_values(['sample', 'start'])
            fig = px.line(
                df_modified,
                x='start', y='coverage', color='sample',
                title='Genome Coverage per Sample (200bp windows)',
                labels={'start': 'Position (bp)', 'coverage': 'Coverage Depth', 'sample': 'Sample'},
                log_y=True
            )
            fig.update_layout(hovermode='x unified', legend=dict(orientation='h', yanchor='bottom', y=1.02))
        selection_enabled: false
        tag: figure-cov-genome-coverage-p6q7r8
        layout:
            x: 0
            y: 3
            w: 8
            h: 6
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_amplicon_heatmap
        visu_type: heatmap
        dict_kwargs:
            index_column: sample
            cluster_rows: true
            cluster_cols: false
            normalize: none
            colorscale: Viridis
            name: log10(Cov+1)
            width: 1000
            height: 700
        selection_enabled: false
        tag: figure-cov-heatmap-v2w3x4
        title: Amplicon Coverage Heatmap
        description: Log10-scaled coverage across all amplicons and samples. Rows clustered by similarity. Dark/blue = low coverage (amplicon dropout), bright/yellow = high coverage.
        title_size: h2
        layout:
            x: 0
            y: 9
            w: 8
            h: 8
    -   component_type: table
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_amplicon_coverage
        row_selection_enabled: false
        tag: table-cov-amplicon-y5z6a7
        title: Amplicon Coverage Data
        description: Per-amplicon median coverage depth for each sample. Use to identify amplicon dropout or coverage imbalance.
        title_size: h2
        layout:
            x: 0
            y: 17
            w: 8
            h: 5
    -   component_type: table
        workflow_tag: viralrecon
        data_collection_tag: mosdepth_genome_coverage
        row_selection_enabled: false
        tag: table-cov-genome-b8c9d0
        title: Genome Coverage Data
        description: Genome-wide coverage in 200bp windows for each sample. Use to identify regions with low sequencing depth.
        title_size: h2
        layout:
            x: 0
            y: 22
            w: 8
            h: 5
