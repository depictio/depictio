        index: lin-qc-status-filter
        layout:
            x: 0
            y: 8
            w: 1
            h: 2
        title: QC Status
    -   component_type: figure
        workflow_tag: viralrecon
        data_collection_tag: pangolin_lineages
        visu_type: bar
        figure_params:
            x: lineage
            y: count
            color: lineage
            title: Pangolin Lineage Distribution
            labels:
                lineage: Lineage
                count: Number of Samples
        mode: code
        code_content: |
            df_modified = df.group_by('lineage').agg(pl.count().alias('count')).sort('count', descending=True)
            fig = px.bar(
                df_modified.to_pandas(),
                x='lineage', y='count', color='lineage',
                title='Pangolin Lineage Distribution',
                labels={'lineage': 'Lineage', 'count': 'Number of Samples'}
            )
            fig.update_layout(xaxis={'categoryorder': 'total descending'}, showlegend=False)
            fig.update_xaxes(tickangle=-45)
        selection_enabled: false
        tag: figure-lin-lineage-dist-b8c9d0
        layout:
            x: 0
            y: 2
            w: 4
            h: 5
    -   component_type: figure
