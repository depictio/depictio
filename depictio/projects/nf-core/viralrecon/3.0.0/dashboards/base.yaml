            x: coverage_median
            y: num_variants_total
            color: lineage
            hover_data:
            - sample
            - pct_genome_covered_10x
            title: Coverage vs Total Variants by Lineage
            labels:
                coverage_median: Median Coverage Depth
                num_variants_total: Total Variants
                lineage: Lineage
        mode: code
        code_content: |
            fig = px.scatter(
                df.to_pandas(),
                x='coverage_median', y='num_variants_total',
                color='lineage',
                hover_data=['sample', 'pct_genome_covered_10x'],
                title='Coverage vs Total Variants by Lineage',
                labels={'coverage_median': 'Median Coverage Depth', 'num_variants_total': 'Total Variants', 'lineage': 'Lineage'},
                size_max=12
            )
            fig.update_traces(marker=dict(size=10, line=dict(width=1, color='DarkSlateGrey')))
        selection_enabled: false
        tag: figure-lin-coverage-vs-variants-k7l8m9
