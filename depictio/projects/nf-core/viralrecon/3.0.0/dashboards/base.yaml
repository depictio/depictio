        figure_params:
            x: qc_overallStatus
            y: count
            color: qc_overallStatus
            title: Nextclade QC Status Overview
        mode: code
        code_content: |
            df_modified = df.group_by('qc_overallStatus').agg(pl.count().alias('count')).sort('count', descending=True)
            fig = px.bar(
                df_modified.to_pandas(),
                x='qc_overallStatus', y='count',
                color='qc_overallStatus',
                color_discrete_map={'good': '#4CAF50', 'mediocre': '#FF9800', 'bad': '#F44336'},
                title='Nextclade QC Status Overview',
                labels={'qc_overallStatus': 'QC Status', 'count': 'Number of Samples'}
            )
            fig.update_layout(showlegend=False)
        selection_enabled: false
        tag: figure-lin-nextclade-qc-e1f2g3
        layout:
            x: 4
            y: 2
            w: 4
            h: 5
