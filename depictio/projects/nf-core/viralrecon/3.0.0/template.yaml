# nf-core/viralrecon Template v3.0.0 - Viral Genome Analysis
# ============================================================================
# This is a TEMPLATE project configuration. Use with:
#   depictio run --template nf-core/viralrecon/3.0.0 --data-root /path/to/your/data
#
# Tested against nf-core/viralrecon AWS megatest results:
#   s3://nf-core-awsmegatests/viralrecon/results-395079f1d24dce731ac22e03d7a5e71f110103fc
#
# Designed for nf-core/viralrecon amplicon (ivar) workflow outputs.
# Generic, core-facility compatible — no sensitive metadata required.
# Data collections use "Aggregated" metatype for time-series aggregation
# across multiple sequencing runs.
# ============================================================================

# Template metadata (parsed and removed before Project model validation)
template:
  template_id: "nf-core/viralrecon/3.0.0"
  description: "nf-core/viralrecon viral genome analysis template for amplicon sequencing (ivar variant caller)"
  version: "1.1.0"
  variables:
    - name: "DATA_ROOT"
      description: "Root directory containing viralrecon pipeline output (multiqc/, variants/)"
      required: true
  dashboards:
    - "dashboards/base.yaml"
  # No reference.vars needed — DATA_ROOT is resolved by db_init to the
  # bundled project directory (/app/depictio/projects/nf-core/viralrecon/3.0.0).

# ============================================================================
# PROJECT CONFIGURATION
# ============================================================================

name: "Viralrecon Viral Genome Analysis"
project_type: "advanced"
is_public: true
workflows:
  - name: "viralrecon"
    version: "3.0.0"
    engine:
      name: "nextflow"
      version: "24.10.4"
    catalog:
      name: "nf-core"
      url: "https://nf-co.re"
    repository_url: "https://github.com/nf-core/viralrecon"
    data_location:
      structure: "sequencing-runs"
      runs_regex: "run_.*"
      locations:
        - "{DATA_ROOT}"
    data_collections:
      # ----------------------------------------------------------------
      # MultiQC data collection (native parquet)
      # ----------------------------------------------------------------
      - data_collection_tag: "multiqc_data"
        description: "MultiQC report data with QC metrics from all pipeline tools"
        config:
          type: "MultiQC"
          scan:
            mode: "recursive"
            scan_parameters:
              regex_config:
                pattern: "multiqc/multiqc_data/multiqc.parquet"
          dc_specific_properties:
            s3_location: null
            modules:
              - "fastp"
              - "fastqc"
              - "bowtie2"
              - "samtools"
              - "picard"
              - "mosdepth"
              - "ivar"
              - "ivar_variants"
              - "bcftools"
              - "snpeff"
              - "pangolin"
              - "nextclade"
              - "quast"
              - "quast_variants"
              - "kraken"
              - "freyja"
            plots:
              fastp:
                - "Filtered Reads"
                - "Insert Sizes"
              fastqc:
                - "Sequence Quality Histograms"
                - "Status Checks"
              bowtie2:
                - "SE"
                - "PE"
                - "Paired-end alignments"
              samtools:
                - "Alignment Metrics"
              mosdepth:
                - "Coverage Distribution"
                - "Cumulative coverage distribution"
                - "Coverage Per Contig"
                - "Average coverage per contig"
              ivar:
                - "Variants Counts"
              ivar_variants:
                - "ivar_variants-section"
              snpeff:
                - "Variant Effects by Genomic Region"
                - "Variant Effects by Impact"
              quast:
                - "Assembly Statistics"
              quast_variants:
                - "Number of Contigs"
              bcftools:
                - "Variant Substitution Types"
              kraken:
                - "Top taxa"

      # ----------------------------------------------------------------
      # Recipe-transformed data collections (Aggregated metatype)
      # ----------------------------------------------------------------

      - data_collection_tag: "summary_metrics"
        description: "Per-sample alignment, coverage, and variant calling summary metrics"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "multiqc/summary_metrics.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sample": "Sample identifier"
              "num_reads_mapped": "Number of reads mapped to reference"
              "pct_reads_mapped": "Percentage of reads mapped"
              "coverage_median": "Median genome coverage depth"
              "pct_genome_covered_1x": "Percentage of genome covered at >= 1x depth"
              "pct_genome_covered_10x": "Percentage of genome covered at >= 10x depth"
              "num_variants_snp": "Number of SNP variants called"
              "num_variants_indel": "Number of indel variants called"
              "num_variants_total": "Total number of variants called"
              "lineage": "Pangolin lineage assignment"

      - data_collection_tag: "variants_long"
        optional: true  # ivar variants_long_table.csv absent when consensus is empty / --skip_variants_long_table
        description: "Per-sample variant calls with functional annotations"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "ivar/variants_long.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sample": "Sample identifier"
              "CHROM": "Chromosome/reference sequence"
              "POS": "Variant position on reference"
              "REF": "Reference allele"
              "ALT": "Alternative allele"
              "FILTER": "Variant filter status"
              "DP": "Read depth at position"
              "REF_DP": "Reference allele read depth"
              "ALT_DP": "Alternative allele read depth"
              "AF": "Allele frequency (0-1)"
              "GENE": "Gene annotation"
              "AA": "Amino acid change"
              "EFFECT": "Variant effect (e.g., missense, synonymous)"
              "FUNCLASS": "Functional class (SILENT, MISSENSE, NONSENSE)"
              "mutation_label": "Formatted mutation label (GENE:REFposALT)"

      - data_collection_tag: "pangolin_lineages"
        optional: true  # no *.pangolin.csv (non-SARS pathogen, --skip_pangolin, or empty consensus)
        description: "Pangolin lineage assignments for each sample"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "pangolin/pangolin_lineages.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sample": "Sample identifier"
              "lineage": "PANGO lineage designation"
              "conflict": "Lineage assignment conflict score"
              "ambiguity_score": "Ambiguity in lineage assignment"
              "scorpio_call": "Scorpio constellation call"
              "scorpio_support": "Scorpio support score"
              "pangolin_version": "Pangolin software version"
              "pango_version": "PANGO data version"
              "status": "Assignment status"
              "qc_status": "QC status (pass/fail)"

      - data_collection_tag: "nextclade_results"
        optional: true  # no nextclade output (non-SARS pathogen, --skip_nextclade, or empty consensus)
        description: "Nextclade clade assignments and sequence quality metrics"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "nextclade/nextclade_results.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sample": "Sample identifier"
              "clade": "Nextclade clade designation"
              "Nextclade_pango": "PANGO lineage from Nextclade"
              "totalSubstitutions": "Total nucleotide substitutions vs reference"
              "totalDeletions": "Total deletions vs reference"
              "totalInsertions": "Total insertions vs reference"
              "totalFrameShifts": "Total frame shifts detected"
              "totalMissing": "Total missing (N) bases"
              "totalNonACGTNs": "Total non-ACGTN characters"
              "alignmentScore": "Alignment quality score"
              "coverage": "Genome coverage fraction"
              "qc_overallScore": "Nextclade overall QC score"
              "qc_overallStatus": "Nextclade QC status (good/mediocre/bad)"

      # ----------------------------------------------------------------
      # Mosdepth coverage data collections
      # ----------------------------------------------------------------

      - data_collection_tag: "mosdepth_amplicon_coverage"
        optional: true  # amplicon coverage absent without a primer panel (metagenomic/non-SARS)
        description: "Per-amplicon coverage depth across all samples (from mosdepth)"
        config:
          type: "Table"
          metatype: "Aggregated"
          scan:
            mode: "recursive"
            scan_parameters:
              regex_config:
                pattern: "variants/bowtie2/mosdepth/amplicon/all_samples.mosdepth.coverage.tsv"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "chrom": "Chromosome/reference sequence"
              "start": "Amplicon start position on reference"
              "end": "Amplicon end position on reference"
              "region": "ARTIC amplicon name (e.g., SARS-CoV-2_1)"
              "coverage": "Mean read coverage depth for amplicon"
              "sample": "Sample identifier"

      - data_collection_tag: "mosdepth_genome_coverage"
        optional: true  # genome coverage absent when no bowtie2 alignment (nanopore/artic)
        description: "Genome-wide coverage in 200bp windows across all samples (from mosdepth)"
        config:
          type: "Table"
          metatype: "Aggregated"
          scan:
            mode: "recursive"
            scan_parameters:
              regex_config:
                pattern: "variants/bowtie2/mosdepth/genome/all_samples.mosdepth.coverage.tsv"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "chrom": "Chromosome/reference sequence"
              "start": "Window start position on reference"
              "end": "Window end position on reference"
              "coverage": "Mean read coverage depth for window"
              "sample": "Sample identifier"

      - data_collection_tag: "mosdepth_amplicon_heatmap"
        optional: true  # amplicon heatmap absent without a primer panel
        description: "Log10 amplicon coverage heatmap matrix (samples × amplicons, from mosdepth)"
        config:
          type: "Table"
          metatype: "Aggregated"
          scan:
            mode: "recursive"
            scan_parameters:
              regex_config:
                pattern: "variants/bowtie2/mosdepth/amplicon/all_samples.mosdepth.heatmap.tsv"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample": "Sample identifier (row index)"

      # ----------------------------------------------------------------
      # Advanced-viz canonical-schema DCs (consume the upstream typed DCs
      # above via dc_ref and rename to the role-based schema required by
      # depictio/models/components/advanced_viz/schemas.py).
      # ----------------------------------------------------------------

      # KEPT intentionally (unlike volcano/qq/lollipop, which were retired as
      # pure remappers). The recipe is a rename, but the SEPARATE DC earns its
      # keep by isolating the oncoplot's "Mutation Type" filter from the shared
      # variants_long scope — rebinding to variants_long would couple it to the
      # lollipop / variants-table filters. catalog/ivar/variants_long.yaml also
      # declares oncoplot as a render, so the relationship stays documented.
      - data_collection_tag: "oncoplot_canonical"
        optional: true  # dc_ref variants_long
        description: "Oncoplot-ready variant matrix (sample_id × gene × mutation_type)"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "nf-core/viralrecon/oncoplot_canonical.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sample_id": "Sample identifier"
              "gene": "Gene annotation"
              "mutation_type": "Variant effect (cell colour)"
              "mutation_label": "Formatted mutation label (hover)"

      - data_collection_tag: "complex_heatmap_canonical"
        optional: true  # dc_ref mosdepth_amplicon_heatmap
        description: "ComplexHeatmap-ready amplicon-coverage matrix (samples × amplicons)"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "mosdepth/complex_heatmap_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample": "Sample identifier (use as index_column)"

      - data_collection_tag: "coverage_track_canonical"
        optional: true  # dc_ref mosdepth_genome_coverage
        description: "Coverage-track-ready genome-coverage tracks (chromosome / position / value)"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "mosdepth/coverage_track_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "chromosome": "Chromosome / reference sequence (renamed from chrom)"
              "position": "Window start position"
              "value": "Mean coverage depth"
              "end": "Window end position"
              "sample": "Sample identifier (faceting)"

      - data_collection_tag: "sankey_canonical"
        optional: true  # dc_ref pangolin_lineages + nextclade_results
        description: "Sankey-ready classification funnel (qc_status → lineage → clade)"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "nf-core/viralrecon/sankey_canonical.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sample": "Sample identifier"
              "qc_status": "Pangolin QC status"
              "lineage": "PANGO lineage"
              "clade": "Nextclade clade"

      # Tier 2 derivations — UpSet (mutation × lineage) + live PCA feature matrix.
      - data_collection_tag: "upset_canonical"
        optional: true  # dc_ref variants_long
        description: "UpSet-ready mutation × lineage binary membership matrix"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "nf-core/viralrecon/upset_canonical.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "mutation_label": "Variant identifier (formatted GENE:REFposALT)"

      - data_collection_tag: "variant_feature_matrix_canonical"
        optional: true  # dc_ref variants_long
        description: "Sample × mutation binary matrix for live PCA / UMAP embedding"
        config:
          type: "Table"
          metatype: "Aggregated"
          source: "transformed"
          transform:
            recipe: "nf-core/viralrecon/variant_feature_matrix_canonical.py"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sample_id": "Sample identifier (row index)"

# ============================================================================
# RUNTIME LINKS CONFIGURATION
# ============================================================================
# Links use data_collection_tag references (resolved to IDs at instantiation)
# ============================================================================

links:
  # Link 1: Summary Metrics -> MultiQC (for cross-filtering)
  - source_dc_tag: "summary_metrics"
    source_column: "sample"
    target_dc_tag: "multiqc_data"
    target_type: "multiqc"
    link_config:
      resolver: "sample_mapping"
      target_field: "sample_name"
    description: "Filter MultiQC by sample selections from summary metrics"
    enabled: true

  # Link 2: Summary Metrics -> Variants Long
  - source_dc_tag: "summary_metrics"
    source_column: "sample"
    target_dc_tag: "variants_long"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter variants table by selected samples"
    enabled: true

  # Link 3: Summary Metrics -> Pangolin Lineages
  - source_dc_tag: "summary_metrics"
    source_column: "sample"
    target_dc_tag: "pangolin_lineages"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter Pangolin lineages by selected samples"
    enabled: true

  # Link 4: Summary Metrics -> Nextclade Results
  - source_dc_tag: "summary_metrics"
    source_column: "sample"
    target_dc_tag: "nextclade_results"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter Nextclade results by selected samples"
    enabled: true

  # Link 5: Summary Metrics -> Mosdepth Amplicon Coverage
  - source_dc_tag: "summary_metrics"
    source_column: "sample"
    target_dc_tag: "mosdepth_amplicon_coverage"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter amplicon coverage by selected samples"
    enabled: true

  # Link 6: Summary Metrics -> Mosdepth Genome Coverage
  - source_dc_tag: "summary_metrics"
    source_column: "sample"
    target_dc_tag: "mosdepth_genome_coverage"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter genome coverage by selected samples"
    enabled: true

  # Link 7: Summary Metrics -> Mosdepth Amplicon Heatmap
  - source_dc_tag: "summary_metrics"
    source_column: "sample"
    target_dc_tag: "mosdepth_amplicon_heatmap"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter amplicon heatmap by selected samples"
    enabled: true
