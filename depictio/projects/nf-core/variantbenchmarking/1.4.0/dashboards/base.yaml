version: 1
main_dashboard:
  title: nf-core/variantbenchmarking
  subtitle: Benchmark Overview - Precision / Recall / F1 across tools
  project_tag: Variant Benchmarking Analysis
  main_tab_name: Overview
  tab_icon: mdi:chart-box-outline
  tab_icon_color: indigo
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba01
  components:
  - component_type: text
    tag: text-overview-intro
    title: Variant calling benchmark - overview
    order: 1
    alignment: left
    body: How well does each variant caller / sample recover the truth set? These panels reproduce
      the pipeline's own canonical plots (`bin/plots.R`) from the published `summary/tables/<tool>/<tool>.summary.csv`
      files - **F1 by tool**, **precision vs recall**, and **TP/FP/FN by tool** - for the germline
      (`small/`) and somatic (`indel/`) categories. Drill into each category in the dedicated tabs.
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: card
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    aggregation: max
    column_name: f1
    column_type: float64
    display: {icon_name: 'mdi:dna', icon_color: '#3F51B5', title_color: '#3F51B5'}
    tag: card-overview-germline-bestf1
    title: Germline best F1
    layout: {x: 0, y: 1, w: 2, h: 2}
  - component_type: card
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    aggregation: nunique
    column_name: label
    column_type: object
    display: {icon_name: 'mdi:flask', icon_color: '#009688', title_color: '#009688'}
    tag: card-overview-germline-samples
    title: Germline samples
    layout: {x: 2, y: 1, w: 2, h: 2}
  - component_type: card
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    aggregation: max
    column_name: f1
    column_type: float64
    display: {icon_name: 'mdi:target', icon_color: '#E91E63', title_color: '#E91E63'}
    tag: card-overview-somatic-bestf1
    title: Somatic best F1
    layout: {x: 4, y: 1, w: 2, h: 2}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    visu_type: scatter
    mode: code
    code_content: |
      fig = px.scatter(df.to_pandas(), x='recall', y='precision', color='label', text='label',
                       labels={'recall': 'Recall', 'precision': 'Precision', 'label': 'Sample'})
      fig.update_traces(textposition='top center', marker_size=12)
      fig.update_layout(xaxis_range=[0, 1.02], yaxis_range=[0, 1.02])
    selection_enabled: false
    tag: figure-overview-germline-pr
    title: Germline precision vs recall (rtg-tools vcfeval)
    description: Each point is a germline sample - top-right is best.
    title_size: h3
    layout: {x: 0, y: 3, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    visu_type: scatter
    mode: code
    code_content: |
      fig = px.scatter(df.to_pandas(), x='recall', y='precision', color='caller', text='caller',
                       labels={'recall': 'Recall', 'precision': 'Precision', 'caller': 'Caller'})
      fig.update_traces(textposition='top center', marker_size=12)
      fig.update_layout(xaxis_range=[0, 1.02], yaxis_range=[0, 1.02])
    selection_enabled: false
    tag: figure-overview-somatic-pr
    title: Somatic precision vs recall (som.py)
    description: Each point is a somatic caller - top-right is best.
    title_size: h3
    layout: {x: 4, y: 3, w: 4, h: 5}
tabs:
- title: Germline (small variants)
  subtitle: SNP / INDEL benchmarking - hap.py & rtg-tools vcfeval
  tab_order: 1
  tab_icon: mdi:dna
  tab_icon_color: indigo
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba20
  components:
  - component_type: text
    tag: text-germline-intro
    title: Germline small-variant benchmarking
    order: 1
    alignment: left
    body: The three panels on top reproduce the pipeline's canonical `rtgtools` plots from
      `small/summary/tables/rtgtools/rtgtools.summary.csv` - **F1 by tool**, **precision vs recall**,
      and **TP/FP/FN by tool**. Below, hap.py breaks accuracy down by SNP vs INDEL (pooled across
      samples) plus the per-threshold precision-recall sweep.
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: interactive
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    interactive_component_type: MultiSelect
    column_name: label
    column_type: object
    display: {title_size: md, custom_color: '#45B8AC', icon_name: 'mdi:flask'}
    tag: interactive-germline-sample
    index: germline-sample-filter
    title: Sample
    layout: {x: 0, y: 1, w: 1, h: 2}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    visu_type: bar
    mode: code
    code_content: |
      df_sorted = df.sort('f1', descending=True)
      fig = px.bar(df_sorted.to_pandas(), x='label', y='f1', color='label',
                   labels={'label': 'Tool', 'f1': 'F1 score'})
      fig.update_layout(yaxis_range=[0, 1.05], showlegend=False)
    selection_enabled: false
    tag: figure-germline-f1-by-tool
    title: F1 by tool
    description: F1 score per germline sample (rtg-tools vcfeval).
    title_size: h3
    layout: {x: 1, y: 1, w: 3, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    visu_type: scatter
    mode: code
    code_content: |
      fig = px.scatter(df.to_pandas(), x='recall', y='precision', color='label', text='label',
                       labels={'recall': 'Recall', 'precision': 'Precision', 'label': 'Sample'})
      fig.update_traces(textposition='top center', marker_size=12)
      fig.update_layout(xaxis_range=[0, 1.02], yaxis_range=[0, 1.02])
    selection_enabled: false
    tag: figure-germline-pr
    title: Precision vs recall
    description: Each point is a germline sample - top-right is best.
    title_size: h3
    layout: {x: 4, y: 1, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    visu_type: bar
    mode: code
    code_content: |
      df_long = df.unpivot(index=['label'], on=['tp_comp', 'fp', 'fn'], variable_name='metric', value_name='count')
      fig = px.bar(df_long.to_pandas(), x='label', y='count', color='metric', barmode='group',
                   labels={'label': 'Tool', 'count': 'Variants', 'metric': 'Metric'})
    selection_enabled: false
    tag: figure-germline-variants-by-tool
    title: TP / FP / FN by tool
    description: True positives (comp), false positives and false negatives per sample.
    title_size: h3
    layout: {x: 0, y: 6, w: 4, h: 5}
  - component_type: table
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    row_selection_enabled: false
    tag: table-germline-vcfeval
    title: Germline vcfeval summary table
    description: Per-sample TP / FP / FN and precision / recall / F1.
    title_size: h3
    layout: {x: 4, y: 6, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_happy_summary
    visu_type: bar
    mode: code
    code_content: |
      df_pass = df.filter(pl.col('filter') == 'PASS')
      fig = px.bar(df_pass.to_pandas(), x='variant_type', y='f1', color='variant_type',
                   labels={'variant_type': 'Variant type', 'f1': 'F1 score'})
      fig.update_layout(yaxis_range=[0, 1.05], showlegend=False)
    selection_enabled: false
    tag: figure-germline-happy-f1
    title: hap.py F1 by variant type (PASS, pooled)
    description: F1 for SNP vs INDEL, pooled across samples.
    title_size: h3
    layout: {x: 0, y: 11, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_happy_roc
    visu_type: line
    mode: code
    code_content: |
      df_sorted = df.sort('recall')
      fig = px.line(df_sorted.to_pandas(), x='recall', y='precision', markers=True,
                    labels={'recall': 'Recall', 'precision': 'Precision'})
      fig.update_layout(xaxis_range=[0, 1.02], yaxis_range=[0, 1.02])
    selection_enabled: false
    tag: figure-germline-happy-roc
    title: hap.py SNP precision-recall sweep
    description: Precision vs recall across hap.py quality thresholds (germline SNP, PASS).
    title_size: h3
    layout: {x: 4, y: 11, w: 4, h: 5}
- title: Somatic (indels)
  subtitle: Somatic SNV / INDEL benchmarking - som.py & rtg-tools vcfeval
  tab_order: 2
  tab_icon: mdi:target
  tab_icon_color: pink
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba21
  components:
  - component_type: text
    tag: text-somatic-intro
    title: Somatic small-variant benchmarking
    order: 1
    alignment: left
    body: Canonical `sompy` plots from `indel/summary/tables/sompy/sompy.summary.csv` - **F1 by
      caller**, **precision vs recall**, **TP/FP/FN by caller** - against the SEQC2 truth set. The
      allele-fraction heatmap shows where each caller's recall concentrates; low-AF somatic variants
      are the hardest to recover.
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: interactive
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    interactive_component_type: MultiSelect
    column_name: caller
    column_type: object
    display: {title_size: md, custom_color: '#E74C3C', icon_name: 'mdi:tools'}
    tag: interactive-somatic-caller
    index: somatic-caller-filter
    title: Caller
    layout: {x: 0, y: 1, w: 1, h: 2}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    visu_type: bar
    mode: code
    code_content: |
      df_sorted = df.sort('f1', descending=True)
      fig = px.bar(df_sorted.to_pandas(), x='caller', y='f1', color='caller',
                   labels={'caller': 'Caller', 'f1': 'F1 score'})
      fig.update_layout(yaxis_range=[0, 1.05], showlegend=False)
    selection_enabled: false
    tag: figure-somatic-f1-by-caller
    title: F1 by caller
    description: F1 score per somatic caller (som.py).
    title_size: h3
    layout: {x: 1, y: 1, w: 3, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    visu_type: scatter
    mode: code
    code_content: |
      fig = px.scatter(df.to_pandas(), x='recall', y='precision', color='caller', text='caller',
                       labels={'recall': 'Recall', 'precision': 'Precision', 'caller': 'Caller'})
      fig.update_traces(textposition='top center', marker_size=12)
      fig.update_layout(xaxis_range=[0, 1.02], yaxis_range=[0, 1.02])
    selection_enabled: false
    tag: figure-somatic-pr
    title: Precision vs recall
    description: Each point is a somatic caller - top-right is best.
    title_size: h3
    layout: {x: 4, y: 1, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    visu_type: bar
    mode: code
    code_content: |
      df_long = df.unpivot(index=['caller'], on=['tp', 'fp', 'fn'], variable_name='metric', value_name='count')
      fig = px.bar(df_long.to_pandas(), x='caller', y='count', color='metric', barmode='group',
                   labels={'caller': 'Caller', 'count': 'Variants', 'metric': 'Metric'})
    selection_enabled: false
    tag: figure-somatic-variants-by-caller
    title: TP / FP / FN by caller
    description: True positives, false positives and false negatives per caller.
    title_size: h3
    layout: {x: 0, y: 6, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_regions
    visu_type: heatmap
    mode: code
    code_content: |
      fig = px.density_heatmap(df.to_pandas(), x='af_bin', y='caller', z='f1', histfunc='avg',
                               color_continuous_scale='Viridis',
                               labels={'af_bin': 'Allele-fraction bin', 'caller': 'Caller', 'f1': 'F1'})
      fig.update_xaxes(tickangle=-45)
    selection_enabled: false
    tag: figure-somatic-regions-heatmap
    title: Somatic F1 by caller x allele-fraction bin
    description: F1 stratified by allele-fraction stratum (som.py regions).
    title_size: h3
    layout: {x: 4, y: 6, w: 4, h: 5}
  - component_type: table
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    row_selection_enabled: false
    tag: table-somatic-sompy
    title: Somatic som.py summary table
    description: Per-caller TP / FP / FN, precision / recall / F1 with confidence intervals.
    title_size: h3
    layout: {x: 0, y: 11, w: 8, h: 5}
- title: Structural & CNV
  subtitle: SV / CNV benchmarking - Truvari, SVanalyzer, Wittyer (optional)
  tab_order: 3
  tab_icon: mdi:chart-scatter-plot
  tab_icon_color: orange
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba22
  components:
  - component_type: text
    tag: text-svcnv-intro
    title: Structural-variant & CNV benchmarking (optional)
    order: 1
    alignment: left
    body: These panels populate only when the pipeline is run with the **SV** (`truvari`,
      `svbenchmark`) and **CNV** (`wittyer`) profiles - the public megatest does not include them,
      so the components below are empty on the reference dataset. Truvari/SVanalyzer/Wittyer
      summaries follow the same `summary/tables/<tool>/<tool>.summary.csv` convention; the recipes
      use tolerant column matching until pinned against a real SV/CNV run.
    workflow_tag: variantbenchmarking
    data_collection_tag: sv_truvari_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: sv_truvari_summary
    visu_type: scatter
    mode: code
    code_content: |
      fig = px.scatter(df.to_pandas(), x='recall', y='precision', color='label', text='label',
                       labels={'recall': 'Recall', 'precision': 'Precision', 'label': 'Sample / caller'})
      fig.update_traces(textposition='top center', marker_size=12)
      fig.update_layout(xaxis_range=[0, 1.02], yaxis_range=[0, 1.02])
    selection_enabled: false
    tag: figure-sv-truvari-pr
    title: SV precision vs recall (Truvari)
    description: Truvari structural-variant precision vs recall.
    title_size: h3
    layout: {x: 0, y: 1, w: 4, h: 5}
  - component_type: table
    workflow_tag: variantbenchmarking
    data_collection_tag: sv_svbenchmark_summary
    row_selection_enabled: false
    tag: table-sv-svbenchmark
    title: SV SVanalyzer summary table
    description: SVanalyzer (svbenchmark) precision / recall / F1.
    title_size: h3
    layout: {x: 4, y: 1, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: cnv_wittyer_summary
    visu_type: heatmap
    mode: code
    code_content: |
      fig = px.density_heatmap(df.to_pandas(), x='size_bin', y='event_type', z='f1', histfunc='avg',
                               color_continuous_scale='Viridis',
                               labels={'size_bin': 'Size bin', 'event_type': 'Event type', 'f1': 'F1'})
      fig.update_xaxes(tickangle=-45)
    selection_enabled: false
    tag: figure-cnv-wittyer-heatmap
    title: CNV F1 by event type x size bin (Wittyer)
    description: F1 stratified by event type and size bin from Wittyer.
    title_size: h3
    layout: {x: 0, y: 6, w: 5, h: 5}
