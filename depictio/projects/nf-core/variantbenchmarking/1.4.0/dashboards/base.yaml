version: 1
main_dashboard:
  title: nf-core/variantbenchmarking
  subtitle: Benchmark Overview - Precision / Recall / F1 across tools
  project_tag: Variant Benchmarking Analysis
  main_tab_name: Overview
  tab_icon: mdi:chart-box-outline
  tab_icon_color: indigo
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba01
  components:
  - component_type: text
    tag: text-overview-intro
    title: Variant calling benchmark - overview
    order: 1
    alignment: left
    body: How well does each variant caller / sample recover the truth set? This tab summarises
      benchmarking accuracy (**precision**, **recall**, **F1**) for the germline (`small/`,
      hap.py + rtg-tools vcfeval) and somatic (`indel/`, som.py + vcfeval) categories. Use the
      per-category tabs to drill into variant-type and allele-fraction stratification.
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: card
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    aggregation: max
    column_name: f1
    column_type: float64
    display: {icon_name: 'mdi:dna', icon_color: '#3F51B5', title_color: '#3F51B5'}
    tag: card-overview-germline-bestf1
    title: Germline best F1
    layout: {x: 0, y: 1, w: 2, h: 2}
  - component_type: card
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    aggregation: nunique
    column_name: label
    column_type: object
    display: {icon_name: 'mdi:flask', icon_color: '#009688', title_color: '#009688'}
    tag: card-overview-germline-samples
    title: Germline samples
    layout: {x: 2, y: 1, w: 2, h: 2}
  - component_type: card
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    aggregation: max
    column_name: f1
    column_type: float64
    display: {icon_name: 'mdi:target', icon_color: '#E91E63', title_color: '#E91E63'}
    tag: card-overview-somatic-bestf1
    title: Somatic best F1
    layout: {x: 4, y: 1, w: 2, h: 2}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    visu_type: bar
    mode: code
    code_content: |
      df_long = df.unpivot(index=['label'], on=['precision', 'recall', 'f1'], variable_name='metric', value_name='value')
      fig = px.bar(df_long.to_pandas(), x='label', y='value', color='metric', barmode='group',
                   labels={'label': 'Sample', 'value': 'Score', 'metric': 'Metric'})
      fig.update_layout(yaxis_range=[0, 1.05])
    selection_enabled: false
    tag: figure-overview-germline-prf1
    title: Germline accuracy by sample (rtg-tools vcfeval)
    description: Precision / recall / F1 per germline sample.
    title_size: h3
    layout: {x: 0, y: 3, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    visu_type: bar
    mode: code
    code_content: |
      df_long = df.unpivot(index=['caller'], on=['precision', 'recall', 'f1'], variable_name='metric', value_name='value')
      fig = px.bar(df_long.to_pandas(), x='caller', y='value', color='metric', barmode='group',
                   labels={'caller': 'Caller', 'value': 'Score', 'metric': 'Metric'})
      fig.update_layout(yaxis_range=[0, 1.05])
    selection_enabled: false
    tag: figure-overview-somatic-prf1
    title: Somatic accuracy by caller (som.py)
    description: Precision / recall / F1 per somatic variant caller.
    title_size: h3
    layout: {x: 4, y: 3, w: 4, h: 5}
tabs:
- title: Germline (small variants)
  subtitle: SNP / INDEL benchmarking - hap.py & rtg-tools vcfeval
  tab_order: 1
  tab_icon: mdi:dna
  tab_icon_color: indigo
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba20
  components:
  - component_type: text
    tag: text-germline-intro
    title: Germline small-variant benchmarking
    order: 1
    alignment: left
    body: Per-sample accuracy from rtg-tools **vcfeval** (overall) and **hap.py** (broken down by
      SNP vs INDEL, ALL vs PASS, pooled across samples). High precision with lower recall on
      `test3` reflects a more stringent truth set.
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: interactive
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    interactive_component_type: MultiSelect
    column_name: label
    column_type: object
    display: {title_size: md, custom_color: '#45B8AC', icon_name: 'mdi:flask'}
    tag: interactive-germline-sample
    index: germline-sample-filter
    title: Sample
    layout: {x: 0, y: 1, w: 1, h: 2}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    visu_type: bar
    mode: code
    code_content: |
      df_long = df.unpivot(index=['label'], on=['precision', 'recall', 'f1'], variable_name='metric', value_name='value')
      fig = px.bar(df_long.to_pandas(), x='label', y='value', color='metric', barmode='group',
                   labels={'label': 'Sample', 'value': 'Score', 'metric': 'Metric'})
      fig.update_layout(yaxis_range=[0, 1.05])
    selection_enabled: false
    tag: figure-germline-vcfeval-prf1
    title: vcfeval accuracy by sample
    description: Precision / recall / F1 per germline sample (rtg-tools vcfeval).
    title_size: h3
    layout: {x: 1, y: 1, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_happy_summary
    visu_type: bar
    mode: code
    code_content: |
      df_pass = df.filter(pl.col('filter') == 'PASS')
      df_long = df_pass.unpivot(index=['variant_type'], on=['precision', 'recall', 'f1'], variable_name='metric', value_name='value')
      fig = px.bar(df_long.to_pandas(), x='variant_type', y='value', color='metric', barmode='group',
                   labels={'variant_type': 'Variant type', 'value': 'Score', 'metric': 'Metric'})
      fig.update_layout(yaxis_range=[0, 1.05])
    selection_enabled: false
    tag: figure-germline-happy-prf1
    title: hap.py accuracy by variant type (PASS, pooled)
    description: Precision / recall / F1 for SNP vs INDEL, pooled across samples.
    title_size: h3
    layout: {x: 5, y: 1, w: 3, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_happy_roc
    visu_type: line
    mode: code
    code_content: |
      df_sorted = df.sort('recall')
      fig = px.line(df_sorted.to_pandas(), x='recall', y='precision', markers=True,
                    labels={'recall': 'Recall', 'precision': 'Precision'})
      fig.update_layout(xaxis_range=[0, 1.02], yaxis_range=[0, 1.02])
    selection_enabled: false
    tag: figure-germline-happy-roc
    title: hap.py SNP precision-recall sweep
    description: Precision vs recall across hap.py quality thresholds (germline SNP, PASS).
    title_size: h3
    layout: {x: 0, y: 6, w: 4, h: 5}
  - component_type: table
    workflow_tag: variantbenchmarking
    data_collection_tag: germline_vcfeval_summary
    row_selection_enabled: false
    tag: table-germline-vcfeval
    title: Germline vcfeval summary table
    description: Per-sample TP / FP / FN and precision / recall / F1.
    title_size: h3
    layout: {x: 4, y: 6, w: 4, h: 5}
- title: Somatic (indels)
  subtitle: Somatic SNV / INDEL benchmarking - som.py & rtg-tools vcfeval
  tab_order: 2
  tab_icon: mdi:target
  tab_icon_color: pink
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba21
  components:
  - component_type: text
    tag: text-somatic-intro
    title: Somatic small-variant benchmarking
    order: 1
    alignment: left
    body: Somatic caller accuracy from **som.py** and rtg-tools **vcfeval** against the SEQC2 truth
      set. The allele-fraction heatmap shows where each caller's recall concentrates - low-AF
      somatic variants are the hardest to recover.
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: interactive
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    interactive_component_type: MultiSelect
    column_name: caller
    column_type: object
    display: {title_size: md, custom_color: '#E74C3C', icon_name: 'mdi:tools'}
    tag: interactive-somatic-caller
    index: somatic-caller-filter
    title: Caller
    layout: {x: 0, y: 1, w: 1, h: 2}
  - component_type: card
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    aggregation: max
    column_name: f1
    column_type: float64
    display: {icon_name: 'mdi:trophy', icon_color: '#E91E63', title_color: '#E91E63'}
    tag: card-somatic-bestf1
    title: Best somatic F1
    layout: {x: 1, y: 1, w: 2, h: 2}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    visu_type: bar
    mode: code
    code_content: |
      df_long = df.unpivot(index=['caller'], on=['precision', 'recall', 'f1'], variable_name='metric', value_name='value')
      fig = px.bar(df_long.to_pandas(), x='caller', y='value', color='metric', barmode='group',
                   labels={'caller': 'Caller', 'value': 'Score', 'metric': 'Metric'})
      fig.update_layout(yaxis_range=[0, 1.05])
    selection_enabled: false
    tag: figure-somatic-sompy-prf1
    title: som.py accuracy by caller
    description: Precision / recall / F1 per somatic caller.
    title_size: h3
    layout: {x: 3, y: 1, w: 5, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_regions
    visu_type: heatmap
    mode: code
    code_content: |
      fig = px.density_heatmap(df.to_pandas(), x='af_bin', y='caller', z='f1', histfunc='avg',
                               color_continuous_scale='Viridis',
                               labels={'af_bin': 'Allele-fraction bin', 'caller': 'Caller', 'f1': 'F1'})
      fig.update_xaxes(tickangle=-45)
    selection_enabled: false
    tag: figure-somatic-regions-heatmap
    title: Somatic F1 by caller x allele-fraction bin
    description: F1 stratified by allele-fraction stratum (som.py regions).
    title_size: h3
    layout: {x: 0, y: 6, w: 5, h: 5}
  - component_type: table
    workflow_tag: variantbenchmarking
    data_collection_tag: somatic_sompy_summary
    row_selection_enabled: false
    tag: table-somatic-sompy
    title: Somatic som.py summary table
    description: Per-caller TP / FP / FN, precision / recall / F1 with confidence intervals.
    title_size: h3
    layout: {x: 5, y: 6, w: 3, h: 5}
- title: Structural & CNV
  subtitle: SV / CNV benchmarking - Truvari, SVanalyzer, Wittyer (optional)
  tab_order: 3
  tab_icon: mdi:chart-scatter-plot
  tab_icon_color: orange
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 846b0f3c1e4a2d7f8e5bba22
  components:
  - component_type: text
    tag: text-svcnv-intro
    title: Structural-variant & CNV benchmarking (optional)
    order: 1
    alignment: left
    body: These panels populate only when the pipeline is run with the **SV** (`truvari`,
      `svbenchmark`) and **CNV** (`wittyer`) profiles - the public megatest does not include them,
      so the components below are empty on the reference dataset. The recipes use tolerant column
      matching; pin their schemas against a real SV/CNV run when available.
    workflow_tag: variantbenchmarking
    data_collection_tag: sv_truvari_summary
    layout: {x: 0, y: 0, w: 8, h: 1}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: sv_truvari_summary
    visu_type: bar
    mode: code
    code_content: |
      df_long = df.unpivot(index=['label'], on=['precision', 'recall', 'f1'], variable_name='metric', value_name='value')
      fig = px.bar(df_long.to_pandas(), x='label', y='value', color='metric', barmode='group',
                   labels={'label': 'Sample / caller', 'value': 'Score', 'metric': 'Metric'})
      fig.update_layout(yaxis_range=[0, 1.05])
    selection_enabled: false
    tag: figure-sv-truvari-prf1
    title: SV accuracy (Truvari)
    description: Precision / recall / F1 from Truvari structural-variant benchmarking.
    title_size: h3
    layout: {x: 0, y: 1, w: 4, h: 5}
  - component_type: table
    workflow_tag: variantbenchmarking
    data_collection_tag: sv_svbenchmark_summary
    row_selection_enabled: false
    tag: table-sv-svbenchmark
    title: SV SVanalyzer summary table
    description: SVanalyzer (svbenchmark) precision / recall / F1.
    title_size: h3
    layout: {x: 4, y: 1, w: 4, h: 5}
  - component_type: figure
    workflow_tag: variantbenchmarking
    data_collection_tag: cnv_wittyer_summary
    visu_type: heatmap
    mode: code
    code_content: |
      fig = px.density_heatmap(df.to_pandas(), x='size_bin', y='event_type', z='f1', histfunc='avg',
                               color_continuous_scale='Viridis',
                               labels={'size_bin': 'Size bin', 'event_type': 'Event type', 'f1': 'F1'})
      fig.update_xaxes(tickangle=-45)
    selection_enabled: false
    tag: figure-cnv-wittyer-heatmap
    title: CNV F1 by event type x size bin (Wittyer)
    description: F1 stratified by event type and size bin from Wittyer.
    title_size: h3
    layout: {x: 0, y: 6, w: 5, h: 5}
