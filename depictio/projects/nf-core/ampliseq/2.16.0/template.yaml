# nf-core/ampliseq Template v2.16.0 - Microbial Community Analysis
# ============================================================================
# This is a TEMPLATE project configuration. Use with:
#   depictio run --template nf-core/ampliseq/2.16.0 --data-root /path/to/your/data
#
# Tested against nf-core/ampliseq AWS megatest results:
#   s3://nf-core-awsmegatests/ampliseq/results-3d5c7e5bec28de279337f3ffe3c312a45940b782
# ============================================================================

# Template metadata (parsed and removed before Project model validation)
# ⚠️  METADATA IS OPTIONAL in this template.
# Without --var METADATA_FILE=...: metadata DC and ancombc_results DC are excluded.
# With metadata: extended analysis (grouping by any metadata col, ANCOM-BC) is enabled.
# Required metadata column: "ID" — must match the sampleID in the samplesheet.
# All other metadata columns are passed through and available for dashboard grouping.
template:
  template_id: "nf-core/ampliseq/2.16.0"
  description: "nf-core/ampliseq microbial community analysis template for 16S/ITS amplicon sequencing"
  version: "1.1.0"
  variables:
    - name: "DATA_ROOT"
      description: "Root directory containing ampliseq pipeline output (multiqc/, qiime2/)"
      required: true
    - name: "SAMPLESHEET_FILE"
      description: "Path to ampliseq samplesheet CSV (always produced by the pipeline)"
      required: true
    - name: "METADATA_FILE"
      description: "Path to sample metadata TSV (--metadata in ampliseq run). Optional. All non-ID columns become annotations."
      required: false
    - name: "GROUP_COL"
      description: "Metadata column for grouping/facetting in dashboards. Auto-detected as first annotation column if not provided."
      required: false
    - name: "GROUP_COL_DISPLAY"
      description: "Auto-populated: title-cased version of GROUP_COL for display in chart titles."
      required: false
    - name: "ANNOTATION_COLS"
      description: "Auto-populated: comma-separated list of all annotation columns discovered from metadata file."
      required: false
  dashboards:
    - "dashboards/base.yaml"
  conditional:
    - if_var_absent: "METADATA_FILE"
      remove_dc_tags: ["metadata", "alpha_rarefaction", "ancombc_results"]
      dashboards: ["dashboards/base.yaml"]
    - if_var_present: "METADATA_FILE"
      dashboards: ["dashboards/base.yaml"]
  reference:
    vars:
      SAMPLESHEET_FILE: "{DATA_ROOT}/input/samplesheet.csv"
      METADATA_FILE: "{DATA_ROOT}/input/Metadata_full.tsv"
      GROUP_COL: "habitat"

# ============================================================================
# PROJECT CONFIGURATION
# ============================================================================

name: "Ampliseq Microbial Community Analysis"
project_type: "advanced"
is_public: true
workflows:
  - name: "ampliseq"
    version: "2.16.0"
    engine:
      name: "nextflow"
    catalog:
      name: "nf-core"
      url: "https://nf-co.re"
    repository_url: "https://github.com/nf-core/ampliseq"
    data_location:
      structure: "flat"
      locations:
        - "{DATA_ROOT}"
    data_collections:
      - data_collection_tag: "multiqc_data"
        description: "MultiQC report data"
        config:
          type: "MultiQC"
          scan:
            mode: "recursive"
            scan_parameters:
              regex_config:
                pattern: "multiqc/multiqc_data/multiqc.parquet"
          dc_specific_properties:
            modules:
              - "cutadapt"
              - "fastqc"
            plots:
              cutadapt:
                - "Filtered Reads"
                - "Trimmed Sequence Lengths (5')":
                    - "Counts"
                    - "Obs/Exp"
              fastqc:
                - "Sequence Counts"
                - "Sequence Quality Histograms"
                - "Per Sequence Quality Scores"
                - "Per Sequence GC Content":
                    - "Percentages"
                    - "Counts"
                - "Per Base N Content"
                - "Sequence Length Distribution"
                - "Sequence Duplication Levels"
                - "Overrepresented sequences by sample"
                - "Top overrepresented sequences"
                - "Adapter Content"
                - "Status Checks"

      - data_collection_tag: "samplesheet"
        description: "Ampliseq samplesheet (always present, used for cross-DC filtering)"
        config:
          type: "Table"
          scan:
            mode: "single"
            scan_parameters:
              filename: "{SAMPLESHEET_FILE}"
          dc_specific_properties:
            format: "CSV"
            columns_description:
              "sampleID": "Sample identifier (used for cross-DC filtering via links)"

      - data_collection_tag: "metadata"
        optional: true
        description: "Sample metadata TSV (optional — provide via --var METADATA_FILE=...)"
        config:
          type: "Table"
          metatype: "Metadata"
          scan:
            mode: "single"
            scan_parameters:
              filename: "{METADATA_FILE}"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
              try_parse_dates: true
            columns_description:
              "sample": "Sample identifier — must match samplesheet sampleID. All other columns are passed through."

      # ----------------------------------------------------------------
      # Recipe-transformed data collections
      # These read raw QIIME2 outputs and transform them during process
      # ----------------------------------------------------------------

      - data_collection_tag: "alpha_rarefaction"
        description: "Alpha diversity rarefaction curves (from raw QIIME2 CSV)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/alpha_rarefaction.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample": "Sample identifier"
              "depth": "Sequencing depth"
              "iter": "Iteration number"
              "faith_pd": "Faith's Phylogenetic Diversity metric"

      - data_collection_tag: "taxonomy_composition"
        description: "Taxonomic composition across samples (from raw QIIME2 barplot)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/taxonomy_composition.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample": "Sample identifier"
              "taxonomy": "Taxonomic classification (Kingdom;Phylum)"
              "count": "Raw sequence count for this taxonomy"

      - data_collection_tag: "taxonomy_rel_abundance"
        description: "Taxonomic relative abundance at Phylum level (from raw abundance table)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/taxonomy_rel_abundance.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample": "Sample identifier"
              "taxonomy": "Taxonomic classification (Kingdom;Phylum)"
              "rel_abundance": "Relative abundance (0-1)"
              "Kingdom": "Kingdom level"
              "Phylum": "Phylum level"

      - data_collection_tag: "taxonomy_heatmap"
        description: "Taxonomic relative abundance matrix in wide format (Phylum × sample) for heatmap visualisation"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/taxonomy_heatmap.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "Phylum": "Phylum-level taxonomic classification (row identifier)"
              "Kingdom": "Kingdom-level classification (row annotation)"

      - data_collection_tag: "ancombc_results"
        description: "ANCOM-BC differential abundance at Phylum level (from 5 raw CSV slices)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/ancombc.py"
            source_overrides:
              lfc:
                path: "qiime2/ancombc/differentials/Category-{GROUP_COL}-level-2/lfc_slice.csv"
              p_val:
                path: "qiime2/ancombc/differentials/Category-{GROUP_COL}-level-2/p_val_slice.csv"
              q_val:
                path: "qiime2/ancombc/differentials/Category-{GROUP_COL}-level-2/q_val_slice.csv"
              w:
                path: "qiime2/ancombc/differentials/Category-{GROUP_COL}-level-2/w_slice.csv"
              se:
                path: "qiime2/ancombc/differentials/Category-{GROUP_COL}-level-2/se_slice.csv"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "id": "Taxonomy identifier"
              "contrast": "Statistical contrast (GROUP_COL-based comparison)"
              "lfc": "Log-fold change"
              "q_val": "FDR-adjusted p-value"
              "w": "ANCOM-BC test statistic"
              "Kingdom": "Kingdom level"
              "Phylum": "Phylum level"
              "neg_log10_qval": "-log10(q-value) for volcano plot"
              "significant": "q < 0.05"

      # ====================================================================
      # Advanced-viz canonical-schema DCs (consume the upstream typed DCs
      # above via dc_ref and rename to the role-based schema required by
      # depictio/models/components/advanced_viz/schemas.py).
      # ====================================================================

      - data_collection_tag: "stacked_taxonomy_canonical"
        description: "Stacked-taxonomy-ready relative abundance (sample/taxon/rank/abundance)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/stacked_taxonomy_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample_id": "Sample identifier"
              "taxon": "Taxon name"
              "rank": "Taxonomic rank (Phylum here)"
              "abundance": "Relative abundance (0-1)"
              "lineage": "Full taxonomy string"

      - data_collection_tag: "embedding_pcoa"
        description: "Sample embedding (PCoA on Bray-Curtis) for the advanced-viz embedding"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/embedding_pcoa.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample_id": "Sample identifier"
              "dim_1": "PCoA component 1"
              "dim_2": "PCoA component 2"
              "habitat": "Sample habitat (used as colour grouping)"

      - data_collection_tag: "rarefaction_canonical"
        description: "Multi-metric rarefaction curves (sample_id/depth/iter + per-metric cols)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/rarefaction_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample_id": "Sample identifier"
              "depth": "Subsampling depth"
              "iter": "Subsampling iteration"
              "shannon": "Shannon entropy"
              "observed_features": "Observed ASV count"
              "faith_pd": "Faith's Phylogenetic Diversity"
              "group": "Sample grouping column (habitat) — when metadata present"

      - data_collection_tag: "alpha_diversity_multi_canonical"
        description: "Per-sample multi-metric alpha-diversity (Shannon/Observed/Faith PD/Evenness)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "qiime2/alpha_diversity_multi_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample_id": "Sample identifier"
              "habitat": "Habitat type (Riverwater / Groundwater / Sediment / Soil)"
              "shannon": "Shannon entropy"
              "observed_features": "Observed ASV count"
              "faith_pd": "Faith's Phylogenetic Diversity"
              "evenness": "Pielou's evenness"

      - data_collection_tag: "complex_heatmap_canonical"
        description: "ComplexHeatmap-ready taxonomy matrix (Phylum × sample)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/complex_heatmap_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "Phylum": "Row identifier (use as index_column)"
              "Kingdom": "Row annotation (use as row_annotation_cols)"

      - data_collection_tag: "sunburst_canonical"
        description: "Sunburst-ready hierarchical taxonomy (Kingdom/Phylum/taxon + abundance)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/sunburst_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "Kingdom": "Top-level taxonomic rank"
              "Phylum": "Second-level taxonomic rank"
              "taxon": "Leaf taxonomy string"
              "abundance": "Relative abundance (leaf weight)"
              "sample_id": "Sample identifier (optional facet)"

      - data_collection_tag: "sankey_canonical"
        description: "Sankey-ready hierarchical flow (Kingdom → Phylum → taxon, weight=abundance)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/sankey_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "Kingdom": "Sankey step 1"
              "Phylum": "Sankey step 2"
              "taxon": "Sankey step 3 (leaf)"
              "abundance": "Link weight (relative abundance)"
              "sample_id": "Sample identifier"

      # Tier 2 derivations — UpSet (presence/absence) + Q-Q diagnostic + MA plot.
      - data_collection_tag: "upset_canonical"
        description: "UpSet-ready taxon × habitat binary presence matrix"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/upset_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "taxon": "Taxon identifier"

      - data_collection_tag: "ma_canonical"
        description: "MA-plot-ready (mean log abundance vs lfc) for ANCOM-BC"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/ma_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "feature_id": "Taxon identifier"
              "avg_log_intensity": "Mean log10(count + 1) across samples"
              "log2_fold_change": "ANCOM-BC log-fold change"
              "significance": "FDR-adjusted p-value"
              "label": "Display label (Phylum)"

      - data_collection_tag: "bray_curtis_canonical"
        description: "Sample × sample Bray-Curtis distance matrix (Beta diversity)"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/bray_curtis_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "sample": "Sample identifier (use as index_column; matrix is symmetric)"

      # Phase E — QIIME2 phylogenetic tree (tree.nwk) + tip-level taxonomy
      # metadata derived from the run's taxonomy.tsv.
      - data_collection_tag: "phylogenetic_tree_canonical"
        description: "QIIME2 phylogenetic tree (Newick) — tips are ASV identifiers"
        config:
          type: "phylogeny"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "{DATA_ROOT}/data/qiime2/phylogenetic_tree/tree.nwk"
          dc_specific_properties:
            format: "newick"
            ladderize: true
            metadata_dc_tag: "phylogenetic_tree_metadata_canonical"
            metadata_taxon_column: "taxon"

      - data_collection_tag: "phylogenetic_tree_metadata_canonical"
        description: "ASV → taxonomy mapping for the phylogenetic tree tips"
        config:
          type: "Table"
          source: "transformed"
          transform:
            recipe: "nf-core/ampliseq/tree_metadata_canonical.py"
          dc_specific_properties:
            format: "TSV"
            columns_description:
              "taxon": "ASV identifier (matches tree.nwk tip labels)"
              "Kingdom": "Domain (e.g. Bacteria / Archaea)"
              "Phylum": "Phylum"
              "Class": "Class"
              "Order": "Order"
              "Family": "Family"
              "Genus": "Genus"
              "Species": "Species"
              "confidence": "Classifier confidence (0–1)"
              "label": "Short display label (Phylum if known)"

# ============================================================================
# RUNTIME LINKS CONFIGURATION
# ============================================================================
# Links use data_collection_tag references (resolved to IDs at instantiation)
# ============================================================================

links:
  # Link 1 (always present): Samplesheet -> MultiQC (primary sample filter)
  - source_dc_tag: "samplesheet"
    source_column: "sampleID"
    target_dc_tag: "multiqc_data"
    target_type: "multiqc"
    link_config:
      resolver: "sample_mapping"
      target_field: "sample_name"
    description: "Filter MultiQC by samplesheet samples"
    enabled: true

  # Links 2-6 reference the metadata DC and are pruned automatically
  # when METADATA_FILE is absent (conditional block removes metadata DC).

  # Link 1b: Metadata -> MultiQC (secondary sample filter via metadata DC)
  # Without this, dashboards bound to metadata interactive filters
  # (habitat, sampling_date, sample) cannot narrow MultiQC plots.
  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "multiqc_data"
    target_type: "multiqc"
    link_config:
      resolver: "sample_mapping"
      target_field: "sample_name"
    description: "Filter MultiQC by metadata samples"
    enabled: true

  # Link 3: Metadata -> Alpha Rarefaction
  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "alpha_rarefaction"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter alpha rarefaction by metadata samples"
    enabled: true

  # Link 4: Metadata -> Taxonomy Composition
  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "taxonomy_composition"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter taxonomy composition by metadata samples"
    enabled: true

  # Link 5: Metadata -> Taxonomy Rel Abundance
  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "taxonomy_rel_abundance"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter taxonomy rel abundance by metadata samples"
    enabled: true

  # Link 6: Samplesheet -> Taxonomy Heatmap (always present, base filtering)
  - source_dc_tag: "samplesheet"
    source_column: "sampleID"
    target_dc_tag: "taxonomy_heatmap"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter taxonomy heatmap by samplesheet samples"
    enabled: true

  # Link 7: Metadata -> Taxonomy Heatmap (extended: enables habitat/city filtering)
  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "taxonomy_heatmap"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter taxonomy heatmap by metadata samples"
    enabled: true

  # --------------------------------------------------------------------------
  # Links 8-15: Metadata -> canonical advanced-viz DCs (sample_id-keyed).
  # Wire interactive metadata filters (sample, habitat, sampling_date) into
  # the canonical DCs that drive Alpha-diversity / Community / Ordination
  # plots. Without these, filters on the metadata DC silently no-op against
  # the advanced-viz plots.
  # --------------------------------------------------------------------------
  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "alpha_diversity_multi_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample_id"
    description: "Filter per-sample multi-metric alpha-diversity by metadata samples"
    enabled: true

  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "rarefaction_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample_id"
    description: "Filter multi-metric rarefaction curves by metadata samples"
    enabled: true

  # Alpha Diversity tab pairs an in-tab habitat/sample filter (sourced on
  # alpha_diversity_multi_canonical) with the rarefaction curve viz, so the
  # filter needs a same-tab link to the rarefaction DC as well — otherwise
  # picking a habitat on this tab narrows the cards/table/figure but leaves
  # the rarefaction viz unfiltered.
  - source_dc_tag: "alpha_diversity_multi_canonical"
    source_column: "sample_id"
    target_dc_tag: "rarefaction_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample_id"
    description: "Filter rarefaction by Alpha Diversity tab sample selection"
    enabled: true

  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "stacked_taxonomy_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample_id"
    description: "Filter stacked-taxonomy bars by metadata samples"
    enabled: true

  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "embedding_pcoa"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample_id"
    description: "Filter PCoA embedding by metadata samples"
    enabled: true

  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "sunburst_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample_id"
    description: "Filter sunburst by metadata samples"
    enabled: true

  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "sankey_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample_id"
    description: "Filter sankey flows by metadata samples"
    enabled: true

  # complex_heatmap_canonical and bray_curtis_canonical are wide matrices
  # (sample IDs are columns, not rows). Link uses target_field 'sample' for
  # the row index; wide-matrix column subsetting requires renderer support
  # (tracked separately).
  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "complex_heatmap_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter complex heatmap by metadata samples (best-effort on wide matrix)"
    enabled: true

  - source_dc_tag: "metadata"
    source_column: "sample"
    target_dc_tag: "bray_curtis_canonical"
    target_type: "table"
    link_config:
      resolver: "direct"
      target_field: "sample"
    description: "Filter Bray-Curtis distances by metadata samples (best-effort on wide matrix)"
    enabled: true

  # (volcano + DA-barplot both bind directly to ancombc_results now, so the
  # Contrast filter applies natively — no per-DC contrast join needed.)
  # upset_canonical is per-habitat (no sample_id col) — not linked.
  # phylogenetic_tree_canonical is a Newick file (no row filtering applicable).
  # phylogenetic_tree_metadata_canonical tip pruning requires React renderer
  # support — tracked as a follow-up.
