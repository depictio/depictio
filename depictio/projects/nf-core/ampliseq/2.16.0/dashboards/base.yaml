tabs:
- title: Community Analysis
  subtitle: Alpha Diversity & Taxonomic Composition
  tab_order: 1
  tab_icon: mdi:bacteria-outline
  tab_icon_color: teal
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 646b0f3c1e4a2d7f8e5b8cb3
  components:
  - component_type: card
    workflow_tag: ampliseq
    data_collection_tag: taxonomy_rel_abundance
    aggregation: nunique
    column_name: taxonomy
    column_type: object
    display:
      icon_name: mdi:bacteria
      icon_color: '#8BC34A'
      title_color: '#8BC34A'
      title_font_size: xl
      value_font_size: xl
    tag: card-taxonomy_nunique-d2ba1c
    layout:
      x: 2
      y: 0
      w: 2
      h: 2
    title: Total Taxa
  - component_type: card
    workflow_tag: ampliseq
    data_collection_tag: alpha_diversity
    aggregation: average
    column_name: faith_pd
    column_type: float64
    display:
      icon_name: mdi:chart-line
      icon_color: '#F68B33'
      title_color: '#F68B33'
      title_font_size: xl
      value_font_size: xl
    tag: card-faith_pd_average-66fb50
    layout:
      x: 4
      y: 0
      w: 2
      h: 2
    title: Mean Faith PD
  - component_type: figure
    workflow_tag: ampliseq
    data_collection_tag: alpha_rarefaction
    visu_type: line
    figure_params:
      x: depth
      y: faith_pd
      color: sample
      title: Alpha Diversity Rarefaction Curves
      labels:
        depth: Rarefaction Depth
        faith_pd: Faith's Phylogenetic Diversity
    mode: code
    code_content: "df_modified = df.group_by([\"sample\", \"depth\"]).agg([\n    pl.col(\"\
      faith_pd\").mean().alias(\"mean\"),\n    pl.col(\"faith_pd\").std().alias(\"\
      std\")\n]).sort(\"depth\")\n\nfig = px.line(\n    df_modified.to_pandas(),\n\
      \    x=\"depth\", y=\"mean\", color=\"sample\",\n    error_y=\"std\", markers=True,\n\
      \    labels={\"depth\": \"Rarefaction Depth\", \"mean\": \"Faith's Phylogenetic\
      \ Diversity\"},\n    title=\"Alpha Diversity Rarefaction Curves\"\n)\nfig.update_traces(mode=\"\
      lines+markers\")\nfig.update_layout(yaxis={'rangemode': 'tozero'})"
    selection_enabled: false
    tag: figure-line_depth_faith_pd-5d9f17
    layout:
      x: 0
      y: 2
      w: 8
      h: 5
  - component_type: figure
    workflow_tag: ampliseq
    data_collection_tag: alpha_diversity
    visu_type: bar
    figure_params:
      x: habitat
      y: faith_pd
      color: habitat
      title: Alpha Diversity by Habitat (Faith PD)
      labels:
        habitat: Habitat
        faith_pd: Faith's Phylogenetic Diversity
    mode: code
    code_content: "df_modified = df.to_pandas().groupby('habitat')['faith_pd'].agg(['mean',\
      \ 'std']).reset_index()\nfig = px.bar(\n    df_modified, x='habitat', y='mean',\
      \ color='habitat',\n    error_y='std',\n    color_discrete_map={'Riverwater':\
      \ '#377EB8', 'Groundwater': '#4DAF4A', 'Sediment': '#E41A1C', 'Soil': '#FF7F00'},\n\
      \    title='Alpha Diversity by Habitat (Faith PD)',\n    labels={'habitat': 'Habitat',\
      \ 'mean': \"Faith's Phylogenetic Diversity\"}\n)\nfig.update_layout(xaxis={'categoryorder':\
      \ 'category ascending'}, yaxis={'rangemode': 'tozero'}, showlegend=False)"
    selection_enabled: false
    tag: figure-bar_sample_faith_pd-5b8018
    layout:
      x: 0
      y: 7
      w: 4
      h: 5
  - component_type: figure
    workflow_tag: ampliseq
    data_collection_tag: taxonomy_rel_abundance
    visu_type: sunburst
    figure_params:
      path:
      - Kingdom
      - Phylum
      values: rel_abundance
      title: Taxonomic Composition - Hierarchical View (Relative Abundance)
    mode: code
    code_content: "df_modified = df.filter((pl.col('Phylum').is_not_null()) & (pl.col('Phylum')\
      \ != '') & (pl.col('Phylum') != 'Unclassified')).group_by(['Kingdom', 'Phylum']).agg(pl.col('rel_abundance').mean())\n\
      \nfig = px.sunburst(df_modified.to_dicts(), path=['Kingdom', 'Phylum'],\nvalues='rel_abundance',\n\
      color='Kingdom',\ncolor_discrete_map={'Bacteria': '#F8766D', 'Archaea': '#00BFC4'},\n\
      title='Taxonomic Composition - Hierarchical View (Relative Abundance)')"
    selection_enabled: false
    tag: figure-sunburst-e651a9
    layout:
      x: 4
      y: 7
      w: 4
      h: 5
  - component_type: figure
    workflow_tag: ampliseq
    data_collection_tag: taxonomy_rel_abundance
    visu_type: bar
    figure_params:
      x: Phylum
      y: mean_rel_abundance
      color: Phylum
      facet_row: habitat
      title: Mean Relative Abundance by Habitat
      labels:
        Phylum: Phylum
        mean_rel_abundance: Mean Relative Abundance
        habitat: Habitat
    mode: code
    code_content: "df_mean = df.group_by(['habitat', 'Phylum']).agg(pl.col('rel_abundance').mean().alias('mean_rel_abundance')).sort('Phylum')\n\
      fig = px.bar(\n    df_mean.to_pandas(),\n    x='Phylum', y='mean_rel_abundance',\
      \ color='Phylum',\n    facet_row='habitat',\n    title='Mean Relative Abundance\
      \ by Habitat',\n    labels={'Phylum': 'Phylum', 'mean_rel_abundance': 'Mean\
      \ Relative Abundance'}\n)\nfig.update_layout(xaxis={'categoryorder': 'category\
      \ ascending'})\nfig.update_xaxes(tickangle=-45, tickfont={'size': 9})\nfig.update_layout(showlegend=False)"
    selection_enabled: false
    tag: figure-bar_phylum_rel_abundance-de4c39
    layout:
      x: 0
      y: 12
      w: 8
      h: 8
  - component_type: figure
    workflow_tag: ampliseq
    data_collection_tag: taxonomy_rel_abundance
    visu_type: bar
    figure_params:
      x: sample
      y: rel_abundance
      color: Phylum
      facet_col: habitat
      title: Taxonomic Composition by Sample (Relative Abundance)
      labels:
        sample: Sample ID
        rel_abundance: Relative Abundance
        Phylum: Phylum
      barmode: stack
    mode: code
    code_content: "df_sorted = df.sort('sample')\nfig = px.bar(\n    df_sorted.to_pandas(),\n\
      \    x='sample', y='rel_abundance', color='Phylum',\n    facet_col='habitat',\n\
      \    title='Taxonomic Composition by Sample (Relative Abundance)',\n    labels={'sample':\
      \ 'Sample ID', 'rel_abundance': 'Relative Abundance', 'Phylum': 'Phylum'},\n\
      \    barmode='stack',\n    category_orders={'sample': sorted(df_sorted['sample'].unique().to_list())}\n\
      )\nfig.update_xaxes(matches=None, tickangle=-45, tickfont={'size': 9})\nfig.for_each_xaxis(lambda\
      \ axis: axis.update(categoryorder='category ascending'))"
    selection_enabled: false
    tag: figure-bar_sample_rel_abundance-de4c39
    layout:
      x: 0
      y: 24
      w: 8
      h: 8
  - component_type: table
    workflow_tag: ampliseq
    data_collection_tag: taxonomy_rel_abundance
    title: Taxonomy Relative Abundance
    description: Phylum-level relative abundance per sample with habitat annotations
    title_size: h2
    title_align: left
    row_selection_enabled: false
    tag: table-table-02f050
    layout:
      x: 0
      y: 32
      w: 8
      h: 6
