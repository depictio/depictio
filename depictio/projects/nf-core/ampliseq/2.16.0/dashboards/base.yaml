tabs:
- title: Alpha Diversity
  subtitle: Within-sample richness, evenness, phylogenetic spread — rarefaction + per-group boxplots
  tab_order: 1
  tab_icon: mdi:chart-bell-curve
  tab_icon_color: orange
  icon: /assets/images/workflows/nf-core.png
  icon_color: green
  workflow_system: nf-core
  dashboard_id: 646b0f3c1e4a2d7f8e5b8cbe
  components:
  - component_type: text
    workflow_tag: ampliseq
    title_size: sm
    title_align: left
    order: 1
    alignment: left
    tag: text-alpha-section-header-78cb12
    index: alpha-section-header
    layout:
      x: 0
      y: 0
      w: 8
      h: 1
    title: Within-Sample Diversity
    body: Shannon, observed features and Faith's PD measure within-sample richness and evenness. Rarefaction curves should asymptote — if they keep climbing, the library wasn't sequenced deep enough to saturate species accumulation.
  - use: qiime2/alpha_sample_filter
    workflow_tag: ampliseq
    data_collection_tag: alpha_diversity_multi_canonical
    column_type: object
    display:
      title_size: md
      custom_color: '#45B8AC'
      icon_name: mdi:flask
    title_align: left
    placement: left
    tag: interactive-alpha-sample-filter-235a5d
    index: alpha-sample-filter
    layout:
      x: 0
      y: 0
      w: 1
      h: 3
    title: Sample ID
  - component_type: interactive
    workflow_tag: ampliseq
    data_collection_tag: alpha_diversity_multi_canonical
    interactive_component_type: MultiSelect
    column_name: '{GROUP_COL}'
    column_type: object
    display:
      title_size: md
      custom_color: '#984EA3'
      icon_name: mdi:earth
    title_align: left
    placement: left
    tag: interactive-alpha-habitat-filter-f2247a
    index: alpha-habitat-filter
    layout:
      x: 0
      y: 3
      w: 1
      h: 2
    title: '{GROUP_COL_DISPLAY}'
  - use: qiime2/samples_card
    workflow_tag: ampliseq
    data_collection_tag: alpha_diversity_multi_canonical
    column_type: object
    display:
      icon_name: mdi:flask
      icon_color: '#45B8AC'
      title_color: '#45B8AC'
      title_font_size: xl
      value_font_size: xl
    title_size: sm
    title_align: left
    secondary_layout: vertical
    top_n_count: 3
    tag: card-alpha-card-samples-fdaa66
    index: alpha-card-samples
    layout:
      x: 0
      y: 1
      w: 2
      h: 2
    title: Total Samples
  - use: qiime2/shannon_card
    workflow_tag: ampliseq
    data_collection_tag: alpha_diversity_multi_canonical
    aggregation: median
    column_type: float64
    display:
      icon_name: mdi:chart-bell-curve
      icon_color: '#F68B33'
      title_color: '#F68B33'
      title_font_size: xl
      value_font_size: xl
    title_size: sm
    title_align: left
