    column_name: faith_pd
    column_type: float64
    display:
      title_size: md
      custom_color: '#9C27B0'
      icon_name: mdi:chart-box-outline
    tag: interactive-range-faith-pd-slider-5cf75b
    index: range-faith-pd-slider
    layout:
      x: 0
      y: 13
      w: 1
      h: 3
    title: Faith PD Range
  - component_type: interactive
    workflow_tag: ampliseq
    data_collection_tag: taxonomy_rel_abundance
    interactive_component_type: RangeSlider
    column_name: rel_abundance
    column_type: float64
    display:
      title_size: md
      custom_color: '#FF9800'
      icon_name: mdi:counter
    tag: interactive-range-rel-abundance-slider-7e70dc
