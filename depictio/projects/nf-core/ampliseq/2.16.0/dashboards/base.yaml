    title_size: sm
    title_align: left
    order: 1
    alignment: left
    tag: text-alpha-section-boxplot-4d596d
    index: alpha-section-boxplot
    layout:
      x: 0
      y: 11
      w: 8
      h: 1
    title: Per-Habitat Comparison
