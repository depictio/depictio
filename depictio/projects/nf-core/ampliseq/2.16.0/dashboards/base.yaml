      h: 1
    title: QC Overview
    body: MultiQC aggregates per-sample quality control metrics from FastQC, Cutadapt and DADA2. Watch adapter content, GC%, and per-base sequence quality for outlier samples.
  # Bound to the always-present multiqc_data DC (sample options come from the
  # ingested sample list) so the MultiQC tab keeps a working sample filter on
  # every route — the metadata DC that would otherwise back it is pruned on
  # no-metadata runs. _resolve_multiqc_sample_filter expands the picked sample
  # to its per-report variants when filtering the plots.
