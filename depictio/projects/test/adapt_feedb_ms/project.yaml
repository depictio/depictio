# Adaptive Feedback Microscopy - Real-time Test Project
# Used to test WebSocket-driven dashboard refresh with SVLT simulation data
id: "750a1b2c3d4e5f6a7b8c9d0e"
name: "Adaptive Feedback Microscopy"
is_public: true

realtime:
  enabled: true
  debounce_ms: 500

workflows:
  - id: "750a1b2c3d4e5f6a7b8c9d0f"
    name: "microscopy_workflow"
    engine:
      name: "python"
    data_location:
      structure: "flat"
      locations:
        - depictio/projects/test/adapt_feedb_ms
    data_collections:
      # Phenobase table - populated by SVLT PhenoBase.write() via S3 delta table
      - id: "750a1b2c3d4e5f6a7b8c9d10"
        data_collection_tag: "microscopy_phenobase"
        description: "Phenotype measurements from virtual microscopy experiment"
        config:
          type: "Image"
          metatype: "Images"
          scan:
            mode: single
            scan_parameters:
              filename: depictio/projects/test/adapt_feedb_ms/phenobase.csv
          dc_specific_properties:
            format: "csv"
            columns_description:
              index_index: "Unique cell identifier"
              coord_counter: "Image counter index"
              acquisition_timestamp: "Acquisition time (ISO 8601)"
              features_area: "ROI area in pixels"
              features_eccentricity: "Cell shape eccentricity (0=circle, 1=elongated)"
              features_solidity: "Cell shape solidity (1=convex, lower=irregular)"
              features_intensity_mean-0: "Mean intensity channel 0 (red)"
              features_intensity_mean-1: "Mean intensity channel 1 (green)"
              features_intensity_mean-2: "Mean intensity channel 2 (blue)"
              bounding_box_x0: "Bounding box X origin"
              bounding_box_y0: "Bounding box Y origin"
              classifications_taxa: "Cell classification label (Taxa 1/Taxa 2)"
            image_column: "patches_patches_2d_rgb_path"
            s3_base_folder: "s3://depictio-bucket/750a1b2c3d4e5f6a7b8c9d10/images/phenobase/"
            supported_formats: [".tif", ".tiff", ".png"]
            thumbnail_size: 150
