# Adaptive Feedback Microscopy - Real-time Dashboard
title: "Microscopy Real-time Monitor"
subtitle: "Real-time monitoring of virtual microscopy experiment phenotype data"
project_tag: "Adaptive Feedback Microscopy"
dashboard_id: "750a1b2c3d4e5f6a7b8c9d20"

components:
  # ── Top Panel: Timeline scrubber (placement: top) ────────────────────────
  # Sits in a slim conditional bar above the dashboard grid (right column
  # only). Lets the user constrain every downstream component to a single
  # acquisition window. Switchable timescale (year/month/day/hour/minute) at
  # runtime.

  - tag: acquisition-timeline
    component_type: interactive
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    interactive_component_type: Timeline
    column_name: acquisition_timestamp
    column_type: datetime
    placement: top
    timescale: minute
    title: "Acquisition window"
    icon_name: mdi:clock-outline

  # ── Left Panel: Filters ──────────────────────────────────────────────────

  # Taxa MultiSelect scoped to "large" cells only — demonstrates filter_expr
  # as advanced interactive scoping (the dropdown options reflect only taxa
  # whose features_area > 100, computed server-side via the safe Polars
  # filter expression evaluator).
  - tag: taxa-filter
    component_type: interactive
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    interactive_component_type: MultiSelect
    column_name: classifications_taxa
    column_type: object
    filter_expr: "col('features_area') > 100"
    title: "Taxa Class (large cells only)"
    icon_name: mdi:bacteria
    layout:
      x: 0
      y: 0
      w: 1
      h: 3

  # ── Combined "Shape filters" group ───────────────────────────────────────
  # Three interactive components sharing the same `group` are rendered
  # together inside one Mantine Paper — visual grouping only, each control
  # still emits its own filter and they AND together via the existing
  # filter pipeline (max 3 components per group is enforced server-side).

  - tag: area-range-filter
    component_type: interactive
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    interactive_component_type: RangeSlider
    column_name: features_area
    column_type: float64
    group: "Shape filters"
    title: "Cell Area"
    icon_name: mdi:vector-square
    layout:
      x: 0
      y: 3
      w: 1
      h: 3

  - tag: eccentricity-range-filter
    component_type: interactive
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    interactive_component_type: RangeSlider
    column_name: features_eccentricity
    column_type: float64
    group: "Shape filters"
    title: "Eccentricity"
    icon_name: mdi:shape-outline
    layout:
      x: 0
      y: 6
      w: 1
      h: 3

  - tag: solidity-range-filter
    component_type: interactive
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    interactive_component_type: RangeSlider
    column_name: features_solidity
    column_type: float64
    group: "Shape filters"
    title: "Solidity"
    icon_name: mdi:diamond-stone
    layout:
      x: 0
      y: 9
      w: 1
      h: 3

  # ── Right Panel Row 0 (y=0, h=3): 4 summary cards ─────────────────────

  - tag: total-cells
    component_type: card
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    aggregation: count
    column_name: index_index
    column_type: int64
    title: "Total Cells"
    icon_name: mdi:counter
    icon_color: "#2196F3"
    layout:
      x: 0
      y: 0
      w: 2
      h: 4

  - tag: mean-area
    component_type: card
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    aggregation: average
    column_name: features_area
    column_type: float64
    title: "Mean Area"
    icon_name: mdi:vector-square
    icon_color: "#4CAF50"
    layout:
      x: 2
      y: 0
      w: 2
      h: 4

  # Multi-metrics card: hero (average) + secondary rows (min/max/std_dev).
  # Server returns secondary_values via /bulk_compute_cards; CardRenderer
  # stacks the secondary rows under the hero.
  - tag: mean-solidity
    component_type: card
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    aggregation: average
    aggregations:
      - min
      - max
      - std_dev
    column_name: features_solidity
    column_type: float64
    title: "Solidity Stats"
    icon_name: mdi:diamond-stone
    icon_color: "#FF9800"
    layout:
      x: 4
      y: 0
      w: 2
      h: 5

  - tag: area-summary
    component_type: card
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    aggregation: average
    aggregations:
      - median
      - std_dev
      - min
      - max
    column_name: features_area
    column_type: float64
    icon_name: mdi:chart-box-outline
    icon_color: "#9C27B0"
    title: "Area Stats"
    layout:
      x: 6
      y: 0
      w: 2
      h: 5

  # ── Right Panel Row 5 (y=4, h=5): scatter plots ───────────────────────

  - tag: morphology-scatter
    component_type: figure
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    visu_type: scatter
    dict_kwargs:
      x: features_area
      y: features_eccentricity
      color: classifications_taxa
      color_discrete_map: '{"1": "#636EFA", "2": "#EF553B"}'
      category_orders: '{"classifications_taxa": [1, 2]}'
      title: "Area vs Eccentricity"
    selection_enabled: true
    selection_column: index_index
    layout:
      x: 0
      y: 5
      w: 4
      h: 5

  - tag: intensity-scatter
    component_type: figure
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    visu_type: scatter
    dict_kwargs:
      x: features_intensity_mean-0
      y: features_intensity_mean-2
      color: classifications_taxa
      color_discrete_map: '{"1": "#636EFA", "2": "#EF553B"}'
      category_orders: '{"classifications_taxa": [1, 2]}'
      title: "Red vs Blue Intensity"
    selection_enabled: true
    selection_column: index_index
    layout:
      x: 4
      y: 5
      w: 4
      h: 5

  # ── Right Panel Row 10 (y=8, h=4): taxa balance + box plot ─────────────

  - tag: taxa-histogram
    component_type: figure
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    visu_type: bar
    mode: code
    code_content: |
      import plotly.express as px
      import polars as pl
      df_modified = df.group_by("classifications_taxa").len().sort("classifications_taxa").with_columns(pl.col("classifications_taxa").cast(pl.Utf8)).to_pandas()
      fig = px.bar(
          df_modified,
          x="classifications_taxa",
          y="len",
          color="classifications_taxa",
          color_discrete_map={"1": "#636EFA", "2": "#EF553B"},
          category_orders={"classifications_taxa": ["1", "2"]},
          labels={"len": "Count", "classifications_taxa": "Taxa"},
          title="Taxa Class Balance",
      )
    layout:
      x: 0
      y: 10
      w: 4
      h: 4

  - tag: area-box-by-taxa
    component_type: figure
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    visu_type: box
    dict_kwargs:
      x: classifications_taxa
      y: features_area
      color: classifications_taxa
      color_discrete_map: '{"1": "#636EFA", "2": "#EF553B"}'
      category_orders: '{"classifications_taxa": [1, 2]}'
      title: "Area Distribution by Taxa"
    layout:
      x: 4
      y: 10
      w: 4
      h: 4

  # ── Right Panel Row 12 (y=12, h=4): area histogram full width ─────────

  - tag: area-histogram
    component_type: figure
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    visu_type: histogram
    dict_kwargs:
      x: features_area
      color: classifications_taxa
      color_discrete_map: '{"1": "#636EFA", "2": "#EF553B"}'
      category_orders: '{"classifications_taxa": [1, 2]}'
      title: "Area Distribution"
    layout:
      x: 0
      y: 14
      w: 8
      h: 4

  # ── Right Panel Row 16 (y=16, h=5): image gallery + detail table ──────

  - tag: cell-gallery
    component_type: image
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    image_column: patches_patches_2d_rgb_path
    s3_base_folder: "s3://depictio-bucket/750a1b2c3d4e5f6a7b8c9d10/images/phenobase/"
    thumbnail_size: 120
    columns: 4
    max_images: 50
    layout:
      x: 0
      y: 18
      w: 3
      h: 5

  - tag: detail-table
    component_type: table
    workflow_tag: python/microscopy_workflow
    data_collection_tag: microscopy_phenobase
    columns:
      - index_index
      - classifications_taxa
      - features_area
      - features_eccentricity
      - features_solidity
      - features_intensity_mean-0
      - features_intensity_mean-2
      - coord_counter
    page_size: 15
    row_selection_enabled: true
    row_selection_column: index_index
    layout:
      x: 3
      y: 18
      w: 5
      h: 5
