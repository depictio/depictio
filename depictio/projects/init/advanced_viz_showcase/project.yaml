# Advanced visualisation showcase — one dashboard per viz kind plus an
# overview tab. Backed by deterministic synthetic TSVs generated by
# scripts/generate_fixtures.py so the demo is reproducible and self-contained.

id: "646b0f3c1e4a2d7f8e5b8d00"
name: "Advanced Visualisation Showcase"
project_type: "advanced"
is_public: true
workflows:
  - id: "646b0f3c1e4a2d7f8e5b8d01"
    name: "advanced_viz_demo"
    engine:
      name: "python"
      version: "3.11"
    description: "Synthetic fixtures for the four advanced viz: volcano, embedding, manhattan, stacked taxonomy"
    data_location:
      structure: "sequencing-runs"
      runs_regex: "run_*"
      locations:
        - /app/depictio/projects/init/advanced_viz_showcase/data
    data_collections:
      # ----------------------------------------------------------------
      # 1. Volcano canonical schema (feature_id / effect_size / significance)
      # ----------------------------------------------------------------
      - id: "646b0f3c1e4a2d7f8e5b8d02"
        data_collection_tag: "volcano_demo"
        description: "Synthetic volcano: 200 features x 2 contrasts; ~15% are designed hits"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/volcano_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              feature_id: "Gene-like feature identifier (e.g. GENE042)"
              effect_size: "log2 fold change"
              significance: "p-value (raw — client toggles -log10 transform)"
              label: "Hover label (gene id here)"
              category: "Pathway label for colouring"
              avg_log_intensity: "Mean log intensity across replicates — drives the MA plot's x axis"

      # ----------------------------------------------------------------
      # 2. Four embedding DCs — same 90×200 feature matrix, projected with
      #    PCA / UMAP / t-SNE / PCoA respectively. Same canonical schema:
      #    sample_id / dim_1 / dim_2 / cluster / color. The four "Clustering"
      #    dashboard tabs each bind to one of these.
      # ----------------------------------------------------------------
      - id: "646b0f3c1e4a2d7f8e5b8d03"
        data_collection_tag: "embedding_pca"
        description: "PCA projection of a synthetic 90×200 sample×feature matrix (3 clusters)"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/embedding_pca.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier (S000..S089)"
              dim_1: "PCA component 1"
              dim_2: "PCA component 2"
              dim_3: "PCA component 3 (drives the 3D view)"
              cluster: "True cluster label used to generate the point (control/treatment/recovery)"
              color: "Continuous gradient correlated with dim_1"

      - id: "646b0f3c1e4a2d7f8e5b8d06"
        data_collection_tag: "embedding_umap"
        description: "UMAP projection of the same synthetic feature matrix"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/embedding_umap.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier"
              dim_1: "UMAP dimension 1"
              dim_2: "UMAP dimension 2"
              dim_3: "UMAP dimension 3 (drives the 3D view)"
              cluster: "True cluster label"
              color: "Continuous gradient correlated with dim_1"

      - id: "646b0f3c1e4a2d7f8e5b8d07"
        data_collection_tag: "embedding_tsne"
        description: "t-SNE projection of the same synthetic feature matrix"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/embedding_tsne.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier"
              dim_1: "t-SNE dimension 1"
              dim_2: "t-SNE dimension 2"
              dim_3: "t-SNE dimension 3 (drives the 3D view)"
              cluster: "True cluster label"
              color: "Continuous gradient correlated with dim_1"

      - id: "646b0f3c1e4a2d7f8e5b8d08"
        data_collection_tag: "embedding_pcoa"
        description: "PCoA (Bray-Curtis) projection of a non-negative shift of the same matrix"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/embedding_pcoa.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier"
              dim_1: "PCoA dimension 1"
              dim_2: "PCoA dimension 2"
              dim_3: "PCoA dimension 3 (drives the 3D view)"
              cluster: "True cluster label"
              color: "Continuous gradient correlated with dim_1"

      # ----------------------------------------------------------------
      # 3. Manhattan (chr / pos / score, with a few designed hits)
      # ----------------------------------------------------------------
      - id: "646b0f3c1e4a2d7f8e5b8d04"
        data_collection_tag: "manhattan_demo"
        description: "Synthetic Manhattan: 23 chromosomes x ~40 noise points + 6 designed hits"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/manhattan_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              chr: "Chromosome label (chr1..chr22, chrX)"
              pos: "Genomic position (1-based)"
              score: "-log10(padj) — higher = more significant"
              feature: "SNP id for designed hits (empty otherwise)"
              score_kind: "Y-axis label hint for the renderer"
              p_value: "Raw p-value (derived from score; drives the QQ plot)"

      # ----------------------------------------------------------------
      # 4. Stacked taxonomy (sample_id / taxon / rank / abundance)
      # ----------------------------------------------------------------
      - id: "646b0f3c1e4a2d7f8e5b8d05"
        data_collection_tag: "stacked_taxonomy_demo"
        description: "Synthetic taxonomy: 18 samples x 9 taxa, two ranks (Phylum + Genus)"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/stacked_taxonomy_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier (sample_gut_1 .. sample_soil_6)"
              taxon: "Taxon name at the indicated rank"
              rank: "Taxonomic rank (Phylum or Genus)"
              abundance: "Relative abundance, normalised within (sample, rank)"
              lineage: "Phylum;Genus path for Genus rows, Phylum alone for Phylum rows"
              Kingdom: "Top-level taxonomic kingdom (Bacteria) — sunburst root"
              Phylum: "Phylum — second-level sunburst arc"
              Class: "Class — third-level sunburst arc (synthetic '<Phylum>_class')"
              Order: "Order — fourth-level sunburst arc"
              Family: "Family — fifth-level sunburst arc"
              Genus: "Genus — leaf-level sunburst arc"

      # ----------------------------------------------------------------
      # 5. Phylogenetic tree (newick file + metadata table). The tree DC
      #    type=phylogeny — served via /advanced_viz/phylogeny/{dc_id}/newick.
      #    The metadata DC is a regular Table keyed by 'taxon'.
      # ----------------------------------------------------------------
      # The raw 90×80 feature matrix — input for live Celery PCA/UMAP/t-SNE/
      # PCoA. The clustering tabs use this DC + a method + params; the API's
      # /advanced_viz/compute_embedding endpoint dispatches a Celery task
      # that runs the dim-reduction on demand and returns 2D coords.
      - id: "646b0f3c1e4a2d7f8e5b8d0b"
        data_collection_tag: "embedding_features"
        description: "Sample × feature matrix used as input to live Celery clustering"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/embedding_features.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier (S000..S089)"

      # Rarefaction (alpha-diversity vs sequencing depth).
      - id: "646b0f3c1e4a2d7f8e5b8d20"
        data_collection_tag: "rarefaction_demo"
        description: "Synthetic alpha-rarefaction: 18 samples × 12 depths × 10 iters (Faith PD + observed_features), habitat-stratified"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/rarefaction_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier (sample_gut_1 .. sample_soil_6)"
              depth: "Subsampling depth (reads)"
              iter: "Iteration index for the rarefaction subsampling"
              faith_pd: "Faith's Phylogenetic Diversity at that depth"
              observed_features: "Number of observed features (richness)"
              habitat: "Sample habitat (gut / skin / soil)"

      # ANCOM-BC differentials (3 contrasts × 200 taxa).
      - id: "646b0f3c1e4a2d7f8e5b8d21"
        data_collection_tag: "ancombc_demo"
        description: "Synthetic ANCOM-BC: 200 taxa × 3 contrasts with lfc + significance + Phylum label"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/ancombc_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              feature_id: "Taxon identifier (OTU0000..OTU0199)"
              contrast: "Pairwise habitat contrast (gut_vs_skin / gut_vs_soil / skin_vs_soil)"
              lfc: "Signed log-fold change"
              significance: "FDR-adjusted p-value"
              label: "Phylum;taxon — display label"
              neg_log10_q: "-log10(significance), precomputed for convenience"

      # GSEA / GO / KEGG / Reactome pathway-enrichment dot plot.
      - id: "646b0f3c1e4a2d7f8e5b8d25"
        data_collection_tag: "gsea_demo"
        description: "Synthetic pathway-enrichment results across 5 ontologies (GO_BP / GO_CC / KEGG / Reactome / Hallmark)"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/gsea_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              term: "Pathway / GO term name (with ontology prefix)"
              source: "Ontology source — GO_BP / GO_CC / KEGG / Reactome / Hallmark"
              nes: "Normalised enrichment score (signed)"
              padj: "FDR-adjusted p-value"
              gene_count: "Gene-set size"
              leading_edge: "Comma-separated leading-edge gene IDs"

      # UpSet plot input — binary set-membership table.
      - id: "646b0f3c1e4a2d7f8e5b8d28"
        data_collection_tag: "upset_demo"
        description: "Synthetic set-membership: 400 features × 5 contrasts (0/1 membership indicators)"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/upset_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              feature_id: "Feature identifier"
              feature_group: "Categorical bucket (kinase / metabolic / signalling / structural / transcription_factor) — used by the dashboard MultiSelect to pre-filter intersections"
              contrastA: "1 if feature is differentially expressed in contrast A"
              contrastB: "1 if feature is differentially expressed in contrast B"
              contrastC: "1 if feature is differentially expressed in contrast C"
              contrastD: "1 if feature is differentially expressed in contrast D"
              contrastE: "1 if feature is differentially expressed in contrast E"

      # Single-cell marker dot plot fixture.
      - id: "646b0f3c1e4a2d7f8e5b8d30"
        data_collection_tag: "dotplot_demo"
        description: "Synthetic single-cell marker matrix: 6 clusters × 25 marker genes with cluster-specific expression"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/dotplot_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              cluster: "Cluster name (T_cell / B_cell / Monocyte / NK / Dendritic / Plasma)"
              gene: "Marker gene symbol"
              mean_expression: "Mean expression of the gene within the cluster (continuous → dot colour)"
              frac_expressing: "Fraction of cells in the cluster expressing the gene (0–1 → dot size)"

      # Lollipop / needle plot fixture — variant tracks along 4 genes.
      - id: "646b0f3c1e4a2d7f8e5b8d31"
        data_collection_tag: "lollipop_demo"
        description: "Synthetic variant tracks: 4 cancer genes × 50–80 variants × 5 consequence categories"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/lollipop_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              feature_id: "Gene the variant is on (TP53 / BRCA1 / EGFR / KRAS)"
              position: "1-based position along the gene"
              category: "Variant consequence (missense / synonymous / stop_gained / frameshift / splice_region)"
              effect: "Effect-strength score (drives marker size)"

      # Oncoplot fixture — long-format sample × gene × mutation observations.
      - id: "646b0f3c1e4a2d7f8e5b8d32"
        data_collection_tag: "oncoplot_demo"
        description: "Synthetic cancer cohort: 40 samples × 30 genes × 5 mutation types (sparse)"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/oncoplot_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier (TCGA-000 .. TCGA-039)"
              gene: "Mutated gene symbol"
              mutation_type: "Mutation classification (Missense_Mutation / Nonsense_Mutation / Frame_Shift_Del / Frame_Shift_Ins / In_Frame_Del)"

      # Coverage track input — viralrecon-mosdepth-derived per-bin coverage.
      - id: "646b0f3c1e4a2d7f8e5b8d50"
        data_collection_tag: "coverage_track_demo"
        description: "SARS-CoV-2 coverage tracks (200 bp bins) for ~50 samples with SARS-CoV-2 gene-region annotation; sourced from a viralrecon-bowtie2-mosdepth run"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/coverage_track_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              chrom: "Reference contig / chromosome (MN908947.3 for SARS-CoV-2)"
              start: "Bin start position (0-based, half-open)"
              end: "Bin end position"
              position: "Bin centre — drives the renderer's x axis"
              coverage: "Mean read depth in the bin"
              sample: "Sample identifier (used as the per-track facet key)"
              gene_region: "SARS-CoV-2 gene-region annotation (ORF1ab / S / N / … / intergenic) — drives the coverage-track colouring lane"

      # Categorical-flow (Sankey) input — per-sample lineage classification.
      - id: "646b0f3c1e4a2d7f8e5b8d51"
        data_collection_tag: "categorical_flow_demo"
        description: "Per-sample Pangolin + Nextclade classification: qc_status → lineage → clade flow across SARS-CoV-2 samples"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/categorical_flow_demo.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              sample_id: "Sample identifier"
              qc_status: "Pangolin QC pass/fail (Sankey step 1)"
              lineage: "Pangolin lineage assignment (Sankey step 2)"
              clade: "Nextclade WHO clade assignment (Sankey step 3)"

      - id: "646b0f3c1e4a2d7f8e5b8d09"
        data_collection_tag: "bacterial_tree"
        description: "Bacterial phylogeny (21 taxa) — Newick file for the phylogenetic viz"
        config:
          type: "phylogeny"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/bacterial_tree.nwk"
          dc_specific_properties:
            format: "newick"
            ladderize: true
            metadata_dc_tag: "bacterial_metadata"
            metadata_taxon_column: "taxon"

      - id: "646b0f3c1e4a2d7f8e5b8d0a"
        data_collection_tag: "bacterial_metadata"
        description: "Tip metadata for the bacterial phylogeny (group / habitat / resistance)"
        config:
          type: "Table"
          metatype: "Aggregate"
          scan:
            mode: "single"
            scan_parameters:
              filename: "/app/depictio/projects/init/advanced_viz_showcase/data/bacterial_metadata.tsv"
          dc_specific_properties:
            format: "TSV"
            polars_kwargs:
              separator: "\t"
            columns_description:
              taxon: "Taxon name (joins to tip labels in the tree)"
              group: "Bacterial phylum (Proteobacteria / Firmicutes / ...)"
              habitat: "Habitat (Gut / Respiratory / Environmental / Soil)"
              genome_size_mb: "Genome size in megabases"
              resistance_profile: "MDR / Susceptible / Variable"

# No joins. Filters in each dashboard are scoped to a single DC.
