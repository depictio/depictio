# Iris Dataset Dashboard - DashboardDataLite format
# This file can be imported directly with: depictio dashboard import overview.yaml
version: 1

title: "Iris Dataset Analysis"
subtitle: "Overview of sepal/petal measurements across the three Iris varieties"
project_tag: "Iris Dataset Project Data Analysis"

components:
  # ── Narrative intro ────────────────────────────────────────────────
  - tag: text-overview-intro
    component_type: text
    title: "Iris Dataset — Overview"
    order: 2
    alignment: left
    body: |
      Fisher's classic Iris dataset — **150 flowers** across three varieties
      (*Setosa*, *Versicolor*, *Virginica*). This dashboard surfaces the
      cohort-level structure: cards summarise the four measurement columns
      with min/median/max strips, the scatter and box plots show species
      separability on sepal dimensions, and the histogram strip exposes
      distribution overlap. Use the left filters to narrow down by
      variety or sepal length and watch every tile re-compute.

  # ── Multi-metric summary cards ─────────────────────────────────────
  # Hero: sepal length with full statistical breakdown.
  - tag: sepal-length-summary
    component_type: card
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    aggregation: median
    aggregations:
      - box_plot_stats
    secondary_layout: box_plot
    column_name: sepal.length
    column_type: float64
    icon_name: mdi:flower-outline
    icon_color: "#9C27B0"
    title_color: "#9C27B0"
    title_font_size: xl
    value_font_size: xl
    title: "Sepal Length"

  # Hero: petal length, complementary to sepal length.
  - tag: petal-length-summary
    component_type: card
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    aggregation: median
    aggregations:
      - box_plot_stats
    secondary_layout: box_plot
    column_name: petal.length
    column_type: float64
    icon_name: mdi:leaf
    icon_color: "#43A047"
    title_color: "#43A047"
    title_font_size: xl
    value_font_size: xl
    title: "Petal Length"

  # Variety cardinality + dominant species (top-N breakdown).
  - tag: variety-breakdown
    component_type: card
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    aggregation: nunique
    column_name: variety
    column_type: object
    secondary_layout: top_n
    breakdown_col: variety
    top_n_count: 3
    icon_name: mdi:flower-tulip
    icon_color: "#2196F3"
    title_color: "#2196F3"
    title_font_size: xl
    value_font_size: xl
    title: "Unique Varieties"

  # Sample coverage (150 total, gauge view).
  - tag: sample-coverage
    component_type: card
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    aggregation: count
    column_name: variety
    column_type: object
    secondary_layout: coverage
    coverage_max: 150
    icon_name: mdi:counter
    icon_color: "#4CAF50"
    title_color: "#4CAF50"
    title_font_size: xl
    value_font_size: xl
    title: "Sample Count"

  # Conditional aggregation — long-sepal subset.
  - tag: large-sepal-count
    component_type: card
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    aggregation: count
    column_name: sepal.length
    column_type: float64
    filter_expr: "col('sepal.length') > 6"
    icon_name: mdi:filter-check-outline
    icon_color: "#607D8B"
    title_color: "#607D8B"
    title_font_size: lg
    value_font_size: xl
    title: "Samples w/ sepal > 6 cm"

  # ── Interactive filters (left sidebar) ─────────────────────────────
  - tag: sepal-length-filter
    component_type: interactive
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    interactive_component_type: RangeSlider
    column_name: sepal.length
    column_type: float64
    custom_color: "#9C27B0"
    icon_name: mdi:ruler

  - tag: petal-length-filter
    component_type: interactive
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    interactive_component_type: RangeSlider
    column_name: petal.length
    column_type: float64
    custom_color: "#43A047"
    icon_name: mdi:ruler

  - tag: variety-filter
    component_type: interactive
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    interactive_component_type: MultiSelect
    column_name: variety
    column_type: object
    custom_color: "#4CAF50"
    icon_name: mdi:filter-variant

  # Scoped variety filter — varieties seen among large-sepal samples only.
  - tag: large-sepal-variety-filter
    component_type: interactive
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    interactive_component_type: MultiSelect
    column_name: variety
    column_type: object
    filter_expr: "col('sepal.length') > 6"
    custom_color: "#FF9800"
    icon_name: mdi:filter-check
    title: "Varieties (sepal > 6)"

  # ── Figures ────────────────────────────────────────────────────────
  - tag: sepal-scatter
    component_type: figure
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    visu_type: scatter
    title: "Sepal Length vs Width by Variety"
    description: "Colour by variety. Species separability is clearest along sepal length."
    title_size: h3
    dict_kwargs:
      x: sepal.length
      y: sepal.width
      color: variety
      size: petal.length
      size_max: 18

  - tag: petal-vs-sepal
    component_type: figure
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    visu_type: scatter
    title: "Petal vs Sepal Length"
    description: "Petal length is the single strongest discriminator between varieties."
    title_size: h3
    dict_kwargs:
      x: sepal.length
      y: petal.length
      color: variety
      symbol: variety

  - tag: petal-box
    component_type: figure
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    visu_type: box
    title: "Petal Length Distribution by Variety"
    description: "Box + points; notched to show median CIs."
    title_size: h3
    dict_kwargs:
      x: variety
      y: petal.length
      color: variety
      points: all
      notched: true

  - tag: sepal-width-box
    component_type: figure
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    visu_type: box
    title: "Sepal Width Distribution by Variety"
    description: "Box + all points; surfaces multi-modality in Setosa."
    title_size: h3
    dict_kwargs:
      x: variety
      y: sepal.width
      color: variety
      points: all
      boxmean: sd

  - tag: sepal-histogram
    component_type: figure
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    visu_type: histogram
    title: "Sepal Length Distribution"
    description: "Per-variety overlay; bars are semi-transparent to expose overlap."
    title_size: h3
    dict_kwargs:
      x: sepal.length
      color: variety
      nbins: 20
      barmode: overlay
      opacity: 0.7

  # ── Data table ─────────────────────────────────────────────────────
  - tag: data-table
    component_type: table
    workflow_tag: python/iris_workflow
    data_collection_tag: iris_table
    title: "Iris Dataset"
    description: "Complete iris flower measurements across the three varieties."
    title_size: h3
    title_align: left
    page_size: 15
