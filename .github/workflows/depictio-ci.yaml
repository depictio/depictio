name: "Depictio – Full CI: Quality, Build, Integration, E2E Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Smart caching for quality checks - skip tests if code hasn't changed
  # Hashes all Python files, config files, and test files to detect changes
  # If hash matches a previous successful run, quality job is skipped
  check-quality-cache:
    runs-on: ubuntu-22.04
    outputs:
      cache-hit: ${{ steps.cache-quality.outputs.cache-hit }}
      code-hash: ${{ steps.hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare with previous commit

      - name: Generate code hash
        id: hash
        run: |
          # Hash all relevant files that affect quality checks:
          # - All Python source files (*.py)
          # - Dependency configuration (pyproject.toml, uv.lock)
          # - Pre-commit hooks (.pre-commit-config.yaml)
          # - Test configuration (pytest.ini)
          # NOTE: CI workflow file is NOT included - CI changes shouldn't invalidate quality cache
          # Only hash files that actually exist (filter out deleted/missing files)
          HASH=$(git ls-files '*.py' 'pyproject.toml' 'uv.lock' '.pre-commit-config.yaml' 'pytest.ini' | \
            while read -r file; do
              if [ -f "$file" ]; then
                cat "$file"
              fi
            done | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "📝 Code hash: $HASH"

      - name: Check quality cache
        id: cache-quality
        uses: actions/cache@v4
        with:
          path: .quality-passed
          key: quality-${{ steps.hash.outputs.hash }}

      - name: Report cache status
        run: |
          if [ "${{ steps.cache-quality.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Quality checks passed for this code state previously - skipping"
          else
            echo "🔍 No cache found - quality checks will run"
          fi

  quality:
    runs-on: ubuntu-22.04
    needs: check-quality-cache
    if: needs.check-quality-cache.outputs.cache-hit != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          cache-dependency-path: "pyproject.toml"

      - name: Install Dependencies
        run: |
          uv venv --python 3.12.9 venv
          source venv/bin/activate
          uv pip install --upgrade pip

          # Install dependencies from pyproject.toml
          uv pip install -e ".[dev]"

          # Clean up any conflicting polars packages that may have been pulled in
          echo "🧹 Removing conflicting polars packages..."
          uv pip uninstall -y polars polars-runtime-32 2>/dev/null || true

          # Ensure correct polars-lts-cpu version is installed (required for MultiQC)
          echo "📦 Installing polars-lts-cpu 1.19.0..."
          uv pip install --force-reinstall "polars-lts-cpu[numpy,pandas,pyarrow,excel,deltalake]==1.19.0"

          # Verify only polars-lts-cpu is installed
          echo "✅ Verifying polars installation..."
          uv pip list | grep -i polars
          python -c "import polars; assert '1.19' in polars.__version__, f'Wrong version: {polars.__version__}'; print(f'✅ Polars {polars.__version__} verified')"

      - name: Run Ruff formatting check
        run: |
          source venv/bin/activate
          ruff format --check depictio

      - name: Run Ruff linting
        run: |
          source venv/bin/activate
          ruff check depictio

      # - name: Run ty type checker (must pass)
      #   run: |
      #     source venv/bin/activate
      #     ty version
      #     ty check depictio/models/ depictio/api/ depictio/dash/ depictio/cli/ depictio/tests/

      # - name: Run pre-commit hooks
      #   run: |
      #     source venv/bin/activate
      #     pre-commit run --all-files

      - name: Run tests
        run: |
          source venv/bin/activate
          python -m pytest -xvs -n auto

      - name: Save quality cache marker
        if: success()
        run: |
          echo "Quality checks passed at $(date)" > .quality-passed
          echo "✅ Quality cache marker created"

      - name: Update quality cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .quality-passed
          key: quality-${{ needs.check-quality-cache.outputs.code-hash }}

  # Test pixi installation and basic functionality (no Docker required)
  pixi-install-test:
    runs-on: ubuntu-22.04
    needs: check-quality-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.39.5
          # Disable cache until pixi.lock is committed to the repo
          cache: false
          # Allow pixi to generate lockfile
          locked: false
          # Use temp location for pixi binary to avoid cleanup issues
          pixi-bin-path: ${{ runner.temp }}/bin/pixi
          # Enable verbose logging to debug installation issues
          log-level: vv
          # Disable automatic install so we can run it manually with better error capture
          run-install: false

      - name: Install dependencies with pixi
        run: |
          echo "📦 Installing dependencies with pixi..."
          echo "🔍 Pixi version: $(pixi --version)"
          echo "🔍 Platform: $(uname -a)"
          echo ""
          echo "📋 pixi.toml contents:"
          cat pixi.toml
          echo ""
          echo "🔍 Running pixi install with verbose output..."
          # Run with maximum verbosity to see solver errors
          pixi install -vvv 2>&1 | tee /tmp/pixi-install.log || {
            echo ""
            echo "❌ pixi install failed!"
            echo ""
            echo "📋 Full pixi install log:"
            cat /tmp/pixi-install.log
            echo ""
            echo "📋 pyproject.toml dependencies section:"
            grep -A 100 '\[project.dependencies\]' pyproject.toml | head -80 || true
            exit 1
          }
          echo "✅ Pixi installation successful"

      - name: Verify pixi environment
        run: |
          echo "🔍 Verifying pixi environment..."
          pixi run python --version
          pixi run python -c 'import depictio; print("depictio package loaded successfully")'

      - name: Run quick tests (no infrastructure)
        run: |
          echo "🧪 Running quick tests without infrastructure..."
          pixi run test-fast || echo "⚠️ Some tests may require infrastructure - this is expected"

      - name: Verify infrastructure commands exist
        run: |
          echo "🔍 Verifying infrastructure commands are available..."
          pixi run mongod --version || echo "MongoDB binary available"
          pixi run redis-server --version || echo "Redis binary available"
          pixi run minio --version || echo "MinIO binary available"
          echo "✅ All infrastructure binaries available via pixi"

  docker-build:
    needs: [check-quality-cache, quality]
    # Run if quality passed OR if it was skipped due to cache hit
    if: |
      always() &&
      (needs.quality.result == 'success' ||
       (needs.quality.result == 'skipped' && needs.check-quality-cache.outputs.cache-hit == 'true'))
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-tag: ${{ steps.image-info.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
      rebuild-needed: ${{ steps.check-rebuild.outputs.rebuild }}
      full-image: ${{ steps.image-info.outputs.full-image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Docker Permissions
        run: |
          sudo usermod -aG docker $USER || true
          sudo chmod 666 /var/run/docker.sock

      - name: Export UID and GID
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Setup directories
        run: |
          cp .env.example .env
          mkdir -p data/depictioDB data/minio_data
          chmod 777 data data/depictioDB data/minio_data

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: env.ACT != 'true' # Skip login when using act
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Generate image info
        id: image-info
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Generate content-based hash from files that affect the Docker build
          # Excludes tests/ to avoid rebuilding when only tests change
          DOCKER_HASH=$(find depictio -type f \( -name "*.py" -o -name "*.js" -o -name "*.css" -o -name "*.html" \) \
            ! -path "depictio/tests/*" | sort | xargs cat 2>/dev/null | sha256sum | cut -c1-12)
          # Also include key config files
          CONFIG_HASH=$(cat pyproject.toml uv.lock docker-images/Dockerfile_depictio_uv.dockerfile .dockerignore 2>/dev/null | sha256sum | cut -c1-12)
          CONTENT_HASH="${DOCKER_HASH}-${CONFIG_HASH}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.number }}-${CONTENT_HASH}"
          else
            TAG="main-${CONTENT_HASH}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "repo=${REPO_LOWER}" >> $GITHUB_OUTPUT
          echo "full-image=ghcr.io/${REPO_LOWER}:${TAG}" >> $GITHUB_OUTPUT
          echo "📦 Docker content hash: ${CONTENT_HASH}"
          echo "🏷️ Image tag: ${TAG}"

      - name: Check if rebuild needed
        id: check-rebuild
        run: |
          FULL_IMAGE="${{ steps.image-info.outputs.full-image }}"
          if docker manifest inspect "${FULL_IMAGE}" > /dev/null 2>&1; then
            echo "rebuild=false" >> $GITHUB_OUTPUT
            echo "✅ Image ${FULL_IMAGE} already exists, skipping build"
          else
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "🔨 Image doesn't exist, will build ${FULL_IMAGE}"
          fi

      # Detect if running with act and set cache type accordingly
      - name: Set cache strategy
        id: cache-strategy
        run: |
          if [ "${ACT:-false}" = "true" ]; then
            echo "Running with act - using local cache"
            echo "cache_from=type=local,src=/tmp/buildx-cache" >> $GITHUB_OUTPUT
            echo "cache_to=type=local,dest=/tmp/buildx-cache-new,mode=max" >> $GITHUB_OUTPUT
            echo "cache_enabled=local" >> $GITHUB_OUTPUT
          else
            echo "Running on GitHub Actions - using GHA cache"
            echo "cache_from=type=gha,scope=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "cache_to=type=gha,mode=max,scope=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "cache_enabled=gha" >> $GITHUB_OUTPUT
          fi

      # Create cache directory for act
      - name: Prepare local cache directory (act only)
        if: env.ACT == 'true' || runner.os == 'act'
        run: |
          mkdir -p /tmp/buildx-cache
          echo "Created local cache directory for act"

      - name: Build and push Docker image
        id: build
        if: steps.check-rebuild.outputs.rebuild == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          # Use uv-based Dockerfile for faster builds (pure Python, no conda)
          file: docker-images/Dockerfile_depictio_uv.dockerfile
          platforms: linux/amd64
          push: ${{ env.ACT != 'true' }} # Push to registry unless using act
          load: ${{ env.ACT == 'true' }} # Load locally only when using act
          tags: ${{ steps.image-info.outputs.full-image }}
          cache-from: |
            ${{ steps.cache-strategy.outputs.cache_from }}
            ${{ env.ACT != 'true' && 'type=gha,scope=refs/heads/main' || '' }}
          cache-to: ${{ steps.cache-strategy.outputs.cache_to }}

      # Move cache for next run (act only)
      - name: Move cache (act only)
        if: (env.ACT == 'true' || runner.os == 'act') && steps.check-rebuild.outputs.rebuild == 'true'
        run: |
          rm -rf /tmp/buildx-cache
          mv /tmp/buildx-cache-new /tmp/buildx-cache || true

      - name: Pull image if it exists in registry (GitHub Actions only)
        if: env.ACT != 'true' && steps.check-rebuild.outputs.rebuild == 'false'
        run: |
          echo "📥 Image already exists in registry, pulling..."
          docker pull "${{ steps.image-info.outputs.full-image }}"

      - name: Pull newly built image (GitHub Actions only)
        if: env.ACT != 'true' && steps.check-rebuild.outputs.rebuild == 'true'
        run: docker pull "${{ steps.image-info.outputs.full-image }}"

      - name: Tag image for local use (act only)
        if: env.ACT == 'true' || runner.os == 'act'
        run: |
          # When using act, tag the built image with the expected name
          docker tag "${{ steps.image-info.outputs.full-image }}" depictio:local || true
          echo "Tagged image for local use"

  docker-system-init:
    needs: docker-build
    if: always() && needs.docker-build.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    outputs:
      services-ready: ${{ steps.health.outputs.ready }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Configure Docker and directories
        run: |
          sudo usermod -aG docker $USER || true
          sudo chmod 666 /var/run/docker.sock
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          cp .env.example .env
          mkdir -p data/depictioDB data/minio_data data/prof_files data/cache
          chmod 777 data data/depictioDB data/minio_data data/prof_files data/cache

      - name: Start services
        run: |
          FULL_IMAGE="${{ needs.docker-build.outputs.full-image }}"
          docker pull "${FULL_IMAGE}"
          export DEPICTIO_VERSION="${FULL_IMAGE}"
          export DEPICTIO_FASTAPI_WORKERS=1  # Single worker to avoid boot race conditions
          docker compose -f docker-compose.dev.yaml --env-file docker-compose/.env up -d

      - name: Logs
        run: sleep 3 && docker compose logs

      - name: Logs depictio-frontend (early check)
        run: |
          echo "📋 Frontend container logs (early check):"
          docker compose logs depictio-frontend || echo "Failed to get frontend logs"

      - name: Check frontend container status
        run: |
          echo "🔍 Checking if depictio-frontend is running..."
          docker compose ps depictio-frontend

          echo ""
          echo "🔍 Container detailed status:"
          docker inspect depictio-frontend --format='Status: {{.State.Status}}, Running: {{.State.Running}}, ExitCode: {{.State.ExitCode}}, Restarting: {{.State.Restarting}}'

          echo ""
          echo "🔍 Container restart count:"
          docker inspect depictio-frontend --format='RestartCount: {{.RestartCount}}'

          if ! docker compose ps depictio-frontend | grep -q "Up"; then
            echo "❌ Frontend container is not running!"
            echo "📋 Frontend logs:"
            docker compose logs depictio-frontend
            exit 1
          fi
          echo "✅ Frontend container is running"

      - name: Debug Docker networking and frontend startup
        run: |
          echo "🔍 Docker Network Debugging"
          echo "📊 List all networks:"
          docker network ls

          echo ""
          echo "📊 Frontend container network:"
          docker inspect depictio-frontend --format='{{range $net, $conf := .NetworkSettings.Networks}}{{$net}} {{end}}'

          echo ""
          echo "📊 Backend container network:"
          docker inspect depictio-backend --format='{{range $net, $conf := .NetworkSettings.Networks}}{{$net}} {{end}}'

          echo ""
          echo "🔍 Test DNS resolution from backend to frontend:"
          docker compose exec -T depictio-backend sh -c "getent hosts depictio-frontend || echo 'DNS resolution failed'"

          echo ""
          echo "🔍 Test connectivity from backend to frontend:"
          docker compose exec -T depictio-backend sh -c "curl -v --max-time 5 http://depictio-frontend:5080/ || echo 'Connection failed'"

          echo ""
          echo "🔍 Frontend container details:"
          echo "Container is running: $(docker inspect depictio-frontend --format='{{.State.Running}}')"
          echo "Container exit code: $(docker inspect depictio-frontend --format='{{.State.ExitCode}}')"

          echo ""
          echo "🔍 Check if Dash is listening on port 5080:"
          docker compose exec -T depictio-frontend sh -c "netstat -tlnp 2>/dev/null | grep 5080 || echo 'Port 5080 not listening'"

          echo ""
          echo "📋 Full frontend logs (ALL):"
          docker compose logs depictio-frontend

          echo ""
          echo "🔍 Check running processes in frontend:"
          docker compose exec -T depictio-frontend sh -c "ps aux | grep -E 'dash|python|gunicorn' || echo 'No Python processes found'"

          echo ""
          echo "🔍 Check startup script and environment:"
          docker compose exec -T depictio-frontend sh -c "echo 'Working directory:' && pwd"
          docker compose exec -T depictio-frontend sh -c "echo 'DEPICTIO_DEV_MODE=' && echo \$DEPICTIO_DEV_MODE"
          docker compose exec -T depictio-frontend sh -c "echo 'Script executable:' && ls -la /app/run_dash.sh"
          docker compose exec -T depictio-frontend sh -c "echo 'Python available:' && which python || echo 'Python not found'"
          docker compose exec -T depictio-frontend sh -c "echo 'Files in /app:' && ls -la /app/ | head -20"

          echo ""
          echo "🔍 Manually run startup script to see errors:"
          docker compose exec -T depictio-frontend bash -c "cd /app && bash -x /app/run_dash.sh" || echo "Script failed with exit code: $?"

      - name: Logs depictio-backend
        run: sleep 3 && docker compose logs depictio-backend

      - name: Final frontend logs check
        if: always()
        run: |
          echo "📋 Final frontend container logs (complete):"
          docker compose logs depictio-frontend

      - name: Wait and verify services
        id: health
        run: |
          echo "⏳ Waiting for services to be ready..."

          # Wait for MongoDB
          echo "Waiting for MongoDB..."
          for i in {1..30}; do
            if docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "db.runCommand({ ping: 1 })" --quiet &>/dev/null; then
              echo "✅ MongoDB ready"
              break
            fi
            echo "MongoDB not ready yet, attempt $i/30..."
            sleep 2
          done

          # Wait for Redis
          echo "Waiting for Redis..."
          for i in {1..30}; do
            if docker compose exec -T redis redis-cli ping &>/dev/null; then
              echo "✅ Redis ready"
              break
            fi
            echo "Redis not ready yet, attempt $i/30..."
            sleep 2
          done

          # Wait for MinIO
          echo "Waiting for MinIO..."
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/ready &>/dev/null; then
              echo "✅ MinIO ready"
              break
            fi
            echo "MinIO not ready yet, attempt $i/30..."
            sleep 2
          done

          # Wait for Backend API health check with restart on crash
          echo "Waiting for Backend API..."
          RESTART_COUNT=0
          MAX_RESTARTS=2
          for i in {1..60}; do
            if curl -f http://localhost:8058/health &>/dev/null; then
              echo "✅ Backend API ready"
              break
            fi
            # Check if container crashed and restart if needed
            if ! docker compose ps depictio-backend | grep -q "Up"; then
              if [ $RESTART_COUNT -lt $MAX_RESTARTS ]; then
                echo "⚠️  Backend container crashed, restarting (attempt $((RESTART_COUNT+1))/$MAX_RESTARTS)..."
                docker compose up -d depictio-backend
                RESTART_COUNT=$((RESTART_COUNT+1))
                sleep 5
              fi
            fi
            echo "Backend API not ready yet, attempt $i/60..."
            sleep 2
          done

          # Show final status
          echo "🔍 Verifying all services..."
          docker compose ps

          # Test API health endpoint
          if ! curl -f http://localhost:8058/health; then
            echo "❌ Backend API health check failed"
            echo "Backend logs:"
            docker compose logs depictio-backend --tail=50
            exit 1
          fi

          echo "✅ All services ready and healthy"
          echo "ready=true" >> $GITHUB_OUTPUT

      - name: Verify users and initial data
        run: |
          # Verify admin user
          ADMIN_USER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.users.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.email == "admin@example.com" and .is_admin == true) | .email')
          [ -z "$ADMIN_USER" ] && echo "❌ Admin user not found" && exit 1

          # Verify test user
          TEST_USER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.users.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.email == "test_user@example.com" and .is_admin == false) | .email')
          [ -z "$TEST_USER" ] && echo "❌ Test user not found" && exit 1

          echo "✅ Users verified: $ADMIN_USER, $TEST_USER"

      - name: Verify Iris integration from system initialization
        run: |
          # Verify project
          IRIS_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Iris Dataset Project Data Analysis") | .name')
          [ -z "$IRIS_PROJECT" ] && echo "❌ Iris project not found" && exit 1

          # Verify deltatable
          IRIS_DC_ID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Iris Dataset Project Data Analysis") | .workflows[0].data_collections[0]._id')
          IRIS_DT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.deltatables.find({\"data_collection_id\": ObjectId(\"$IRIS_DC_ID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')
          [ -z "$IRIS_DT" ] && echo "❌ Iris deltatable not found" && exit 1

          # Verify dashboard
          IRIS_PID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Iris Dataset Project Data Analysis") | ._id')
          IRIS_DASH=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.dashboards.find({\"project_id\": ObjectId(\"$IRIS_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')
          [ -z "$IRIS_DASH" ] && echo "❌ Iris dashboard not found" && exit 1

          echo "✅ Iris integration verified: Project=$IRIS_PROJECT, DT=$IRIS_DT, Dashboard=$IRIS_DASH"

      - name: Verify Penguins integration from system initialization
        run: |
          # Verify project
          PENGUIN_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Palmer Penguins Species Comparison") | .name')
          [ -z "$PENGUIN_PROJECT" ] && echo "❌ Penguins project not found" && exit 1

          # Verify deltatables (should have 2 data collections with joins)
          PENGUIN_PID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Palmer Penguins Species Comparison") | ._id')
          PENGUIN_DC_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find({\"_id\": ObjectId(\"$PENGUIN_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[].workflows[0].data_collections | length')
          [ "$PENGUIN_DC_COUNT" -lt 2 ] && echo "❌ Penguins data collections not found (expected >=2, got $PENGUIN_DC_COUNT)" && exit 1

          # Verify dashboard
          PENGUIN_DASH=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.dashboards.find({\"project_id\": ObjectId(\"$PENGUIN_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')
          [ -z "$PENGUIN_DASH" ] && echo "❌ Penguins dashboard not found" && exit 1

          echo "✅ Penguins integration verified: Project=$PENGUIN_PROJECT, DCs=$PENGUIN_DC_COUNT, Dashboard=$PENGUIN_DASH"

      - name: Verify Ampliseq integration from system initialization
        run: |
          # Verify project
          AMPLISEQ_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Ampliseq Microbial Community Analysis") | .name')
          [ -z "$AMPLISEQ_PROJECT" ] && echo "❌ Ampliseq project not found" && exit 1

          # Verify deltatables (should have 5 data collections: metadata, multiqc_data, alpha_rarefaction, taxonomy_composition, ancom_volcano)
          AMPLISEQ_PID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Ampliseq Microbial Community Analysis") | ._id')
          AMPLISEQ_DC_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find({\"_id\": ObjectId(\"$AMPLISEQ_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[].workflows[0].data_collections | length')
          [ "$AMPLISEQ_DC_COUNT" -lt 5 ] && echo "❌ Ampliseq data collections not found (expected >=5, got $AMPLISEQ_DC_COUNT)" && exit 1

          # Verify dashboards (should have 2: MultiQC main tab + Analysis child tab)
          AMPLISEQ_DASH_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.dashboards.find({\"project_id\": ObjectId(\"$AMPLISEQ_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r 'length')
          [ "$AMPLISEQ_DASH_COUNT" -lt 2 ] && echo "❌ Ampliseq dashboards not found (expected >=2, got $AMPLISEQ_DASH_COUNT)" && exit 1

          # Verify main tab dashboard
          AMPLISEQ_MAIN_DASH=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.dashboards.find({\"project_id\": ObjectId(\"$AMPLISEQ_PID\"), \"is_main_tab\": true}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')
          [ -z "$AMPLISEQ_MAIN_DASH" ] && echo "❌ Ampliseq main dashboard not found" && exit 1

          # Verify child tab dashboard
          AMPLISEQ_CHILD_DASH=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.dashboards.find({\"project_id\": ObjectId(\"$AMPLISEQ_PID\"), \"is_main_tab\": false}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')
          [ -z "$AMPLISEQ_CHILD_DASH" ] && echo "❌ Ampliseq child dashboard not found" && exit 1

          echo "✅ Ampliseq integration verified: Project=$AMPLISEQ_PROJECT, DCs=$AMPLISEQ_DC_COUNT, Dashboards=$AMPLISEQ_DASH_COUNT (Main=$AMPLISEQ_MAIN_DASH, Child=$AMPLISEQ_CHILD_DASH)"

      - name: Test Screenshot Generation - screenshot-dash-fixed
        run: |
          echo "📸 Testing screenshot generation functionality..."

          # Wait for services to be ready
          echo "⏳ Waiting for services to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8058/depictio/api/v1/utils/status >/dev/null 2>&1; then
              echo "✅ Backend API is ready"
              break
            fi
            echo "⚠️ Backend not ready, attempt $i/30"
            sleep 10
          done

          # Test screenshot endpoint with actual Iris dashboard ID
          echo "🧪 Testing screenshot generation endpoint..."

          # Get the actual Iris dashboard ID from the database
          IRIS_PID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Iris Dataset Project Data Analysis") | ._id')
          DASHBOARD_ID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.dashboards.find({\"project_id\": ObjectId(\"$IRIS_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')

          if [ -z "$DASHBOARD_ID" ]; then
            echo "❌ No dashboard found for testing - skipping screenshot test"
            echo "✅ Screenshot endpoint test skipped (no dashboard available)"
            exit 0
          fi

          echo "📋 Using dashboard ID: $DASHBOARD_ID"

          # Debug: Check container status and logs before screenshot
          echo "🔍 Pre-screenshot debugging:"
          echo "📊 Container status:"
          docker compose ps

          echo "📋 Recent frontend logs (last 50 lines):"
          docker compose logs --tail=50 depictio-frontend || echo "Failed to get frontend logs"

          echo "📋 Recent backend logs (last 20 lines):"
          docker compose logs --tail=20 depictio-backend || echo "Failed to get backend logs"

          echo "🌐 Testing basic API connectivity:"
          curl -s -o /dev/null -w "Status: %{http_code}, Time: %{time_total}s\n" http://localhost:8058/depictio/api/v1/utils/status || echo "API connectivity test failed"

          echo "🌐 Testing frontend accessibility:"
          curl -s -o /dev/null -w "Frontend Status: %{http_code}, Time: %{time_total}s\n" http://localhost:5080/ || echo "Frontend connectivity test failed"

          # Make the API call and capture response with timeout
          SCREENSHOT_RESPONSE=$(timeout 60s curl -s -w "\n%{http_code}" http://localhost:8058/depictio/api/v1/utils/screenshot-dash-fixed/$DASHBOARD_ID || echo -e "\nTIMEOUT")
          # SCREENSHOT_RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8058/depictio/api/v1/dashboards/screenshot/$DASHBOARD_ID)

          # Extract HTTP status code (last line)
          HTTP_CODE=$(echo "$SCREENSHOT_RESPONSE" | tail -n1)

          # Extract JSON response (all lines except last)
          JSON_RESPONSE=$(echo "$SCREENSHOT_RESPONSE" | head -n -1)

          echo "📊 HTTP Status: $HTTP_CODE"

          # Debug: Check logs after screenshot attempt
          echo "🔍 Post-screenshot debugging:"
          echo "📋 Recent backend logs (last 30 lines after screenshot):"
          docker compose logs --tail=30 depictio-backend || echo "Failed to get backend logs"

          echo "📊 All container status after screenshot:"
          docker compose ps

          # Handle timeout case
          if [ "$HTTP_CODE" = "TIMEOUT" ]; then
            echo "⚠️ Screenshot generation timed out after 60 seconds"
            echo "📋 Backend logs during timeout (last 50 lines):"
            docker compose logs --tail=50 depictio-backend || echo "Failed to get timeout logs"
            echo "✅ Screenshot endpoint is accessible but slow - this may be expected in CI environment"
            exit 0
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Screenshot endpoint responded successfully"

            # Parse and check response without logging sensitive data
            SUCCESS=$(echo "$JSON_RESPONSE" | jq -r '.success // false' 2>/dev/null)
            MESSAGE=$(echo "$JSON_RESPONSE" | jq -r '.message // "unknown"' 2>/dev/null)
            SCREENSHOT_PATH=$(echo "$JSON_RESPONSE" | jq -r '.screenshot_path // "unknown"' 2>/dev/null)
            URL=$(echo "$JSON_RESPONSE" | jq -r '.url // "unknown"' 2>/dev/null)

            echo "📋 Response details:"
            echo "  Success: $SUCCESS"
            echo "  Message: $MESSAGE"
            echo "  Screenshot path: $SCREENSHOT_PATH"
            echo "  URL: $URL"


            if [ "$SUCCESS" = "true" ]; then
              echo "✅ Screenshot generation successful"

              # Additional verification - check if screenshot path is valid
              if [[ "$SCREENSHOT_PATH" == *".png" ]]; then
                echo "✅ Screenshot path format is valid"
              else
                echo "⚠️  Screenshot path format may be invalid"
              fi

              # Optional: Verify screenshot file exists in container
              echo "🧪 Checking if screenshot file exists in backend container..."
              if docker compose exec -T depictio-backend test -f "$SCREENSHOT_PATH" 2>/dev/null; then
                echo "✅ Screenshot file exists in backend container"
              else
                echo "⚠️  Screenshot file not found in backend container (may be normal depending on setup)"
              fi

            else
              echo "❌ Screenshot generation failed"
              exit 1
            fi

          elif [ "$HTTP_CODE" = "404" ]; then
            echo "⚠️  Dashboard not found (expected for dummy ID) - testing endpoint availability only"
            echo "✅ Screenshot endpoint is accessible"
          else
            echo "❌ Screenshot endpoint failed with status: $HTTP_CODE"
            echo "Response: $JSON_RESPONSE"
            echo "📋 Backend logs on failure (last 50 lines):"
            docker compose logs --tail=50 depictio-backend || echo "Failed to get failure logs"
            echo "🔍 Full container logs on failure:"
            docker compose logs depictio-backend || echo "Failed to get full logs"
            exit 1
          fi

          # Final debug: Show summary logs
          echo "🔍 Final debugging summary:"
          echo "📊 Final container status:"
          docker compose ps

  cli-comprehensive-test:
    needs: [docker-build]
    if: always() && needs.docker-build.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          cache-dependency-path: "pyproject.toml"

      - name: Setup CLI environment
        run: |
          cd depictio/cli
          uv venv --python 3.12.9 venv
          source venv/bin/activate
          uv pip install -e ".[multiqc]"

      # ============================================
      # PHASE 1: Offline Tests (No Server Required)
      # ============================================

      - name: Test CLI help commands
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing CLI help commands..."

          depictio-cli --help
          depictio-cli backup --help
          depictio-cli config --help
          depictio-cli dashboard --help
          depictio-cli data --help

          echo "✅ All help commands passed"

      - name: Test dashboard validate (offline)
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing dashboard validate (offline)..."

          depictio-cli dashboard validate ../projects/init/iris/dashboards/overview.yaml

          echo "✅ Dashboard validate passed"

      - name: Test recipe list and info (offline)
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing recipe discovery (offline)..."

          # List all available recipes
          depictio-cli recipe list

          # Show info for each known ampliseq recipe
          depictio-cli recipe info nf-core/ampliseq/alpha_diversity.py
          depictio-cli recipe info nf-core/ampliseq/alpha_rarefaction.py
          depictio-cli recipe info nf-core/ampliseq/ancombc.py
          depictio-cli recipe info nf-core/ampliseq/taxonomy_composition.py
          depictio-cli recipe info nf-core/ampliseq/taxonomy_rel_abundance.py

          echo "✅ Recipe list and info passed"

      - name: Test template validation (offline)
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing template validation (offline)..."

          # Validate known template project configs
          depictio-cli config validate-project-config \
            --project-config-path ../projects/nf-core/ampliseq/2.16.0/template.yaml \
            --CLI-config-path admin_config.yaml 2>&1 || true

          depictio-cli config validate-project-config \
            --project-config-path ../projects/nf-core/ampliseq/2.14.0/template.yaml \
            --CLI-config-path admin_config.yaml 2>&1 || true

          echo "✅ Template validation passed"

      # ============================================
      # PHASE 2: Server-Connected Tests
      # ============================================

      - name: Setup environment and start services
        run: |
          sudo chmod 666 /var/run/docker.sock
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          cp .env.example .env
          mkdir -p data/depictioDB data/minio_data data/prof_files data/cache
          chmod 777 data data/depictioDB data/minio_data data/prof_files data/cache

      - name: Log in and start services
        run: |
          echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          FULL_IMAGE="${{ needs.docker-build.outputs.full-image }}"
          docker pull "${FULL_IMAGE}"
          export DEPICTIO_VERSION="${FULL_IMAGE}"
          export DEPICTIO_FASTAPI_WORKERS=1  # Single worker to avoid boot race conditions
          docker compose -f docker-compose.dev.yaml --env-file docker-compose/.env up -d

          echo "⏳ Waiting for services to be ready..."

          # Wait for MongoDB
          echo "Waiting for MongoDB..."
          for i in {1..30}; do
            if docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "db.runCommand({ ping: 1 })" --quiet &>/dev/null; then
              echo "✅ MongoDB ready"
              break
            fi
            echo "MongoDB not ready yet, attempt $i/30..."
            sleep 2
          done

          # Wait for Redis
          echo "Waiting for Redis..."
          for i in {1..30}; do
            if docker compose exec -T redis redis-cli ping &>/dev/null; then
              echo "✅ Redis ready"
              break
            fi
            echo "Redis not ready yet, attempt $i/30..."
            sleep 2
          done

          # Wait for MinIO
          echo "Waiting for MinIO..."
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/ready &>/dev/null; then
              echo "✅ MinIO ready"
              break
            fi
            echo "MinIO not ready yet, attempt $i/30..."
            sleep 2
          done

          # Wait for Backend API with health check and restart on crash
          echo "Waiting for Backend API..."
          RESTART_COUNT=0
          MAX_RESTARTS=2
          for i in {1..60}; do
            if curl -f http://localhost:8058/health &>/dev/null; then
              echo "✅ Backend API ready"
              break
            fi
            # Check if container crashed and restart if needed
            if ! docker compose ps depictio-backend | grep -q "Up"; then
              if [ $RESTART_COUNT -lt $MAX_RESTARTS ]; then
                echo "⚠️  Backend container crashed, restarting (attempt $((RESTART_COUNT+1))/$MAX_RESTARTS)..."
                docker compose up -d depictio-backend
                RESTART_COUNT=$((RESTART_COUNT+1))
                sleep 5
              fi
            fi
            echo "Backend API not ready yet, attempt $i/60..."
            sleep 2
          done

          # Final verification
          echo "🔍 Verifying all services..."
          docker compose ps

          # Test API endpoint
          if ! curl -f http://localhost:8058/health; then
            echo "❌ Backend API health check failed"
            echo "Backend logs:"
            docker compose logs depictio-backend --tail=50
            exit 1
          fi

          echo "✅ All services ready and healthy"

      - name: Setup CLI authentication
        run: |
          cd depictio/cli
          docker cp depictio-backend:/app/depictio/.depictio/admin_config.yaml .

      - name: Test config commands
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing config commands..."

          # Validate project config
          depictio-cli --verbose config validate-project-config \
            --project-config-path ../projects/init/iris/project.yaml \
            --CLI-config-path admin_config.yaml

          # Sync project config (with --update for idempotency)
          depictio-cli --verbose config sync-project-config-to-server \
            --update \
            --project-config-path ../projects/init/iris/project.yaml \
            --CLI-config-path admin_config.yaml

          echo "✅ Config commands passed"

      - name: Test dashboard commands (server)
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing dashboard commands (server)..."

          # Import with dry-run (validates without creating)
          depictio-cli dashboard import ../projects/init/iris/dashboards/overview.yaml --dry-run

          # Actually import dashboard to server
          echo "🔄 Importing dashboard to server..."
          IMPORT_OUTPUT=$(depictio-cli dashboard import ../projects/init/iris/dashboards/overview.yaml --config admin_config.yaml 2>&1)
          echo "$IMPORT_OUTPUT"

          # Extract dashboard ID from import output
          DASHBOARD_ID=$(echo "$IMPORT_OUTPUT" | grep "Dashboard ID:" | awk '{print $NF}')

          if [ -z "$DASHBOARD_ID" ]; then
            echo "❌ Failed to extract dashboard ID from import output"
            exit 1
          fi

          echo "✅ Dashboard imported with ID: $DASHBOARD_ID"

          # Verify dashboard exists in MongoDB via API
          echo "🔍 Verifying dashboard registration in database..."

          # Get access token from admin config (same pattern as docker-system-init)
          JWT_TOKEN=$(grep 'access_token' admin_config.yaml | awk '{print $2}' | tr -d "'\"")

          if [ -z "$JWT_TOKEN" ]; then
            echo "❌ Failed to extract access token from admin_config.yaml"
            exit 1
          fi

          echo "  ✓ Using access token from config (length: ${#JWT_TOKEN})"

          # Query API to verify dashboard exists
          API_URL="http://localhost:8058/depictio/api/v1/dashboards/get/$DASHBOARD_ID"
          echo "  API URL: $API_URL"
          echo "  Dashboard ID length: ${#DASHBOARD_ID}"

          # Get full response with status code
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $JWT_TOKEN" "$API_URL")
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
          RESPONSE=$(echo "$HTTP_RESPONSE" | head -n-1)

          echo "  HTTP Status: $HTTP_STATUS"
          echo "  Response: $RESPONSE"

          # If 404, check MongoDB directly to see if dashboard exists at all
          if [ "$HTTP_STATUS" = "404" ]; then
            echo ""
            echo "🔍 Checking MongoDB directly..."
            docker exec depictio-mongo mongosh depictioDB --quiet --eval "
              db.dashboards.findOne({dashboard_id: ObjectId('$DASHBOARD_ID')}, {_id: 1, dashboard_id: 1, title: 1, project_id: 1})
            " || echo "  MongoDB query failed"
          fi

          # Check if response contains expected fields (API returns "id" not "_id" due to serialization)
          if echo "$RESPONSE" | grep -q '"dashboard_id"' && [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Dashboard verified in database"

            # Extract and display dashboard details
            TITLE=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('title', 'N/A'))" 2>/dev/null || echo "N/A")
            PROJECT_ID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('project_id', 'N/A'))" 2>/dev/null || echo "N/A")

            echo "  Dashboard Name: $TITLE"
            echo "  Project ID: $PROJECT_ID"
            echo "  Dashboard ID: $DASHBOARD_ID"
          else
            echo "❌ Dashboard not found in database (HTTP $HTTP_STATUS)"
            echo "API Response: $RESPONSE"
            exit 1
          fi

          echo "✅ Dashboard commands passed"

      - name: Test CLI workflow with local test project
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing full CLI workflow with local test project..."

          # Test full CLI workflow with local paths (not Docker paths)
          # This validates that CLI scan/process operations work correctly

          # Validate project config
          depictio-cli --verbose config validate-project-config \
            --project-config-path ../projects/test/cli-test/project.yaml \
            --CLI-config-path admin_config.yaml

          # Sync project to server
          depictio-cli --verbose config sync-project-config-to-server \
            --project-config-path ../projects/test/cli-test/project.yaml \
            --CLI-config-path admin_config.yaml

          # Scan data files
          depictio-cli --verbose data scan \
            --sync-files \
            --project-config-path ../projects/test/cli-test/project.yaml \
            --CLI-config-path admin_config.yaml

          # Process data into deltatables
          depictio-cli --verbose data process \
            --overwrite \
            --project-config-path ../projects/test/cli-test/project.yaml \
            --CLI-config-path admin_config.yaml

          echo "✅ CLI workflow with local test project passed"

      - name: Test Penguin CLI operations
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing Penguin CLI operations..."

          # NOTE: Penguins is a reference dataset that's auto-initialized by the backend
          # on startup via db_init_reference_datasets.py. The data files exist inside
          # the Docker container at /app/depictio/projects/init/penguins/, not on the host.
          # Therefore, we skip CLI operations that require host filesystem access.

          # Validate project config (tests validation logic with Docker path detection)
          depictio-cli --verbose config validate-project-config \
            --project-config-path ../projects/init/penguins/project.yaml \
            --CLI-config-path admin_config.yaml

          # Sync project to server (validates against API)
          depictio-cli --verbose config sync-project-config-to-server \
            --update \
            --project-config-path ../projects/init/penguins/project.yaml \
            --CLI-config-path admin_config.yaml

          # Skip scan/process/run - penguins is already initialized as reference dataset
          # The verification step below confirms the project and data exist in the database

          echo "✅ Penguin CLI operations passed"

      - name: Test Image Demo CLI operations
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing Image Demo CLI operations..."

          # Test Image DC workflow with delta table creation and S3 image uploads
          # Validates that Image DCs work like Table DCs but with mandatory image_column

          # Validate project config (tests Image DC model validation)
          depictio-cli --verbose config validate-project-config \
            --project-config-path ../projects/test/image_demo/project.yaml \
            --CLI-config-path admin_config.yaml

          # Sync project to server
          depictio-cli --verbose config sync-project-config-to-server \
            --project-config-path ../projects/test/image_demo/project.yaml \
            --CLI-config-path admin_config.yaml

          # Scan data files (syncs images to S3)
          depictio-cli --verbose data scan \
            --sync-files \
            --project-config-path ../projects/test/image_demo/project.yaml \
            --CLI-config-path admin_config.yaml

          # Process data into deltatables (creates delta table from CSV)
          depictio-cli --verbose data process \
            --overwrite \
            --project-config-path ../projects/test/image_demo/project.yaml \
            --CLI-config-path admin_config.yaml

          echo "✅ Image Demo CLI operations passed"

      - name: Test Image Demo dashboard import
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing Image Demo dashboard import..."

          # Import Image Demo dashboard
          IMPORT_OUTPUT=$(depictio-cli dashboard import ../projects/test/image_demo/dashboards/gallery.yaml --config admin_config.yaml 2>&1)
          echo "$IMPORT_OUTPUT"

          # Extract dashboard ID
          DASHBOARD_ID=$(echo "$IMPORT_OUTPUT" | grep "Dashboard ID:" | awk '{print $NF}')

          if [ -z "$DASHBOARD_ID" ]; then
            echo "❌ Failed to extract dashboard ID from import output"
            exit 1
          fi

          echo "✅ Image Demo dashboard imported with ID: $DASHBOARD_ID"

          # Verify dashboard in database
          echo "🔍 Verifying dashboard registration in database..."

          # Get access token from admin config (same pattern as Iris verification)
          JWT_TOKEN=$(grep 'access_token' admin_config.yaml | awk '{print $2}' | tr -d "'\"")

          if [ -z "$JWT_TOKEN" ]; then
            echo "❌ Failed to get access token from admin_config.yaml"
            exit 1
          fi

          echo "  ✓ Got access token from config (length: ${#JWT_TOKEN})"

          API_URL="http://localhost:8058/depictio/api/v1/dashboards/get/$DASHBOARD_ID"
          RESPONSE=$(curl -s -H "Authorization: Bearer $JWT_TOKEN" "$API_URL")

          if echo "$RESPONSE" | grep -q '"dashboard_id"'; then
            echo "✅ Image Demo dashboard verified in database"
            TITLE=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('title', 'N/A'))" 2>/dev/null || echo "N/A")
            echo "  Dashboard Name: $TITLE"
            echo "  Dashboard ID: $DASHBOARD_ID"
          else
            echo "❌ Image Demo dashboard not found in database"
            exit 1
          fi

          echo "✅ Image Demo dashboard import test passed"

      - name: Test YAML export-import roundtrip (iris dashboard)
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing YAML export-import roundtrip for iris dashboard..."

          # Import iris YAML to get a fresh dashboard ID to seed the roundtrip
          IMPORT_OUTPUT=$(depictio-cli dashboard import \
            ../projects/init/iris/dashboards/overview.yaml \
            --config admin_config.yaml --overwrite 2>&1)
          echo "$IMPORT_OUTPUT"

          IRIS_ID=$(echo "$IMPORT_OUTPUT" | grep -oE '[0-9a-f]{24}' | head -1)
          if [ -z "$IRIS_ID" ]; then
            echo "❌ Failed to extract dashboard ID from import output"
            exit 1
          fi
          echo "  ✓ Imported iris dashboard with ID: $IRIS_ID"

          # Delegate to roundtrip_check.sh (export → strip → import → export → YAML compare + DB JSON compare)
          export IRIS_ID
          export CLI=$(which depictio-cli)
          export PYTHON=$(which python3)
          export CONFIG=admin_config.yaml
          bash ../../scripts/roundtrip_check.sh

          echo "✅ YAML export-import roundtrip passed!"

      - name: Test backup commands (read-only)
        run: |
          cd depictio/cli
          source venv/bin/activate
          echo "📋 Testing backup commands (read-only)..."

          # List backups (read-only, won't fail if empty)
          depictio-cli backup list --CLI-config-path admin_config.yaml || true

          echo "✅ Backup commands passed"

      - name: Verify Image Demo project
        run: |
          # Verify project was created
          IMAGE_DEMO_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Image Component Demo Project") | .name')
          [ -z "$IMAGE_DEMO_PROJECT" ] && echo "❌ Image Demo project not found" && exit 1
          echo "✅ Image Demo project found"

          # Verify Image DC deltatable was created
          IMAGE_DEMO_DC=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Image Component Demo Project") | .workflows[0].data_collections[0]._id')
          echo "📊 Image Demo DC ID: $IMAGE_DEMO_DC"

          IMAGE_DEMO_DT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.deltatables.find({\"data_collection_id\": ObjectId(\"$IMAGE_DEMO_DC\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')
          [ -z "$IMAGE_DEMO_DT" ] && echo "❌ Image Demo deltatable not found" && exit 1
          echo "✅ Image Demo deltatable created successfully"

          # Verify images were uploaded to S3
          echo "📊 Checking S3 for uploaded images..."
          IMAGE_COUNT=$(docker compose exec -T minio mc ls depictio/depictio-bucket/image_demo/ 2>/dev/null | grep -c "\.png" || true)
          IMAGE_COUNT=${IMAGE_COUNT:-0}
          [ "$IMAGE_COUNT" -eq 0 ] && echo "⚠️  Warning: No images found in S3, but continuing..." || echo "✅ Found $IMAGE_COUNT images in S3"

      - name: Verify CLI test project
        run: |
          # Verify project was created
          CLI_TEST_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "CLI Test Project") | .name')
          [ -z "$CLI_TEST_PROJECT" ] && echo "❌ CLI Test Project not found" && exit 1
          echo "✅ CLI Test Project found"

          # Verify deltatable was created
          CLI_TEST_DC=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "CLI Test Project") | .workflows[0].data_collections[0]._id')
          CLI_TEST_DT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.deltatables.find({\"data_collection_id\": ObjectId(\"$CLI_TEST_DC\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')
          [ -z "$CLI_TEST_DT" ] && echo "❌ CLI Test deltatable not found" && exit 1
          echo "✅ CLI Test deltatable created successfully"

      - name: Verify Iris integration from CLI
        run: |
          # Verify project (auto-initialized as reference dataset)
          IRIS_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Iris Dataset Project Data Analysis") | .name')
          [ -z "$IRIS_PROJECT" ] && echo "❌ Iris project not found" && exit 1
          echo "✅ Iris project found: $IRIS_PROJECT"

          # Verify deltatable (created during reference dataset initialization)
          IRIS_DC_ID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Iris Dataset Project Data Analysis") | .workflows[0].data_collections[0]._id')
          echo "📊 Iris DC ID: $IRIS_DC_ID"

          # Check all deltatables to see what's available
          echo "📊 All deltatables in database:"
          docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "db.deltatables.find({}).limit(5).forEach(doc => print(JSON.stringify(doc)))" --quiet 2>&1 | head -20 || echo "No deltatables found"

          IRIS_DT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.deltatables.find({\"data_collection_id\": ObjectId(\"$IRIS_DC_ID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')

          if [ -z "$IRIS_DT" ]; then
            echo "❌ Iris deltatable not found for DC ID: $IRIS_DC_ID"
            echo "This is expected - Iris is a reference dataset that gets auto-initialized"
            echo "Skipping deltatable verification for reference datasets in CLI job"
          else
            echo "✅ Iris deltatable found: $IRIS_DT"
          fi

          echo "✅ Iris reference dataset verified (project exists)"

      - name: Verify Penguin integration
        run: |
          # Verify project was auto-initialized
          PENGUIN_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Palmer Penguins Species Comparison") | .name')
          [ -z "$PENGUIN_PROJECT" ] && echo "❌ Penguin project not found" && exit 1
          echo "✅ Penguin project found: $PENGUIN_PROJECT"

          # Verify deltatables were auto-created during reference dataset initialization
          PENGUIN_DC1=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Palmer Penguins Species Comparison") | .workflows[0].data_collections[0]._id')
          PENGUIN_DT1=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.deltatables.find({\"data_collection_id\": ObjectId(\"$PENGUIN_DC1\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty')

          if [ -z "$PENGUIN_DT1" ]; then
            echo "❌ Penguin deltatable not found for DC ID: $PENGUIN_DC1"
            echo "This is expected - Penguins is a reference dataset that gets auto-initialized"
            echo "Skipping deltatable verification for reference datasets in CLI job"
          else
            echo "✅ Penguin deltatable found: $PENGUIN_DT1"
          fi

          echo "✅ Penguin reference dataset verified (project exists)"

      - name: Download ampliseq test data from public S3
        run: |
          S3_URL="https://nf-core-awsmegatests.s3.amazonaws.com/ampliseq/results-3d5c7e5bec28de279337f3ffe3c312a45940b782"
          TARGET="ampliseq-testdata"
          echo "📥 Downloading ampliseq test data..."

          mkdir -p "$TARGET/input" \
                   "$TARGET/multiqc/multiqc_data" \
                   "$TARGET/qiime2/diversity/alpha_diversity/faith_pd_vector" \
                   "$TARGET/qiime2/alpha-rarefaction" \
                   "$TARGET/qiime2/barplot" \
                   "$TARGET/qiime2/rel_abundance_tables" \
                   "$TARGET/qiime2/ancombc/differentials/Category-habitat-level-2"

          # Download all files needed by recipes + template
          curl -fsSL "$S3_URL/input/Metadata_full.tsv" -o "$TARGET/input/Metadata_full.tsv"
          curl -fsSL "$S3_URL/multiqc/multiqc_data/multiqc.parquet" -o "$TARGET/multiqc/multiqc_data/multiqc.parquet"
          curl -fsSL "$S3_URL/qiime2/diversity/alpha_diversity/faith_pd_vector/metadata.tsv" -o "$TARGET/qiime2/diversity/alpha_diversity/faith_pd_vector/metadata.tsv"
          curl -fsSL "$S3_URL/qiime2/alpha-rarefaction/faith_pd.csv" -o "$TARGET/qiime2/alpha-rarefaction/faith_pd.csv"
          curl -fsSL "$S3_URL/qiime2/barplot/level-2.csv" -o "$TARGET/qiime2/barplot/level-2.csv"
          curl -fsSL "$S3_URL/qiime2/rel_abundance_tables/rel-table-2.tsv" -o "$TARGET/qiime2/rel_abundance_tables/rel-table-2.tsv"
          for f in lfc_slice.csv p_val_slice.csv q_val_slice.csv w_slice.csv se_slice.csv; do
            curl -fsSL "$S3_URL/qiime2/ancombc/differentials/Category-habitat-level-2/$f" \
              -o "$TARGET/qiime2/ancombc/differentials/Category-habitat-level-2/$f"
          done

          # Generate samplesheet from Metadata_full.tsv (ID column → sampleID)
          echo "sampleID" > "$TARGET/samplesheet.csv"
          tail -n +2 "$TARGET/input/Metadata_full.tsv" | awk -F'\t' '{print $1}' >> "$TARGET/samplesheet.csv"
          echo "📋 Samplesheet created with $(tail -n +2 "$TARGET/samplesheet.csv" | wc -l | tr -d ' ') samples"

          echo "✅ Test data downloaded ($(find "$TARGET" -type f | wc -l) files)"

      - name: Run ampliseq recipes (standalone execution)
        run: |
          cd depictio/cli
          source venv/bin/activate
          DATA_DIR="$(pwd)/../../ampliseq-testdata"
          echo "🔬 Running standalone recipe execution against real data..."

          depictio-cli recipe run nf-core/ampliseq/alpha_diversity.py --data-dir "$DATA_DIR"
          echo "✅ alpha_diversity recipe passed"

          depictio-cli recipe run nf-core/ampliseq/alpha_rarefaction.py --data-dir "$DATA_DIR"
          echo "✅ alpha_rarefaction recipe passed"

          depictio-cli recipe run nf-core/ampliseq/taxonomy_composition.py --data-dir "$DATA_DIR"
          echo "✅ taxonomy_composition recipe passed"

          depictio-cli recipe run nf-core/ampliseq/ancombc.py --data-dir "$DATA_DIR"
          echo "✅ ancombc recipe passed"

          # taxonomy_rel_abundance has a dc_ref source — exits 0 with a skip message in standalone mode
          depictio-cli recipe run nf-core/ampliseq/taxonomy_rel_abundance.py --data-dir "$DATA_DIR"
          echo "✅ taxonomy_rel_abundance recipe passed (dc_ref skipped in standalone)"

          echo "✅ All 5 ampliseq recipes executed successfully"

      - name: Run ampliseq full template pipeline
        run: |
          cd depictio/cli
          source venv/bin/activate
          DATA_DIR="$(pwd)/../../ampliseq-testdata"
          echo "🚀 Running full template pipeline: depictio run --template..."

          depictio-cli run \
            --template nf-core/ampliseq/2.16.0 \
            --data-root "$DATA_DIR" \
            --project-name "Ampliseq CI Template Test" \
            --var SAMPLESHEET_FILE="$DATA_DIR/samplesheet.csv" \
            --CLI-config-path admin_config.yaml \
            --continue-on-error

          echo "✅ Full template pipeline execution completed"

      - name: Verify ampliseq template pipeline results
        run: |
          # Verify the CLI-created project exists (separate from the auto-initialized one)
          AMPLISEQ_CI_PROJECT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Ampliseq CI Template Test") | .name')
          [ -z "$AMPLISEQ_CI_PROJECT" ] && echo "❌ Ampliseq CI Template Test project not found" && exit 1
          echo "✅ Template-created project found: $AMPLISEQ_CI_PROJECT"

          # Verify data collections were created (7 expected: multiqc + metadata + 5 recipes)
          AMPLISEQ_CI_PID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Ampliseq CI Template Test") | ._id')
          DC_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find({\"_id\": ObjectId(\"$AMPLISEQ_CI_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[].workflows[0].data_collections | length')
          [ "$DC_COUNT" -lt 5 ] && echo "❌ Data collections incomplete (expected >=5, got $DC_COUNT)" && exit 1
          echo "✅ Data collections verified: $DC_COUNT collections"

          # Count deltatables created for this project's data collections
          DC_IDS=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find({\"_id\": ObjectId(\"$AMPLISEQ_CI_PID\")}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[].workflows[0].data_collections[]._id')
          DT_COUNT=0
          for dc_id in $DC_IDS; do
            HAS_DT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "db.deltatables.countDocuments({\"data_collection_id\": ObjectId(\"$dc_id\")})" --quiet 2>&1 | tail -1)
            [ "${HAS_DT:-0}" -gt 0 ] && DT_COUNT=$((DT_COUNT + 1))
          done
          echo "📊 Deltatables created for CI project: $DT_COUNT / $DC_COUNT data collections"

          # Also verify the auto-initialized project still exists
          AMPLISEQ_AUTO=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[] | select(.name == "Ampliseq Microbial Community Analysis") | .name')
          [ -z "$AMPLISEQ_AUTO" ] && echo "⚠️  Auto-initialized ampliseq project not found (unexpected)" || echo "✅ Auto-initialized project still exists: $AMPLISEQ_AUTO"

          echo "✅ Ampliseq template & recipe full execution verified"

      - name: Upload logs on failure
        if: failure()
        run: docker compose logs > cli-comprehensive-logs.txt
        continue-on-error: true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cli-comprehensive-logs
          path: cli-comprehensive-logs.txt
          retention-days: 7

  backup-s3-strategies-comprehensive-tests:
    needs: [docker-build]
    if: always() && needs.docker-build.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        backup_strategy: [local, s3_to_s3, both]
        include:
          - backup_strategy: local
            strategy_name: "S3 to Local"
            s3_enabled: false
            expected_local_files: true
            expected_s3_files: false
          - backup_strategy: s3_to_s3
            strategy_name: "S3 to S3"
            s3_enabled: true
            expected_local_files: false
            expected_s3_files: true
          - backup_strategy: both
            strategy_name: "S3 to Both"
            s3_enabled: true
            expected_local_files: true
            expected_s3_files: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          cache-dependency-path: "pyproject.toml"

      - name: Setup environment for ${{ matrix.strategy_name }}
        run: |
          echo "🔧 Setting up environment for ${{ matrix.strategy_name }} backup strategy..."
          echo "🐳 Docker permissions and user setup..."
          sudo chmod 666 /var/run/docker.sock
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          # Note: UID is a readonly bash variable, already available to subprocesses
          # GID is also typically available, so no export needed
          export DATA_DIR=data             # Export DATA_DIR variable
          echo "UID: $(id -u), GID: $(id -g)"

          echo "📁 Creating environment files..."
          # Create root .env for Docker Compose variables
          cp .env.example .env
          echo "✅ Root .env file created"

          # Copy to docker-compose/.env for application variables
          cp .env.example docker-compose/.env
          echo "✅ docker-compose/.env file created"

          # Add runtime variables to docker-compose/.env
          echo "UID=$(id -u)" >> docker-compose/.env
          echo "GID=$(id -g)" >> docker-compose/.env
          echo "DATA_DIR=data" >> docker-compose/.env
          echo "✅ Runtime variables (UID, GID, DATA_DIR) added to docker-compose/.env"

          echo "⚙️ Configuring backup strategy in docker-compose/.env file..."
          # Remove any existing backup configuration first
          sed -i '/^DEPICTIO_BACKUP_/d' docker-compose/.env || echo "No existing backup config to remove"

          echo "" >> docker-compose/.env
          echo "# === BACKUP STRATEGY CONFIGURATION FOR CI ===" >> docker-compose/.env
          echo "DEPICTIO_BACKUP_S3_BACKUP_STRATEGY=${{ matrix.backup_strategy }}" >> docker-compose/.env
          echo "DEPICTIO_BACKUP_BACKUP_S3_ENABLED=${{ matrix.s3_enabled }}" >> docker-compose/.env
          echo "DEPICTIO_BACKUP_BACKUP_S3_BUCKET=depictio-backup-bucket" >> docker-compose/.env
          echo "DEPICTIO_BACKUP_BACKUP_S3_ENDPOINT_URL=http://minio-backup:9000" >> docker-compose/.env
          echo "DEPICTIO_BACKUP_BACKUP_S3_REGION=us-east-1" >> docker-compose/.env
          echo "DEPICTIO_BACKUP_BACKUP_S3_ACCESS_KEY=backup_minio" >> docker-compose/.env
          echo "DEPICTIO_BACKUP_BACKUP_S3_SECRET_KEY=backup_minio123" >> docker-compose/.env

          echo "📋 Complete backup configuration for ${{ matrix.strategy_name }}:"
          grep "DEPICTIO_BACKUP" docker-compose/.env || echo "❌ No DEPICTIO_BACKUP vars found!"

          echo "📂 Creating required directories..."
          mkdir -p data/depictioDB data/minio_data data/minio_backup_data
          chmod 777 data data/depictioDB data/minio_data data/minio_backup_data
          # Ensure MongoDB can create additional directories
          chmod -R 777 data/depictioDB 2>/dev/null || echo "Directory permissions already set"
          ls -la data/depictioDB data/minio_data data/minio_backup_data
          echo "✅ Directories created and permissions set"

      - name: Log in and start services for ${{ matrix.strategy_name }}
        run: |
          echo "🚀 Starting services for ${{ matrix.strategy_name }} backup strategy..."

          echo "🔐 Logging into container registry..."
          echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

          echo "🐳 Setting up Docker image..."
          FULL_IMAGE="${{ needs.docker-build.outputs.full-image }}"
          echo "Using image: $FULL_IMAGE"
          docker pull "${FULL_IMAGE}"
          export DEPICTIO_VERSION="${FULL_IMAGE}"
          echo "DEPICTIO_VERSION set to: $DEPICTIO_VERSION"

          echo "📋 Final environment file content before starting services:"
          echo "=== ALL DEPICTIO_BACKUP VARIABLES ==="
          grep "DEPICTIO_BACKUP" docker-compose/.env || echo "❌ No DEPICTIO_BACKUP vars found!"
          echo "=== SAMPLE OF OTHER ENVIRONMENT VARIABLES ==="
          head -10 docker-compose/.env
          echo "=================================="

          echo "🐳 Starting Docker Compose services..."
          echo "Compose files: docker-compose.dev.yaml + docker-compose.backup-minio.yaml"
          echo "Environment file: docker-compose/.env"

          # Note: UID and GID are readonly bash variables, already available
          export DATA_DIR=data             # Ensure DATA_DIR exported for docker-compose
          export DEPICTIO_FASTAPI_WORKERS=1  # Single worker to avoid boot race conditions
          docker compose -f docker-compose.dev.yaml -f docker-compose/docker-compose.backup-minio.yaml --env-file docker-compose/.env up -d --force-recreate

          echo "⏳ Waiting 30 seconds for services to start..."
          sleep 30

          echo "📊 Verifying services are running..."
          docker compose ps

          echo "🔍 Checking individual container status..."
          echo "--- Depictio Backend ---"
          docker compose logs --tail=10 depictio-backend || echo "❌ Backend logs not available"
          echo "--- Main MinIO ---"
          docker compose logs --tail=5 minio || echo "❌ MinIO logs not available"
          echo "--- Backup MinIO ---"
          docker compose logs --tail=5 minio-backup || echo "❌ Backup MinIO logs not available"
          echo "--- MongoDB ---"
          docker compose logs --tail=10 mongo || echo "❌ MongoDB logs not available"

          # Wait for backup MinIO to be ready and create bucket
          echo "⏳ Waiting for backup MinIO to be ready..."
          sleep 10

          echo "🔧 Testing backup MinIO connectivity and creating bucket..."
          docker compose exec -T depictio-backend python3 -c "
          import boto3
          import time
          from botocore.exceptions import ClientError

          print('🔍 Attempting to connect to backup MinIO...')
          print('Endpoint: http://minio-backup:9000')
          print('Access Key: backup_minio')
          print('Secret Key: backup_minio123')

          # Wait for backup MinIO to be ready
          for i in range(30):
              try:
                  client = boto3.client('s3',
                      endpoint_url='http://minio-backup:9000',
                      aws_access_key_id='backup_minio',
                      aws_secret_access_key='backup_minio123',
                      region_name='us-east-1')
                  response = client.list_buckets()
                  print(f'✅ Backup MinIO ready after {i+1} attempts')
                  print(f'📋 Current buckets: {[b[\"Name\"] for b in response.get(\"Buckets\", [])]}')
                  break
              except Exception as e:
                  print(f'⚠️ Backup MinIO not ready (attempt {i+1}/30): {e}')
                  if i < 5:  # Show detailed error for first few attempts
                      import traceback
                      traceback.print_exc()
                  time.sleep(2)
          else:
              print('❌ Backup MinIO failed to start after 30 attempts')
              print('🔍 Final connection attempt with full error details:')
              try:
                  client = boto3.client('s3',
                      endpoint_url='http://minio-backup:9000',
                      aws_access_key_id='backup_minio',
                      aws_secret_access_key='backup_minio123',
                      region_name='us-east-1')
                  client.list_buckets()
              except Exception as final_e:
                  import traceback
                  traceback.print_exc()
              exit(1)

          # Create backup bucket
          print('🪣 Creating backup bucket...')
          try:
              client.create_bucket(Bucket='depictio-backup-bucket')
              print('✅ Backup bucket created successfully')
          except ClientError as e:
              if e.response['Error']['Code'] == 'BucketAlreadyOwnedByYou':
                  print('✅ Backup bucket already exists')
              else:
                  print(f'❌ Failed to create backup bucket: {e}')
                  exit(1)

          # Final verification
          final_buckets = client.list_buckets()
          print(f'📋 Final bucket list: {[b[\"Name\"] for b in final_buckets.get(\"Buckets\", [])]}')
          "

          echo "✅ Services started for ${{ matrix.strategy_name }} strategy"

      - name: Setup CLI for ${{ matrix.strategy_name }}
        run: |
          echo "🔧 Setting up CLI for ${{ matrix.strategy_name }} testing..."

          echo "📁 Navigating to CLI directory..."
          cd depictio/cli

          echo "🐍 Creating Python virtual environment..."
          uv venv --python 3.11 venv
          source venv/bin/activate
          echo "Python version: $(python --version)"
          echo "Pip version: $(pip --version)"

          echo "📦 Installing CLI dependencies..."
          uv pip install --upgrade pip
          uv pip install -e .
          echo "✅ CLI dependencies installed"

          echo "🔑 Copying admin configuration from backend container..."
          docker cp depictio-backend:/app/depictio/.depictio/admin_config.yaml .
          echo "📋 Admin config file copied, checking contents..."
          ls -la admin_config.yaml
          head -5 admin_config.yaml | grep -v "token" || echo "Config file structure check"

          echo "✅ CLI setup completed for ${{ matrix.strategy_name }}"

      - name: Wait for system initialization - ${{ matrix.strategy_name }}
        run: |
          echo "⏳ Waiting for system initialization for ${{ matrix.strategy_name }}..."

          echo "🔑 Extracting authentication token for health checks..."
          # Verify system is ready
          for i in {1..10}; do
            echo "🔍 Health check attempt $i/10..."

            if token=$(docker compose exec depictio-backend bash -c "cat /app/depictio/.depictio/admin_config.yaml" 2>/dev/null | grep 'access_token' | awk '{print $2}'); then
              token=$(echo $token | tr -d "'\"")
              echo "✅ Token extracted successfully (length: ${#token})"

              echo "🌐 Testing API health endpoint..."
              health_check=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $token" http://localhost:8058/depictio/api/v1/utils/status)
              echo "📊 Health check response: HTTP $health_check"

              if [ "$health_check" = "200" ]; then
                echo "✅ System ready for ${{ matrix.strategy_name }}"

                echo "🔍 Testing additional API endpoints..."
                # Test projects endpoint
                projects_check=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $token" http://localhost:8058/depictio/api/v1/projects/get/all)
                echo "📊 Projects endpoint: HTTP $projects_check"

                # Test backup endpoint
                backup_check=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $token" http://localhost:8058/depictio/api/v1/backup/list)
                echo "📊 Backup endpoint: HTTP $backup_check"

                break
              else
                echo "⚠️ Health check failed with HTTP $health_check"
              fi
            else
              echo "❌ Failed to extract token from admin config"
            fi

            echo "⚠️ System not ready for ${{ matrix.strategy_name }}, attempt $i/10"
            echo "🔍 Backend container logs (last 5 lines):"
            docker compose logs --tail=5 depictio-backend || echo "Failed to get logs"
            sleep 15
          done

          # Wait for background reference-dataset processing to complete
          # (iris/penguins/ampliseq scan+process runs async after API startup;
          #  deltatables are only created once background_processing_complete=true)
          echo "⏳ Waiting for background reference dataset processing to complete..."
          for i in {1..20}; do
            bg_status=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
              --eval "var doc = db.initialization.findOne({_id: 'reference_datasets_metadata'}); \
                      print(doc ? (doc.background_processing_complete ? 'complete' : (doc.background_processing_failed ? 'failed' : 'pending')) : 'missing')" \
              --quiet 2>&1 | tail -1)
            echo "📊 Background processing status (attempt $i/20): $bg_status"
            if [ "$bg_status" = "complete" ]; then
              echo "✅ Reference dataset background processing complete"
              break
            elif [ "$bg_status" = "failed" ]; then
              echo "❌ Background processing failed — checking logs:"
              docker compose logs --tail=30 depictio-backend
              exit 1
            fi
            sleep 15
          done

          # Verify iris deltatable was created (needed for migrate all-mode test)
          IRIS_DC_ID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "JSON.stringify(db.projects.find().toArray())" --quiet 2>&1 | \
            grep '^[\[{]' | jq -r '.[] | select(.name == "Iris Dataset Project Data Analysis") | .workflows[0].data_collections[0]._id' 2>/dev/null || echo "")
          if [ -n "$IRIS_DC_ID" ]; then
            IRIS_DT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
              --eval "JSON.stringify(db.deltatables.find({\"data_collection_id\": ObjectId(\"$IRIS_DC_ID\")}).toArray())" \
              --quiet 2>&1 | grep '^[\[{]' | jq -r '.[]._id // empty' 2>/dev/null || echo "")
            echo "📊 Iris deltatable: ${IRIS_DT:-not found yet}"
          fi

          echo "📊 Final container status before backup testing:"
          docker compose ps

      - name: Create backup with ${{ matrix.strategy_name }} strategy
        run: |
          echo "💾 Creating backup with ${{ matrix.strategy_name }} strategy..."
          cd depictio/cli
          source venv/bin/activate

          # Show current backup configuration from backend
          echo "📋 Checking backend configuration and database state..."

          echo "🔍 Checking environment variables in backend container..."
          docker compose exec -T depictio-backend bash -c "env | grep DEPICTIO_BACKUP || echo 'No DEPICTIO_BACKUP env vars found'"

          echo "📋 Backend backup configuration:"
          docker compose exec -T depictio-backend python3 -c "
          import os;
          print('=== ENVIRONMENT VARIABLES ===');
          for key, value in os.environ.items():
              if 'DEPICTIO_BACKUP' in key:
                  print(f'{key}={value}');
          print('=== LOADED SETTINGS ===');
          from depictio.api.v1.configs.config import settings;
          print(f'Backup Strategy: {settings.backup.s3_backup_strategy}');
          print(f'Backup S3 Enabled: {settings.backup.backup_s3_enabled}');
          print(f'Backup S3 Bucket: {settings.backup.backup_s3_bucket}');
          print(f'Backup S3 Endpoint: {settings.backup.backup_s3_endpoint_url}');
          print(f'S3 Local Backup Path: {settings.backup.s3_local_backup_path}');
          print(f'Compress Local Backups: {settings.backup.compress_local_backups}');

          print('\n=== SOURCE S3 CONFIGURATION ===');
          print(f'Source MinIO Bucket: {settings.minio.bucket}');
          print(f'Source MinIO Endpoint: {settings.minio.endpoint_url}');

          # Test connectivity to both MinIO instances
          import boto3;
          print('\n=== CONNECTIVITY TESTS ===');

          # Test source MinIO
          try:
              source_client = boto3.client('s3',
                  endpoint_url=settings.minio.endpoint_url,
                  aws_access_key_id=settings.minio.aws_access_key_id,
                  aws_secret_access_key=settings.minio.aws_secret_access_key,
                  region_name='us-east-1');
              source_buckets = source_client.list_buckets();
              print(f'✅ Source MinIO accessible, buckets: {[b[\"Name\"] for b in source_buckets.get(\"Buckets\", [])]}');

              # Check if source bucket has any deltatable data
              if settings.minio.bucket in [b[\"Name\"] for b in source_buckets.get(\"Buckets\", [])]:
                  objects = source_client.list_objects_v2(Bucket=settings.minio.bucket);
                  object_count = len(objects.get('Contents', []));
                  print(f'📊 Source bucket objects count: {object_count}');
                  if object_count > 0:
                      print('📋 Sample objects:');
                      for obj in objects.get('Contents', [])[:5]:
                          print(f'  - {obj[\"Key\"]} ({obj[\"Size\"]} bytes)');
              else:
                  print(f'❌ Source bucket {settings.minio.bucket} not found');
          except Exception as e:
              print(f'❌ Source MinIO not accessible: {e}');
              import traceback;
              traceback.print_exc();

          # Test backup MinIO
          try:
              backup_client = boto3.client('s3',
                  endpoint_url='http://minio-backup:9000',
                  aws_access_key_id='backup_minio',
                  aws_secret_access_key='backup_minio123',
                  region_name='us-east-1');
              backup_buckets = backup_client.list_buckets();
              print(f'✅ Backup MinIO accessible, buckets: {[b[\"Name\"] for b in backup_buckets.get(\"Buckets\", [])]}');
          except Exception as e:
              print(f'❌ Backup MinIO not accessible: {e}');
              import traceback;
              traceback.print_exc();
          "

          echo ""
          echo "📊 Database state analysis..."

          echo "🔍 Testing MongoDB connectivity..."
          docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "print('MongoDB connection test: ' + new Date())" --quiet || echo "❌ MongoDB query failed"

          # Show deltatable count before backup with error handling
          echo "📊 Querying deltatables collection..."
          DELTATABLE_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "
          try {
            var count = db.deltatables.countDocuments({});
            print('Deltatable count: ' + count);
            print(count);
          } catch(e) {
            print('Error counting deltatables: ' + e);
            print('0');
          }" --quiet 2>&1 | tail -1)
          echo "📊 Total deltatables in database: $DELTATABLE_COUNT"

          # Show project count
          PROJECT_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "
          try {
            var count = db.projects.countDocuments({});
            print('Project count: ' + count);
            print(count);
          } catch(e) {
            print('Error counting projects: ' + e);
            print('0');
          }" --quiet 2>&1 | tail -1)
          echo "📊 Total projects in database: $PROJECT_COUNT"

          # Debug database collections
          echo "🔍 Available collections:"
          docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "db.listCollectionNames()" --quiet || echo "❌ Failed to list collections"

          if [ "$DELTATABLE_COUNT" -gt 0 ]; then
            echo "📋 Deltatable details (first 3):"
            docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "
            db.deltatables.find({}).limit(3).forEach(function(doc) {
              var location = doc.delta_table_location || doc.location || 'no location';
              print('ID: ' + doc._id + ', Location: ' + location + ', Collection: ' + (doc.data_collection_id || 'no collection'));
            })" --quiet
          else
            echo "⚠️  No deltatables found in database - backup will have no S3 data to process"
            echo "🔍 Checking if system initialization completed..."
            docker compose logs --tail=20 depictio-backend | grep -i "iris\|init\|startup" || echo "No initialization logs found"
          fi

          # Create backup with strategy-specific prefix
          echo ""
          echo "🚀 Starting backup creation with detailed logging..."
          echo "Command: depictio-cli -v -vl DEBUG backup create --CLI-config-path admin_config.yaml --include-s3-data --s3-backup-prefix ci_${{ matrix.backup_strategy }}_backup"
          echo "Strategy: ${{ matrix.backup_strategy }}"
          echo "Expected S3 files: ${{ matrix.expected_s3_files }}"
          echo "Expected local files: ${{ matrix.expected_local_files }}"
          echo ""

          # Set up timing
          START_TIME=$(date +%s)

          # Run backup command with full debugging
          if depictio-cli -v -vl DEBUG backup create \
            --CLI-config-path admin_config.yaml \
            --include-s3-data \
            --s3-backup-prefix "ci_${{ matrix.backup_strategy }}_backup"; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "✅ Backup creation completed successfully for ${{ matrix.strategy_name }} in ${DURATION}s"
          else
            EXIT_CODE=$?
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "❌ Backup creation failed for ${{ matrix.strategy_name }} after ${DURATION}s with exit code $EXIT_CODE"

            echo "🔍 Backend logs after failed backup:"
            docker compose logs --tail=30 depictio-backend

            echo "🔍 CLI debug information:"
            ls -la admin_config.yaml
            echo "Environment variables:"
            env | grep DEPICTIO | head -10

            exit $EXIT_CODE
          fi

          echo ""
          echo "📊 Post-backup analysis..."

          # Check what was created after backup
          echo "📁 Checking backup directory structure after backup..."
          docker compose exec -T depictio-backend find /app/depictio/backups -type f -name "*" 2>/dev/null | head -10 || echo "No backup files found"

          if [ "${{ matrix.expected_local_files }}" = "true" ]; then
            echo "📂 Checking for local S3 backup files..."
            docker compose exec -T depictio-backend find /app/depictio/backups/s3_data_backups -type f -name "*" 2>/dev/null | head -5 || echo "No S3 local backup files found"
          fi

      - name: Verify S3 local backup files - ${{ matrix.strategy_name }}
        if: matrix.expected_local_files == true
        run: |
          echo "📁 Verifying local backup files for ${{ matrix.strategy_name }} strategy..."

          # Check if local backup files exist in the backend container
          echo "🔍 Checking for local backup files in backend container..."
          echo "📂 Listing backup directory structure:"
          docker compose exec -T depictio-backend find /app/depictio/backups -type d -name "*" 2>/dev/null || echo "Backup directory not found, checking if it exists..."
          docker compose exec -T depictio-backend ls -la /app/depictio/backups 2>/dev/null || echo "Main backup directory doesn't exist"
          docker compose exec -T depictio-backend ls -la /app/depictio/backups/s3_data_backups 2>/dev/null || echo "S3 backup directory doesn't exist"

          # Look for backup files by checking prefix directory
          DATE=$(date +%Y%m%d)
          echo "🔍 Searching for backup files with date prefix $DATE..."

          # Check for any backup files in the s3_data_backups directory with current date
          BACKUP_COUNT=$(docker compose exec -T depictio-backend find /app/depictio/backups/s3_data_backups -name "ci_${{ matrix.backup_strategy }}_backup" -type d 2>/dev/null | wc -l)
          echo "Found $BACKUP_COUNT backup prefix directories"

          if [ "$BACKUP_COUNT" -gt 0 ]; then
            echo "✅ Local backup directory found for ${{ matrix.strategy_name }}"
            docker compose exec -T depictio-backend find /app/depictio/backups/s3_data_backups -name "ci_${{ matrix.backup_strategy }}_backup" -type d -exec ls -la {} \;

            # Check for actual data files inside backup directories
            FILE_COUNT=$(docker compose exec -T depictio-backend find /app/depictio/backups/s3_data_backups -name "*.parquet" -o -name "*.json" -o -name "*${DATE}*" 2>/dev/null | wc -l)
            echo "Found $FILE_COUNT actual backup files"

            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ Local backup files verified for ${{ matrix.strategy_name }}"
              docker compose exec -T depictio-backend find /app/depictio/backups/s3_data_backups -name "*.parquet" -o -name "*.json" -o -name "*${DATE}*" 2>/dev/null | head -10
            else
              echo "⚠️  Backup directory exists but no files found"
            fi
          else
            echo "❌ No local backup directories found for ${{ matrix.strategy_name }}"
            exit 1
          fi

      - name: Verify S3 backup files - ${{ matrix.strategy_name }}
        if: matrix.expected_s3_files == true
        run: |
          echo "☁️ Verifying S3 backup files for ${{ matrix.strategy_name }} strategy..."

          # Check if backup files exist on local backup MinIO
          echo "📋 Checking S3 backup files in local backup MinIO for ${{ matrix.strategy_name }}..."
          docker compose exec -T depictio-backend python3 -c "
          import boto3;
          try:
              print('🔍 Connecting to backup MinIO...');
              client = boto3.client('s3',
                  endpoint_url='http://minio-backup:9000',
                  aws_access_key_id='backup_minio',
                  aws_secret_access_key='backup_minio123',
                  region_name='us-east-1');

              # Test connection first
              print('📋 Testing backup MinIO connection...');
              buckets = client.list_buckets();
              print(f'Available buckets: {[b[\"Name\"] for b in buckets.get(\"Buckets\", [])]}');

              # List all objects in the bucket for debugging
              print('📋 Listing all objects in backup bucket...');
              all_response = client.list_objects_v2(Bucket='depictio-backup-bucket');
              all_files = all_response.get('Contents', []);
              if all_files:
                  print(f'📊 Total objects in backup bucket: {len(all_files)}');
                  for f in all_files:
                      print(f'  - {f[\"Key\"]} ({f[\"Size\"]} bytes)');
              else:
                  print('📊 No objects found in backup bucket');

              # Now check for specific prefix
              print(f'🔍 Searching for files with prefix: ci_${{ matrix.backup_strategy }}_backup/');
              response = client.list_objects_v2(Bucket='depictio-backup-bucket', Prefix='ci_${{ matrix.backup_strategy }}_backup/');
              files = response.get('Contents', []);
              parquet_files = [f for f in files if f['Key'].endswith('.parquet')];
              print(f'✅ ${{ matrix.strategy_name }}: Found {len(files)} total files, {len(parquet_files)} parquet files');

              # List backup files with prefix for debugging
              if files:
                  print('📋 Prefix-specific backup files found:');
                  for f in files:
                      print(f'  - {f[\"Key\"]} ({f[\"Size\"]} bytes)');

              if len(files) == 0:
                  print('❌ No S3 backup files found for ${{ matrix.strategy_name }}');
                  exit(1);
              else:
                  print('✅ S3 backup verification successful for ${{ matrix.strategy_name }}');
          except Exception as e:
              print(f'❌ S3 verification failed for ${{ matrix.strategy_name }}: {e}');
              import traceback;
              traceback.print_exc();
              exit(1);
          "

      - name: Verify backup strategy behavior - ${{ matrix.strategy_name }}
        run: |
          echo "🔍 Verifying ${{ matrix.strategy_name }} backup strategy behavior..."
          cd depictio/cli
          source venv/bin/activate

          # List backups and get the latest one
          BACKUP_LIST=$(depictio-cli backup list --CLI-config-path admin_config.yaml)
          echo "Available backups for ${{ matrix.strategy_name }}: $BACKUP_LIST"

          # Validate backup integrity
          BACKUP_ID=$(echo "$BACKUP_LIST" | grep -o '"backup_id": "[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Using backup ID for ${{ matrix.strategy_name }}: $BACKUP_ID"

          if [ -n "$BACKUP_ID" ]; then
            depictio-cli -v -vl DEBUG backup validate "$BACKUP_ID" --CLI-config-path admin_config.yaml
            echo "✅ Backup validation successful for ${{ matrix.strategy_name }}"
          else
            echo "❌ No backup ID found for ${{ matrix.strategy_name }}"
            exit 1
          fi

      - name: Test backup restoration - ${{ matrix.strategy_name }}
        run: |
          echo "♻️ Testing backup restoration for ${{ matrix.strategy_name }}..."
          cd depictio/cli
          source venv/bin/activate

          # Drop some test data for restoration test
          docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "
            var dashboardCount = db.dashboards.countDocuments({});
            print('Dashboards before deletion for ${{ matrix.strategy_name }}: ' + dashboardCount);
            if (dashboardCount > 0) {
              db.dashboards.deleteMany({});
              print('Dashboards after deletion for ${{ matrix.strategy_name }}: ' + db.dashboards.countDocuments({}));
            }
          "

          # Get backup ID and restore
          BACKUP_LIST=$(depictio-cli backup list --CLI-config-path admin_config.yaml)
          BACKUP_ID=$(echo "$BACKUP_LIST" | grep -o '"backup_id": "[^"]*"' | head -1 | cut -d'"' -f4)

          if [ -n "$BACKUP_ID" ]; then
            echo "🔄 Performing restore test for ${{ matrix.strategy_name }}..."
            depictio-cli -v -vl DEBUG backup restore "$BACKUP_ID" \
              --CLI-config-path admin_config.yaml \
              --force

            # Verify restoration
            DASHBOARD_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "db.dashboards.countDocuments({})" --quiet)
            echo "Dashboards after restore for ${{ matrix.strategy_name }}: $DASHBOARD_COUNT"

            echo "✅ Backup restoration test completed for ${{ matrix.strategy_name }}"
          else
            echo "❌ No backup ID found for restoration test"
            exit 1
          fi

      - name: Test migrate (self-migration, metadata mode) - ${{ matrix.strategy_name }}
        run: |
          echo "🔄 Testing depictio migrate (self-migration, metadata mode) for ${{ matrix.strategy_name }}..."
          cd depictio/cli
          source venv/bin/activate

          # Resolve the Iris project name and capture before-counts
          IRIS_PROJECT_NAME="Iris Dataset Project Data Analysis"

          PROJECT_COUNT_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.projects.countDocuments({})" --quiet 2>&1 | tail -1)
          WORKFLOW_COUNT_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.workflows.countDocuments({})" --quiet 2>&1 | tail -1)
          DASHBOARD_COUNT_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 Before migrate: projects=$PROJECT_COUNT_BEFORE  workflows=$WORKFLOW_COUNT_BEFORE  dashboards=$DASHBOARD_COUNT_BEFORE"

          # Dry-run first — must not change anything
          echo "🏃 Running dry-run migrate..."
          depictio-cli -v -vl DEBUG migrate \
            --project "$IRIS_PROJECT_NAME" \
            --CLI-config-path admin_config.yaml \
            --target-config admin_config.yaml \
            --mode metadata \
            --dry-run
          echo "✅ Dry-run migrate completed"

          PROJECT_COUNT_DRY=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.projects.countDocuments({})" --quiet 2>&1 | tail -1)
          [ "$PROJECT_COUNT_DRY" -eq "$PROJECT_COUNT_BEFORE" ] || \
            { echo "❌ Dry-run changed project count ($PROJECT_COUNT_BEFORE → $PROJECT_COUNT_DRY)"; exit 1; }
          echo "✅ Dry-run did not modify the database"

          # Real migrate (same instance as source and target — idempotent upsert)
          # --overwrite required because the project already exists on this instance
          echo "🚀 Running real migrate (metadata mode)..."
          depictio-cli -v -vl DEBUG migrate \
            --project "$IRIS_PROJECT_NAME" \
            --CLI-config-path admin_config.yaml \
            --target-config admin_config.yaml \
            --mode metadata \
            --overwrite
          echo "✅ Real migrate completed"

          # Verify conflict detection: run WITHOUT --overwrite → must fail with conflict
          echo "🔒 Testing conflict detection (no --overwrite, should fail)..."
          if depictio-cli migrate \
            --project "$IRIS_PROJECT_NAME" \
            --CLI-config-path admin_config.yaml \
            --target-config admin_config.yaml \
            --mode metadata 2>&1; then
            echo "❌ Expected conflict exit but command succeeded"
            exit 1
          fi
          echo "✅ Conflict detection works — second import without --overwrite correctly rejected"

          # Verify counts are preserved (upsert is non-destructive)
          PROJECT_COUNT_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.projects.countDocuments({})" --quiet 2>&1 | tail -1)
          WORKFLOW_COUNT_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.workflows.countDocuments({})" --quiet 2>&1 | tail -1)
          DASHBOARD_COUNT_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 After migrate: projects=$PROJECT_COUNT_AFTER  workflows=$WORKFLOW_COUNT_AFTER  dashboards=$DASHBOARD_COUNT_AFTER"

          [ "$PROJECT_COUNT_AFTER" -ge "$PROJECT_COUNT_BEFORE" ] || \
            { echo "❌ Projects decreased after migrate ($PROJECT_COUNT_BEFORE → $PROJECT_COUNT_AFTER)"; exit 1; }
          [ "$WORKFLOW_COUNT_AFTER" -ge "$WORKFLOW_COUNT_BEFORE" ] || \
            { echo "❌ Workflows decreased after migrate ($WORKFLOW_COUNT_BEFORE → $WORKFLOW_COUNT_AFTER)"; exit 1; }

          echo "✅ Migrate (metadata mode) verified — non-destructive upsert confirmed"

      - name: Test migrate (dashboard mode) - ${{ matrix.strategy_name }}
        run: |
          echo "📊 Testing depictio migrate --mode dashboard for ${{ matrix.strategy_name }}..."
          cd depictio/cli
          source venv/bin/activate

          IRIS_PROJECT_NAME="Iris Dataset Project Data Analysis"

          DASH_COUNT_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 Dashboards before dashboard-mode migrate: $DASH_COUNT_BEFORE"

          # Verify there are dashboards to work with
          [ "$DASH_COUNT_BEFORE" -gt 0 ] || \
            { echo "❌ No dashboards found before dashboard-mode test — environment not set up correctly"; exit 1; }

          # Run migrate and capture output to verify dashboards were actually exported
          MIGRATE_LOG=$(mktemp)
          depictio-cli -v -vl DEBUG migrate \
            --project "$IRIS_PROJECT_NAME" \
            --CLI-config-path admin_config.yaml \
            --target-config admin_config.yaml \
            --mode dashboard \
            --overwrite 2>&1 | tee "$MIGRATE_LOG"

          # Check that the export found > 0 dashboards (not a no-op due to wrong project_id query)
          UPSERTED_DASHBOARDS=$(python3 -c "
          import re, sys
          text = open('$MIGRATE_LOG').read()
          m = re.search(r'\"dashboards\"[^0-9]*([0-9]+)', text)
          print(m.group(1) if m else '0')
          " 2>/dev/null || echo "0")
          echo "📊 Dashboards upserted in bundle: $UPSERTED_DASHBOARDS"
          [ "$UPSERTED_DASHBOARDS" -gt 0 ] || \
            { echo "❌ Dashboard mode exported 0 dashboards (project_id lookup failed)"; exit 1; }

          DASH_COUNT_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 Dashboards after dashboard-mode migrate: $DASH_COUNT_AFTER"

          [ "$DASH_COUNT_AFTER" -ge "$DASH_COUNT_BEFORE" ] || \
            { echo "❌ Dashboards decreased after dashboard migrate ($DASH_COUNT_BEFORE → $DASH_COUNT_AFTER)"; exit 1; }

          echo "✅ Migrate (dashboard mode) verified — exported $UPSERTED_DASHBOARDS dashboards"

      - name: Test migrate (all mode, S3 + MongoDB) - ${{ matrix.strategy_name }}
        run: |
          echo "🔄 Testing depictio migrate --mode all for ${{ matrix.strategy_name }}..."
          cd depictio/cli
          source venv/bin/activate

          IRIS_PROJECT_NAME="Iris Dataset Project Data Analysis"

          PROJECT_COUNT_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.projects.countDocuments({})" --quiet 2>&1 | tail -1)
          DASHBOARD_COUNT_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 Before all-mode migrate: projects=$PROJECT_COUNT_BEFORE  dashboards=$DASHBOARD_COUNT_BEFORE"

          # === Pre-flight diagnostics: verify MongoDB state before migrate ===
          echo "Pre-migrate DB diagnostics:"
          IRIS_DC_ID=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "var p=db.projects.findOne({name:'Iris Dataset Project Data Analysis'}); \
                    print(p&&p.workflows&&p.workflows[0]&&p.workflows[0].data_collections&&p.workflows[0].data_collections[0] \
                          ? p.workflows[0].data_collections[0]._id : 'NOT_FOUND')" \
            --quiet 2>&1 | tail -1)
          echo "  Iris DC _id from project: $IRIS_DC_ID"

          DT_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.deltatables.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "  Total deltatables: $DT_COUNT"

          FILES_COUNT=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.files.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "  Total files: $FILES_COUNT"

          echo "  DT data_collection_id field sample (first 3):"
          docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.deltatables.find({},{data_collection_id:1,delta_table_location:1}).limit(3).forEach(d=>print(JSON.stringify(d)))" \
            --quiet 2>&1 | grep -v "^$" || true
          echo "=== End pre-migrate diagnostics ==="

          # Run mode=all (self-migration: same instance as source and target)
          # This exercises the S3 copy code path in addition to MongoDB upserts
          MIGRATE_LOG=$(mktemp)
          depictio-cli -v -vl DEBUG migrate \
            --project "$IRIS_PROJECT_NAME" \
            --CLI-config-path admin_config.yaml \
            --target-config admin_config.yaml \
            --mode all \
            --overwrite 2>&1 | tee "$MIGRATE_LOG"

          # Verify S3 copy ran
          echo "📋 Migrate all-mode output (S3 section):"
          grep -i "s3\|location\|copied\|files" "$MIGRATE_LOG" || echo "(no S3 lines in output)"

          # Verify files and deltatables were included (dc_ids fix)
          UPSERTED_FILES=$(python3 -c "
          import re
          text = open('$MIGRATE_LOG').read()
          m = re.search(r'\"files\"[^0-9]*([0-9]+)', text)
          print(m.group(1) if m else '0')
          " 2>/dev/null || echo "0")
          UPSERTED_DELTATABLES=$(python3 -c "
          import re
          text = open('$MIGRATE_LOG').read()
          m = re.search(r'\"deltatables\"[^0-9]*([0-9]+)', text)
          print(m.group(1) if m else '0')
          " 2>/dev/null || echo "0")
          echo "📊 All-mode upserted: files=$UPSERTED_FILES  deltatables=$UPSERTED_DELTATABLES"
          [ "$UPSERTED_FILES" -gt 0 ] || \
            { echo "❌ All mode upserted 0 files (dc_ids lookup failed)"; exit 1; }
          [ "$UPSERTED_DELTATABLES" -gt 0 ] || \
            { echo "❌ All mode upserted 0 deltatables (dc_ids lookup failed)"; exit 1; }

          PROJECT_COUNT_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.projects.countDocuments({})" --quiet 2>&1 | tail -1)
          DASHBOARD_COUNT_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 After all-mode migrate: projects=$PROJECT_COUNT_AFTER  dashboards=$DASHBOARD_COUNT_AFTER"

          [ "$PROJECT_COUNT_AFTER" -ge "$PROJECT_COUNT_BEFORE" ] || \
            { echo "❌ Projects decreased after all-mode migrate ($PROJECT_COUNT_BEFORE → $PROJECT_COUNT_AFTER)"; exit 1; }
          [ "$DASHBOARD_COUNT_AFTER" -ge "$DASHBOARD_COUNT_BEFORE" ] || \
            { echo "❌ Dashboards decreased after all-mode migrate ($DASHBOARD_COUNT_BEFORE → $DASHBOARD_COUNT_AFTER)"; exit 1; }

          echo "✅ Migrate (all mode) verified — files=$UPSERTED_FILES deltatables=$UPSERTED_DELTATABLES upserted, S3 copy confirmed"

      - name: Test project cascade delete (S3 + MongoDB cleanup) - ${{ matrix.strategy_name }}
        run: |
          echo "🗑️ Testing project cascade delete for ${{ matrix.strategy_name }}..."
          cd depictio/cli
          source venv/bin/activate

          IRIS_PROJECT_NAME="Iris Dataset Project Data Analysis"

          # Resolve project ID
          TOKEN=$(grep 'access_token' admin_config.yaml | awk '{print $2}' | tr -d "'\"")
          IRIS_PROJECT_ID=$(python3 -c "
          import httpx
          r = httpx.get('http://localhost:8058/depictio/api/v1/projects/get/all',
                        headers={'Authorization': 'Bearer $TOKEN'})
          r.raise_for_status()
          projects = r.json()
          match = [p for p in projects if p.get('name') == '$IRIS_PROJECT_NAME']
          print(match[0]['id'] if match else '')
          " 2>/dev/null)

          if [ -z "$IRIS_PROJECT_ID" ]; then
            echo "⚠️  Iris project not found — skipping cascade delete test"
            exit 0
          fi
          echo "📌 Iris project ID: $IRIS_PROJECT_ID"

          # Snapshot MongoDB counts before deletion
          FILES_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.files.countDocuments({})" --quiet 2>&1 | tail -1)
          DELTATABLES_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.deltatables.countDocuments({})" --quiet 2>&1 | tail -1)
          DASHBOARDS_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          PROJECTS_BEFORE=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.projects.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 Before delete: projects=$PROJECTS_BEFORE files=$FILES_BEFORE deltatables=$DELTATABLES_BEFORE dashboards=$DASHBOARDS_BEFORE"

          # Delete the project via the API (TOKEN already set above)
          DELETE_RESP=$(python3 -c "
          import httpx
          r = httpx.delete('http://localhost:8058/depictio/api/v1/projects/delete',
                           params={'project_id': '$IRIS_PROJECT_ID'},
                           headers={'Authorization': 'Bearer $TOKEN'})
          print(r.status_code, r.text[:200])
          ")
          echo "🗑️ Delete response: $DELETE_RESP"

          # Verify project is gone
          PROJECTS_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.projects.countDocuments({})" --quiet 2>&1 | tail -1)
          [ "$PROJECTS_AFTER" -lt "$PROJECTS_BEFORE" ] || \
            { echo "❌ Project count did not decrease ($PROJECTS_BEFORE → $PROJECTS_AFTER)"; exit 1; }
          echo "✅ Project document deleted"

          # Verify dependent MongoDB docs were cascade-deleted
          FILES_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.files.countDocuments({})" --quiet 2>&1 | tail -1)
          DELTATABLES_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.deltatables.countDocuments({})" --quiet 2>&1 | tail -1)
          DASHBOARDS_AFTER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB \
            --eval "db.dashboards.countDocuments({})" --quiet 2>&1 | tail -1)
          echo "📊 After delete: projects=$PROJECTS_AFTER files=$FILES_AFTER deltatables=$DELTATABLES_AFTER dashboards=$DASHBOARDS_AFTER"

          [ "$FILES_AFTER" -lt "$FILES_BEFORE" ] || \
            { echo "❌ files collection not cleaned up ($FILES_BEFORE → $FILES_AFTER)"; exit 1; }
          [ "$DELTATABLES_AFTER" -lt "$DELTATABLES_BEFORE" ] || \
            { echo "❌ deltatables collection not cleaned up ($DELTATABLES_BEFORE → $DELTATABLES_AFTER)"; exit 1; }
          [ "$DASHBOARDS_AFTER" -lt "$DASHBOARDS_BEFORE" ] || \
            { echo "❌ dashboards collection not cleaned up ($DASHBOARDS_BEFORE → $DASHBOARDS_AFTER)"; exit 1; }

          echo "✅ Cascade delete verified — files/deltatables/dashboards all cleaned up"

      - name: Cleanup and summary - ${{ matrix.strategy_name }}
        run: |
          echo "🧹 Cleanup and summary for ${{ matrix.strategy_name }}..."

          # Show final status
          echo "📊 Final status for ${{ matrix.strategy_name }} backup strategy:"
          echo "- Strategy: ${{ matrix.backup_strategy }}"
          echo "- S3 Enabled: ${{ matrix.s3_enabled }}"
          echo "- Expected Local Files: ${{ matrix.expected_local_files }}"
          echo "- Expected S3 Files: ${{ matrix.expected_s3_files }}"

          # Stop services for this iteration
          docker compose -f docker-compose.dev.yaml -f docker-compose/docker-compose.backup-minio.yaml down
          echo "✅ ${{ matrix.strategy_name }} backup strategy test completed successfully"

      - name: Upload logs on failure
        if: failure()
        run: |
          docker compose logs > backup-${{ matrix.backup_strategy }}-logs.txt
          cd depictio/cli && ls -la >> ../backup-${{ matrix.backup_strategy }}-logs.txt
        continue-on-error: true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ matrix.backup_strategy }}-logs
          path: backup-${{ matrix.backup_strategy }}-logs.txt
          retention-days: 7

  e2e-tests:
    needs: [docker-build]
    if: always() && needs.docker-build.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo chmod 666 /var/run/docker.sock
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          cp .env.example .env
          # Enable dev mode
          sed -i 's/# DEPICTIO_DEV_MODE=false/DEPICTIO_DEV_MODE=true/' docker-compose/.env
          # Disable all special auth modes for standard auth tests (requires login)
          sed -i 's/DEPICTIO_AUTH_SINGLE_USER_MODE=true/DEPICTIO_AUTH_SINGLE_USER_MODE=false/' docker-compose/.env
          # PUBLIC_MODE and DEMO_MODE are already false in defaults, no sed needed
          mkdir -p data/depictioDB data/minio_data data/prof_files data/cache
          chmod 777 data data/depictioDB data/minio_data data/prof_files data/cache

      - name: Log in and start services
        run: |
          echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          FULL_IMAGE="${{ needs.docker-build.outputs.full-image }}"
          docker pull "${FULL_IMAGE}"
          export DEPICTIO_VERSION="${FULL_IMAGE}"
          export DEPICTIO_FASTAPI_WORKERS=1  # Single worker to avoid boot race conditions
          docker compose -f docker-compose.dev.yaml --env-file docker-compose/.env up -d
          sleep 15

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Cypress dependencies
        run: |
          cd depictio/tests/e2e-tests
          if [ ! -f "package.json" ]; then
            npm init -y
            npm install cypress --save-dev
          else
            npm ci
          fi

      - name: Run Cypress tests
        run: |
          cd depictio/tests/e2e-tests
          # Set Chrome flags for better CI rendering and stability
          export CYPRESS_BROWSER_ARGS="--disable-gpu --no-sandbox --disable-dev-shm-usage --disable-extensions --disable-background-timer-throttling --disable-renderer-backgrounding --disable-backgrounding-occluded-windows"
          # Run Chrome in headless mode for CI with improved stability
          npx cypress run \
            --browser chrome \
            --headless \
            --config screenshotsFolder=cypress/screenshots,videosFolder=cypress/videos,trashAssetsBeforeRuns=false,video=true,screenshotOnRunFailure=true,viewportWidth=1920,viewportHeight=1080,chromeWebSecurity=false \
            --spec "cypress/e2e/auth/standard/**/*.cy.js"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots
          path: depictio/tests/e2e-tests/cypress/screenshots
          retention-days: 30

      - name: Upload videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: depictio/tests/e2e-tests/cypress/videos
          retention-days: 7

  e2e-tests-public-mode:
    needs: [docker-build]
    if: always() && needs.docker-build.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo chmod 666 /var/run/docker.sock
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
          cp .env.example .env
          # Enable PUBLIC_MODE for public mode tests (disable SINGLE_USER_MODE)
          sed -i 's/DEPICTIO_AUTH_SINGLE_USER_MODE=true/DEPICTIO_AUTH_SINGLE_USER_MODE=false/' docker-compose/.env
          sed -i 's/DEPICTIO_AUTH_PUBLIC_MODE=false/DEPICTIO_AUTH_PUBLIC_MODE=true/' docker-compose/.env
          sed -i 's/# DEPICTIO_DEV_MODE=false/DEPICTIO_DEV_MODE=true/' docker-compose/.env
          mkdir -p data/depictioDB data/minio_data data/prof_files data/cache
          chmod 777 data data/depictioDB data/minio_data data/prof_files data/cache

      - name: Log in and start services
        run: |
          echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          FULL_IMAGE="${{ needs.docker-build.outputs.full-image }}"
          docker pull "${FULL_IMAGE}"
          export DEPICTIO_VERSION="${FULL_IMAGE}"
          export DEPICTIO_FASTAPI_WORKERS=1  # Single worker to avoid boot race conditions
          docker compose -f docker-compose.dev.yaml --env-file docker-compose/.env up -d

      - name: Wait for services to be ready
        run: |
          echo "⏳ Waiting for services to be ready..."

          # Wait for MongoDB
          echo "Waiting for MongoDB..."
          for i in {1..30}; do
            if docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "db.runCommand({ ping: 1 })" --quiet &>/dev/null; then
              echo "✅ MongoDB ready"
              break
            fi
            echo "MongoDB not ready yet, attempt $i/30..."
            sleep 2
          done

          # Wait for Backend API
          echo "Waiting for Backend API..."
          for i in {1..60}; do
            if curl -f http://localhost:8058/health &>/dev/null; then
              echo "✅ Backend API ready"
              break
            fi
            echo "Backend API not ready yet, attempt $i/60..."
            sleep 2
          done

          # Wait for Frontend
          echo "Waiting for Frontend..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5080/ | grep -q "200"; then
              echo "✅ Frontend ready"
              break
            fi
            echo "Frontend not ready yet, attempt $i/60..."
            sleep 2
          done

          echo "🔍 Final service status:"
          docker compose ps

      - name: Show .env files
        run: |
          echo "📋 Environment variables in docker-compose/.env:"
          cat docker-compose/.env || echo "❌ .env file not found"

      - name: Log container status
        run: |
          echo "📊 Backend container status:"
          docker compose ps depictio-backend || echo "❌ Backend container not running"
          docker compose logs --tail=30 depictio-backend || echo "❌ Failed to get backend logs"

          echo ""
          echo "📊 Frontend container status:"
          docker compose ps depictio-frontend || echo "❌ Frontend container not running"
          docker compose logs --tail=30 depictio-frontend || echo "❌ Failed to get frontend logs"

      - name: Verify public mode is working
        run: |
          echo "🔍 Verifying public mode functionality..."

          # Verify PUBLIC_MODE is enabled in .env
          if grep -q "DEPICTIO_AUTH_PUBLIC_MODE=true" docker-compose/.env; then
            echo "✅ PUBLIC_MODE enabled in docker-compose/.env"
          else
            echo "❌ PUBLIC_MODE not enabled in .env"
            exit 1
          fi

          # Check if at least one temporary user was created (validates PUBLIC_MODE is working)
          echo "Checking for temporary user creation..."
          for i in {1..10}; do
            TMP_USER=$(docker compose exec -T mongo mongosh localhost:27018/depictioDB --eval "JSON.stringify(db.users.find({email: {'\$regex': '^tmp_.*@depict\\.io$'}}).toArray())" --quiet 2>&1 | grep '^[\[{]' | jq -r '.[0].email // empty')
            if [ -n "$TMP_USER" ]; then
              echo "✅ Temporary user found: $TMP_USER"
              break
            fi
            echo "⚠️ No temporary user found yet, attempt $i/10"
            sleep 3
          done

          if [ -z "$TMP_USER" ]; then
            echo "⚠️ No temporary users created yet (this is OK if tests create them)"
            echo "PUBLIC_MODE is enabled but no temporary users exist in DB"
          fi

          echo "✅ Public mode verified"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Cypress dependencies
        run: |
          cd depictio/tests/e2e-tests
          if [ ! -f "package.json" ]; then
            npm init -y
            npm install cypress --save-dev
          else
            npm ci
          fi

      - name: Install Chrome for public mode tests
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Cypress public mode tests
        run: |
          cd depictio/tests/e2e-tests
          # Set environment variable for cypress to know it's public mode
          export CYPRESS_PUBLIC_MODE=true
          # Set Chrome flags for better CI rendering and stability
          export CYPRESS_BROWSER_ARGS="--disable-gpu --no-sandbox --disable-dev-shm-usage --disable-extensions --disable-background-timer-throttling --disable-renderer-backgrounding --disable-backgrounding-occluded-windows"
          npx cypress run \
            --browser chrome \
            --headless \
            --config screenshotsFolder=cypress/screenshots-public-mode,videosFolder=cypress/videos-public-mode,trashAssetsBeforeRuns=false,video=true,screenshotOnRunFailure=true,viewportWidth=1920,viewportHeight=1080,chromeWebSecurity=false \
            --spec "cypress/e2e/auth/public/**/*.cy.js"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots-public-mode
          path: depictio/tests/e2e-tests/cypress/screenshots-public-mode
          retention-days: 30

      - name: Upload videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos-public-mode
          path: depictio/tests/e2e-tests/cypress/videos-public-mode
          retention-days: 7

