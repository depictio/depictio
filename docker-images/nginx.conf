# -----------------------------
# Depictio viewer nginx config
# -----------------------------
# Serves the Vite-built React SPA (base `/dashboard-beta/`) and proxies
# everything else to the FastAPI backend. Mirrors the dev-server proxy
# layout in depictio/viewer/vite.config.ts so client code sees the same
# URL surface in dev and prod.
#
# Backend service name and port are overridable so this image works in
# docker-compose (default `depictio-backend:8058`) and k8s (set
# DEPICTIO_API_UPSTREAM via a templated configmap).
# -----------------------------

# Map for WebSocket upgrade handling — required for /depictio/api/v1/events/ws.
# Defined at http {} level via /etc/nginx/nginx.conf in the base image; the
# Upgrade/Connection pair below references $connection_upgrade from there.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Docker's embedded DNS resolver. Using a variable in `proxy_pass` below
# defers backend hostname resolution from nginx-startup to request time,
# so the viewer container starts cleanly even if `depictio-backend` is
# still booting / not yet registered in the compose network's DNS.
# Without this, nginx fails fast with "host not found in upstream" when
# the backend isn't already up — a hard race in docker-compose CI runs
# where services start in parallel.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # Hashed asset URLs (Vite emits `assets/<name>.<hash>.js`) are
    # immutable — long cache is safe. index.html and all other paths
    # stay no-cache so deploys are picked up on the next navigation.
    location /dashboard-beta/assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA shell. try_files falls back to index.html so client-side
    # routing under /dashboard-beta/* works on hard refresh / deep links.
    location /dashboard-beta/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /dashboard-beta/index.html;
        add_header Cache-Control "no-cache";
    }

    # Other React-owned route prefixes — same SPA shell, different entry
    # paths. Keeps the vite.config.ts dev fallback list in sync with prod.
    location ~ ^/(auth|dashboards-beta|projects-beta|about-beta|admin-beta)(/|$) {
        root /usr/share/nginx/html;
        try_files /dashboard-beta/index.html =404;
        add_header Cache-Control "no-cache";
    }

    # API + WebSocket. Upgrade headers cover the realtime events channel.
    # proxy_buffering off keeps SSE / chunked responses flowing without
    # nginx holding them until the buffer fills.
    location /depictio/api/ {
        set $upstream depictio-backend:8058; proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Backend-owned static surfaces (dashboard thumbnails, shared logos).
    # Matches the vite.config.ts dev proxy entries.
    location /static/ {
        set $upstream depictio-backend:8058; proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        set $upstream depictio-backend:8058; proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bare `/` lands on the viewer. Pre-migration the FastAPI root served
    # the Dash app; once Dash is removed (Layer 5) this becomes the only
    # entry point and a redirect to /dashboard-beta/ is the right default.
    location = / {
        return 302 /dashboard-beta/;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # Modest hardening — these mirror what the FastAPI middleware sets so
    # the SPA sees consistent headers no matter which container served it.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
