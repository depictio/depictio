# Depictio — quick start (single-user, no .env, no clone):
#   curl -LO https://raw.githubusercontent.com/depictio/depictio/stable/docker-compose.yaml
#   docker compose up -d        →  http://localhost:5080
# Stop: docker compose down · Logs: docker compose logs -f · Status: docker compose ps
#
# The minio/minio123 defaults below are for LOCAL single-user use only. For a
# multi-user / exposed deployment set DEPICTIO_AUTH_SINGLE_USER_MODE=false (the
# server then rejects weak secrets) — see .env.example. External S3, hot-reload
# dev (docker-compose.dev.yaml) and full config reference:
#   https://depictio.github.io/depictio/installation/configuration

services:
  mongo:
    image: mongo:8.0.14
    container_name: mongo
    command: mongod --port 27018
    volumes:
      - mongo_data:/data/db
    # Internal-only: no host port — don't publish the DB.
    healthcheck:
      test: ["CMD-SHELL", "mongosh --port 27018 --eval 'db.adminCommand(\"ping\")'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:8.2.1
    container_name: redis
    volumes:
      - redis_data:/data
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    # Bundled local object storage (internal-only, no host port). For external
    # S3, point DEPICTIO_MINIO_* at your endpoint and `docker compose up -d --scale minio=0`.
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${DEPICTIO_MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${DEPICTIO_MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  depictio-backend:
    image: ghcr.io/depictio/depictio-api:${DEPICTIO_VERSION:-1.0.1}
    container_name: depictio-backend
    ports:
      # Loopback-only: front with a TLS proxy for external access.
      - 127.0.0.1:8058:8058
    volumes:
      - depictio_keys:/app/depictio/keys
      # Shared worker→backend: worker writes screenshots, backend serves them.
      - depictio_screenshots:/app/depictio/api/static/screenshots
    env_file:
      - path: .env
        required: false
    environment:
      DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-true}"
      DEPICTIO_MINIO_ROOT_USER: "${DEPICTIO_MINIO_ROOT_USER:-minio}"
      DEPICTIO_MINIO_ROOT_PASSWORD: "${DEPICTIO_MINIO_ROOT_PASSWORD:-minio123}"
      DEPICTIO_BOOTSTRAP_ADMIN_EMAIL: "${DEPICTIO_BOOTSTRAP_ADMIN_EMAIL:-}"
      DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD: "${DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD:-}"
      DEPICTIO_BOOTSTRAP_SEED_TEST_USER: "${DEPICTIO_BOOTSTRAP_SEED_TEST_USER:-false}"
      DEPICTIO_BOOTSTRAP_TEST_USER_EMAIL: "${DEPICTIO_BOOTSTRAP_TEST_USER_EMAIL:-test_user@example.com}"
      DEPICTIO_BOOTSTRAP_TEST_USER_PASSWORD: "${DEPICTIO_BOOTSTRAP_TEST_USER_PASSWORD:-test_pwd}"
    command: ["/app/run_fastapi.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8058/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        # required:false so external-S3 mode (minio scaled to 0) still boots.
        condition: service_healthy
        required: false

  depictio-viewer:
    image: ghcr.io/depictio/depictio-viewer:${DEPICTIO_VERSION:-1.0.1}
    container_name: depictio-viewer
    ports:
      - 5080:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      depictio-backend:
        condition: service_healthy

  depictio-celery-worker:
    container_name: depictio-celery-worker
    # Always enabled — the dashboard editor (stepper / design mode) needs it.
    image: ghcr.io/depictio/depictio-worker:${DEPICTIO_VERSION:-1.0.1}
    volumes:
      - depictio_keys:/app/depictio/keys
      # Shared with the backend (see above) — worker writes screenshots here.
      - depictio_screenshots:/app/depictio/api/static/screenshots
    env_file:
      - path: .env
        required: false
    environment:
      DEPICTIO_CONTEXT: "server"
      DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-true}"
      DEPICTIO_MINIO_ROOT_USER: "${DEPICTIO_MINIO_ROOT_USER:-minio}"
      DEPICTIO_MINIO_ROOT_PASSWORD: "${DEPICTIO_MINIO_ROOT_PASSWORD:-minio123}"
    command: ["/app/run_celery_worker.sh"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A depictio.api.celery_worker:celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      depictio-backend:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  depictio_keys:
    driver: local
  depictio_screenshots:
    driver: local
