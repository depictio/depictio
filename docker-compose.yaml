# ============================================================================
# DEPICTIO DOCKER COMPOSE - QUICK START
# ============================================================================
# This is the main docker-compose file for running Depictio with pre-built images.
# MinIO (S3-compatible object storage) is bundled and starts by default — no
# profile flag and no .env are required for the single-user quick start.
#
# QUICK START (no git clone, no .env required):
#   curl -LO https://raw.githubusercontent.com/depictio/depictio/main/docker-compose.yaml
#   docker compose up -d
#   → http://localhost:5080   (single-user mode, no login)
#
# COMMANDS:
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Logs:   docker compose logs -f
#   Status: docker compose ps
#
# MULTI-USER / EXPOSED DEPLOYMENTS: the defaults below (minio/minio123) are for
# local single-user use only. Set DEPICTIO_AUTH_SINGLE_USER_MODE=false and the
# server refuses to boot until you provide strong DEPICTIO_MINIO_ROOT_PASSWORD
# and DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD values — see .env.example.
#
# EXTERNAL S3 (advanced) — bring your own S3/MinIO instead of the bundled one:
# set DEPICTIO_MINIO_* to your endpoint/credentials and
# DEPICTIO_MINIO_EXTERNAL_SERVICE=true in .env (the bundled minio container can
# be left stopped with `docker compose up -d --scale minio=0`).
#
# DEVELOPMENT:
#   For local development with hot-reload, use docker-compose.dev.yaml instead.
#
# CONFIGURATION:
#   - Minimal config: .env.example (copy to .env to override credentials)
#   - Complete reference: .env.complete.example
#   - Documentation: https://depictio.github.io/depictio/installation/configuration
# ============================================================================

services:
  mongo:
    image: mongo:8.0.14
    container_name: mongo
    command: mongod --port 27018
    # Internal-only: reachable by other services over the compose network.
    # Not published to the host to avoid exposing the DB.
    volumes:
      - mongo_data:/data/db
    # The stock mongo image starts as root and drops to the `mongodb` user
    # (chown the data dir + gosu). cap_drop:[ALL] removes the capabilities that
    # needs, so add back only those — keeping a minimal, hardened cap set.
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "mongosh --port 27018 --eval 'db.adminCommand(\"ping\")'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:8.2.1
    container_name: redis
    # Internal-only: reachable by other services over the compose network.
    # Not published to the host to avoid exposing the broker/cache.
    volumes:
      - redis_data:/data
    command: redis-server
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    # Bundled local object storage, started by default. For an external
    # S3/MinIO instead, point DEPICTIO_MINIO_* at your endpoint and leave this
    # container stopped (`docker compose up -d --scale minio=0`).
    # Internal-only: the backend/worker reach MinIO over the compose network.
    # Neither the S3 API nor the console is published to the host.
    volumes:
      - minio_data:/data
    environment:
      # Local single-user defaults. Override with strong secrets for any
      # multi-user / exposed deployment (the server enforces this — minio123 is
      # rejected as weak when single-user mode is off).
      MINIO_ROOT_USER: ${DEPICTIO_MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${DEPICTIO_MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address :9001
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  depictio-backend:
    image: ghcr.io/depictio/depictio-api:${DEPICTIO_VERSION:-1.0.0}
    container_name: depictio-backend
    ports:
      # Loopback-only: front this with a reverse proxy / TLS terminator for
      # external access rather than publishing the API on all interfaces.
      - 127.0.0.1:8058:8058
    volumes:
      - depictio_keys:/app/depictio/keys
    # read_only root FS: the only writable runtime paths are the depictio_keys
    # volume above and the /tmp tmpfs below.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 2G
    env_file:
      - path: .env
        required: false
    environment:
      DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-true}"
      DEPICTIO_MINIO_ROOT_USER: "${DEPICTIO_MINIO_ROOT_USER:-minio}"
      DEPICTIO_MINIO_ROOT_PASSWORD: "${DEPICTIO_MINIO_ROOT_PASSWORD:-minio123}"
      DEPICTIO_BOOTSTRAP_ADMIN_EMAIL: "${DEPICTIO_BOOTSTRAP_ADMIN_EMAIL:-}"
      DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD: "${DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD:-}"
      DEPICTIO_BOOTSTRAP_SEED_TEST_USER: "${DEPICTIO_BOOTSTRAP_SEED_TEST_USER:-false}"
      DEPICTIO_BOOTSTRAP_TEST_USER_EMAIL: "${DEPICTIO_BOOTSTRAP_TEST_USER_EMAIL:-test_user@example.com}"
      DEPICTIO_BOOTSTRAP_TEST_USER_PASSWORD: "${DEPICTIO_BOOTSTRAP_TEST_USER_PASSWORD:-test_pwd}"
    command: ["/app/run_fastapi.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8058/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      # required:false so external-S3 mode (minio scaled to 0) still starts the
      # backend without waiting for the bundled minio service.
      minio:
        condition: service_healthy
        required: false

  depictio-viewer:
    image: ghcr.io/depictio/depictio-viewer:${DEPICTIO_VERSION:-1.0.0}
    container_name: depictio-viewer
    ports:
      # Container now listens on 8080 (nginx-unprivileged / non-root); the
      # published host port is unchanged at 5080.
      - 5080:8080
    # read_only root FS: nginx-unprivileged only needs writable scratch dirs,
    # provided as tmpfs below (pid → /tmp, caches → /var/cache/nginx,
    # runtime sockets → /var/run, and /etc/nginx/conf.d where the entrypoint
    # renders default.conf.template via envsubst at startup).
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    volumes:
      # conf.d must be writable by the non-root nginx user (uid 101) so the
      # entrypoint can render default.conf.template via envsubst at startup.
      # A bare `tmpfs:` short-form mount lands root-owned 0755, so uid 101
      # fails the entrypoint's writability check ("conf.d is not writable")
      # and nginx starts with no server block → HTTP 000. The long-form mount
      # sets an explicit world-writable (sticky) mode. With read_only root,
      # this tmpfs is the only way to give the entrypoint a writable conf.d.
      - type: tmpfs
        target: /etc/nginx/conf.d
        tmpfs:
          mode: 1777
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      depictio-backend:
        condition: service_healthy

  depictio-celery-worker:
    container_name: depictio-celery-worker
    # Always enabled - required for design mode (stepper) to work
    # Dashboard editor will fail without Celery worker running
    image: ghcr.io/depictio/depictio-worker:${DEPICTIO_VERSION:-1.0.0}
    volumes:
      - depictio_keys:/app/depictio/keys
    env_file:
      - path: .env
        required: false
    environment:
      DEPICTIO_CONTEXT: "server"
      DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-true}"
      DEPICTIO_MINIO_ROOT_USER: "${DEPICTIO_MINIO_ROOT_USER:-minio}"
      DEPICTIO_MINIO_ROOT_PASSWORD: "${DEPICTIO_MINIO_ROOT_PASSWORD:-minio123}"
    command: ["/app/run_celery_worker.sh"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "celery -A depictio.api.celery_worker:celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      depictio-backend:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  depictio_keys:
    driver: local
