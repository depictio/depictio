[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "depictio-components"
version = "0.1.0"
description = "Shared React components for Depictio dashboards (Dash wrappers + NPM library)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Thomas Weber", email = "thomas.weber@embl.de" }]
dependencies = [
  "dash>=4.1,<5",
]

[tool.hatch.build.targets.wheel]
packages = ["depictio_components"]

[tool.hatch.build.targets.wheel.force-include]
"depictio_components/depictio_components.min.js" = "depictio_components/depictio_components.min.js"
