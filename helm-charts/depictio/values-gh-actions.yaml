# Disable ingress for testing
ingress:
  enabled: false

# Bootstrap credentials for the throwaway CI minikube cluster ONLY — not
# secrets in any meaningful sense (cluster lives minutes, no ingress, never
# reachable). Required since the security pass: backend pods fail fast when
# no admin exists in MongoDB and these are unset, which crash-looped every
# CI deploy. Password must be >=16 chars and not on the weak-default list.
secrets:
  bootstrapAdminEmail: "admin@example.com"
  bootstrapAdminPassword: "ci-only-bootstrap-admin-pw-1"
  # The e2e/Cypress steps expect the fixture user to exist.
  seedTestUser: true

# Use standard storage class for Minikube
storageClass: "standard"

# Test environment resource settings
mongo:
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.1"
    limits:
      memory: "2Gi"
      cpu: "1"

minio:
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.1"
    limits:
      memory: "2Gi"
      cpu: "1"

backend:
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.1"
    limits:
      memory: "2Gi"
      cpu: "1"
  env:
    DEPICTIO_LOGGING_VERBOSITY_LEVEL: "DEBUG"
    DEPICTIO_AUTH_SINGLE_USER_MODE: "true"

viewer:
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# Use small PVC sizes for testing
persistence:
  mongo:
    size: 1Gi
  minio:
    size: 1Gi
  screenshots:
    size: 100Mi
  keys:
    size: 1Mi

local_development: false # Set to true for local development
