{{- /*
  Admin bootstrap. Replaces the legacy initial_users.yaml seed. The values
  are passed through verbatim (no auto-generation) so the operator owns the
  credential — generating a random password here would lock the operator out
  of the cluster on the first boot. The chart still installs without these
  set; the API pod will simply fail-fast with a clear log line on the first
  start until they're supplied.

  All lookups/vars are defined here (above the document) so the {{- -}}
  whitespace trimming can't collide with the structural YAML below.
*/}}
{{- $secret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-depictio-secrets" .Release.Name)) }}
{{- /* External-S3 deployments (minio.enabled=false, e.g. EMBL) supply the
       real credentials via minio.env.DEPICTIO_MINIO_ROOT_*; consult them as
       fallback so the backend still gets working creds from this Secret. */}}
{{- $minioEnv := .Values.minio.env | default dict }}
{{- $access := default (default .Release.Name (index $minioEnv "DEPICTIO_MINIO_ROOT_USER")) .Values.secrets.minioRootUser }}
{{- $explicitPw := default (index $minioEnv "DEPICTIO_MINIO_ROOT_PASSWORD") .Values.secrets.minioRootPassword }}
{{- $bootstrapPwLookup := "" }}
{{- if and $secret $secret.data $secret.data.DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD }}
{{- $bootstrapPwLookup = $secret.data.DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-depictio-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app: depictio
    component: secrets
type: Opaque
data:
  MINIO_ROOT_USER: {{ $access | b64enc | quote }}
  {{- /* Priority: explicit operator value (secrets.* or minio.env.*) wins —
         the lookup only exists to keep the GENERATED password stable across
         upgrades, it must not shadow deliberate credential changes. */}}
  {{- if $explicitPw }}
  MINIO_ROOT_PASSWORD: {{ $explicitPw | b64enc | quote }}
  {{- else if and $secret $secret.data $secret.data.MINIO_ROOT_PASSWORD }}
  MINIO_ROOT_PASSWORD: {{ $secret.data.MINIO_ROOT_PASSWORD | quote }}
  {{- else }}
  MINIO_ROOT_PASSWORD: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  # Bootstrap admin (preferred path: set both via values-*-secrets.yaml or
  # External Secrets). When unset and the cluster has no existing admin,
  # the API pod logs an explicit "missing DEPICTIO_BOOTSTRAP_*" error and
  # exits non-zero — that's the safe fail-fast posture.
  DEPICTIO_BOOTSTRAP_ADMIN_EMAIL: {{ .Values.secrets.bootstrapAdminEmail | default "" | b64enc | quote }}
  {{- if .Values.secrets.bootstrapAdminPassword }}
  DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secrets.bootstrapAdminPassword | b64enc | quote }}
  {{- else if $bootstrapPwLookup }}
  # Preserve a previously-set password across upgrades when the user does
  # not re-supply it through values (e.g. when External Secrets owns it).
  DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD: {{ $bootstrapPwLookup | quote }}
  {{- else }}
  DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD: {{ "" | b64enc | quote }}
  {{- end }}
  DEPICTIO_BOOTSTRAP_SEED_TEST_USER: {{ (.Values.secrets.seedTestUser | default false) | toString | b64enc | quote }}
  DEPICTIO_BOOTSTRAP_TEST_USER_EMAIL: {{ .Values.secrets.testUserEmail | default "test_user@example.com" | b64enc | quote }}
  DEPICTIO_BOOTSTRAP_TEST_USER_PASSWORD: {{ .Values.secrets.testUserPassword | default "test_pwd" | b64enc | quote }}
