# MongoDB StatefulSet (for high availability with replica set)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-mongo
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongo
spec:
  serviceName: {{ .Release.Name }}-mongo-headless
  replicas: {{ .Values.mongo.replicas | default 1 }}
  selector:
    matchLabels:
      release: {{ .Release.Name }}
      app: mongo
      project: {{ .Values.project.slug }}
      type: app
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: mongo
        project: {{ .Values.project.slug }}
        type: app
    spec:
      {{- if gt (.Values.mongo.replicas | default 1 | int) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mongo
                - key: release
                  operator: In
                  values:
                  - {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      # No init containers - let MongoDB start normally first
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.mongo.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.mongo.securityContext | nindent 12 }}
          # Remove lifecycle hook to prevent container startup blocking
          args:
            - "mongod"
            - "--dbpath"
            - "/data/depictioDB"
            - "--port"
            - "27018"
            - "--setParameter"
            - "diagnosticDataCollectionEnabled=false"
            - "--setParameter"
            - "logLevel=1"
            {{- if gt (.Values.mongo.replicas | default 1 | int) 1 }}
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            {{- else }}
            - "--noauth"
            {{- end }}
          ports:
            - containerPort: {{ .Values.mongo.service.port }}
          resources:
            {{- toYaml .Values.mongo.resources | nindent 12 }}
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/depictioDB
          readinessProbe:
            exec:
              command:
                - mongosh
                - --port
                - "27018"
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15  # Reduced from 30s for faster startup detection
            periodSeconds: 5         # More frequent checks (was 10s)
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --port
                - "27018"
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: mongo-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ .Values.storageClass }}
      resources:
        requests:
          storage: {{ .Values.persistence.mongo.size }}
---
# Redis StatefulSet (for caching and Celery broker)
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  serviceName: {{ .Release.Name }}-redis
  replicas: {{ .Values.redis.replicas | default 1 }}
  selector:
    matchLabels:
      release: {{ .Release.Name }}
      app: redis
      project: {{ .Values.project.slug }}
      type: app
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: redis
        project: {{ .Values.project.slug }}
        type: app
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.redis.securityContext | nindent 12 }}
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60 1"
          ports:
            - containerPort: {{ .Values.redis.service.port }}
              name: redis
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: {{ .Values.redis.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: [ "{{ .Values.redis.persistence.accessMode }}" ]
      storageClassName: {{ .Values.storageClass }}
      resources:
        requests:
          storage: {{ .Values.redis.persistence.size }}
{{- end }}
---
# MinIO Deployment (S3-compatible storage)
{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-minio
  namespace: {{ .Release.Namespace }}
  labels:
    app: minio
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      release: {{ .Release.Name }}
      app: minio
      project: {{ .Values.project.slug }}
      type: app
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: minio
        project: {{ .Values.project.slug }}
        type: app
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.minio.securityContext | nindent 12 }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-depictio-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-depictio-secrets
                  key: MINIO_ROOT_PASSWORD
          args:
            - "server"
            - "/data"
          ports:
            - containerPort: {{ .Values.minio.service.httpPort }}
            - containerPort: {{ .Values.minio.service.consolePort }}
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: minio-storage
              mountPath: /data
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-minio-pvc
{{- end }}
---
# Depictio Backend Deployment (FastAPI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-depictio-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: depictio-backend
spec:
  strategy:
    type: Recreate
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      release: {{ .Release.Name }}
      app: depictio-backend
      project: {{ .Values.project.slug }}
      type: app
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: depictio-backend
        project: {{ .Values.project.slug }}
        type: app
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmaps.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- if gt (.Values.backend.replicas | int) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - depictio-backend
                - key: release
                  operator: In
                  values:
                  - {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      initContainers:
        # Generate new ObjectId and create updated config files in writable volume
        - name: update-iris-configs
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["/bin/sh"]
          args:
          - -c
          - |
            echo "Creating updated iris dataset configs with new ObjectId..."

            # Generate a new ObjectId to replace the hardcoded one
            old_id="646b0f3c1e4a2d7f8e5b8c9c"
            new_id=$(python3 -c "from bson import ObjectId; print(str(ObjectId()))")

            echo "Replacing $old_id with $new_id"

            # Copy the entire iris_dataset directory to writable volume
            cp -r /app/depictio/api/v1/configs/iris_dataset /iris-config/

            # Update the ObjectIds in the copied files
            sed -i "s/$old_id/$new_id/g" /iris-config/iris_dataset/initial_dashboard.json
            sed -i "s/$old_id/$new_id/g" /iris-config/iris_dataset/initial_project.yaml

            echo "Updated iris configs created in /iris-config/ with ObjectId: $new_id"
            echo "Files updated:"
            echo "  - /iris-config/iris_dataset/initial_dashboard.json"
            echo "  - /iris-config/iris_dataset/initial_project.yaml"
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
          volumeMounts:
            - name: iris-config-volume
              mountPath: /iris-config
        {{- if .Values.local_development }}
        - name: fix-permissions
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ["/bin/sh"]
          args:
          - -c
          - |
            echo "Fixing permissions for mounted volumes..."
            # Create directories with correct permissions for mounted PVCs
            mkdir -p /app/depictio/api/static/screenshots
            mkdir -p /app/depictio/keys
            mkdir -p /app/depictio/.depictio
            mkdir -p /tmp/depictio-uploads

            # Set ownership and permissions for PVC-mounted directories
            chown -R 1000:2000 /app/depictio/api/static/screenshots
            chown -R 1000:2000 /app/depictio/keys
            chown -R 1000:2000 /app/depictio/.depictio
            chown -R 1000:2000 /tmp/depictio-uploads

            chmod -R 775 /app/depictio/api/static/screenshots
            chmod -R 775 /app/depictio/keys
            chmod -R 775 /app/depictio/.depictio
            chmod -R 775 /tmp/depictio-uploads

            echo "PVC permissions fixed!"
          volumeMounts:
            - name: depictio-screenshots
              mountPath: /app/depictio/api/static/screenshots
            - name: depictio-keys
              mountPath: /app/depictio/keys
            - name: depictio-config
              mountPath: /app/depictio/.depictio
            - name: depictio-uploads
              mountPath: /tmp/depictio-uploads
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        {{- end }}
        - name: copy-screenshot-files
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
          command: ['sh', '-c']
          args:
            - |
              SCREENSHOT_DIR="/app/depictio/api/static/screenshots"
              COPIED=0
              # Copy all light theme screenshots (id_light.png)
              for f in "$SCREENSHOT_DIR"/*_light.png; do
                if [ -f "$f" ]; then
                  cp "$f" /mounted-screenshots/
                  COPIED=$((COPIED + 1))
                fi
              done
              # Copy all dark theme screenshots (id_dark.png)
              for f in "$SCREENSHOT_DIR"/*_dark.png; do
                if [ -f "$f" ]; then
                  cp "$f" /mounted-screenshots/
                  COPIED=$((COPIED + 1))
                fi
              done
              if [ $COPIED -gt 0 ]; then
                echo "Copied $COPIED screenshot files successfully"
                ls -la /mounted-screenshots/
              else
                echo "No screenshot files found in image, skipping copy"
              fi
          volumeMounts:
            - name: depictio-screenshots
              mountPath: /mounted-screenshots
        - name: wait-for-mongo
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-mongo {{ .Values.mongo.service.port }}; do echo "Waiting for mongo..."; sleep 2; done']
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        {{- if .Values.minio.enabled }}
        - name: wait-for-minio
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-minio {{ .Values.minio.service.httpPort }}; do echo "Waiting for minio..."; sleep 2; done']
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redis {{ .Values.redis.service.port }}; do echo "Waiting for redis..."; sleep 2; done']
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        {{- end }}
        - name: verify-config-storage
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              echo "Verifying config storage is mounted and writable..."

              # Test write access to config directory
              if touch /app/depictio/.depictio/.storage_test 2>/dev/null; then
                rm /app/depictio/.depictio/.storage_test
                echo "✅ Config storage is ready and writable"
                exit 0
              else
                echo "❌ Config storage is not writable"
                echo "Directory listing:"
                ls -la /app/depictio/.depictio/ || echo "Directory not accessible"
                exit 1
              fi
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
          volumeMounts:
            - name: depictio-config
              mountPath: /app/depictio/.depictio
      containers:
        - name: depictio-backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-backend-config
          env:
            {{- if .Values.minio.enabled }}
            - name: DEPICTIO_MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-depictio-secrets
                  key: MINIO_ROOT_USER
            - name: DEPICTIO_MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-depictio-secrets
                  key: MINIO_ROOT_PASSWORD
            {{- end }}
            - name: WATCHFILES_FORCE_POLLING
              value: "true"
            - name: PYTHONUNBUFFERED
              value: "1"
          command:
            - "/app/run_fastapi.sh"
          ports:
            - containerPort: {{ .Values.backend.service.targetPort }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: depictio-screenshots
              mountPath: /app/depictio/api/static/screenshots
            - name: depictio-keys
              mountPath: /app/depictio/keys
            - name: depictio-config
              mountPath: /app/depictio/.depictio
            - name: depictio-uploads
              mountPath: /tmp/depictio-uploads
            - name: iris-config-volume
              mountPath: /app/depictio/api/v1/configs/iris_dataset
              subPath: iris_dataset
            {{- if .Values.local_development }}
            # DEV ONLY: mount the depictio source code for development
            ## Use minikube mount or similar to mount the local source code
            - name: depictio-source
              mountPath: /app
            {{- end }}
      volumes:
        - name: depictio-screenshots
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-screenshots-pvc
        - name: depictio-keys
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-keys-pvc
        - name: depictio-config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-config-pvc
        - name: depictio-uploads
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-uploads-pvc
        - name: iris-config-volume
          emptyDir: {}
        {{- if .Values.local_development }}
        # DEV ONLY: mount the depictio source code for development
        ## Use minikube mount or similar to mount the local source code
        - name: depictio-source
          hostPath:
            path: /app
            type: Directory
        {{- end }}
---
# Depictio Viewer Deployment (nginx serving the React SPA, proxying the API)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-depictio-viewer
  namespace: {{ .Release.Namespace }}
  labels:
    app: depictio-viewer
spec:
  replicas: {{ .Values.viewer.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      release: {{ .Release.Name }}
      app: depictio-viewer
      project: {{ .Values.project.slug }}
      type: app
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: depictio-viewer
        project: {{ .Values.project.slug }}
        type: app
    spec:
      {{- if gt (.Values.viewer.replicas | int) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - depictio-viewer
                - key: release
                  operator: In
                  values:
                  - {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: depictio-viewer
          image: "{{ .Values.viewer.image.repository }}:{{ .Values.viewer.image.tag }}"
          imagePullPolicy: {{ .Values.viewer.image.pullPolicy }}
          env:
            # nginx upstream for the API proxy — points at the backend Service.
            - name: DEPICTIO_API_UPSTREAM
              value: "{{ .Release.Name }}-depictio-backend:8058"
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.viewer.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /dashboard-beta/
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
# Celery Worker Deployment (background task processing)
{{- if .Values.celery.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-celery-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app: celery-worker
spec:
  replicas: {{ .Values.celery.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      release: {{ .Release.Name }}
      app: celery-worker
      project: {{ .Values.project.slug }}
      type: app
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: celery-worker
        project: {{ .Values.project.slug }}
        type: app
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmaps.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.celery.podSecurityContext | nindent 8 }}
      initContainers:
        # STEP 0: Fix permissions for mounted volumes
        - name: fix-permissions-celery
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ["/bin/sh"]
          args:
          - -c
          - |
            echo "Fixing permissions for celery worker mounted volumes..."
            mkdir -p /app/depictio/keys
            mkdir -p /app/depictio/.depictio
            mkdir -p /tmp/depictio-uploads
            chown -R 1000:2000 /app/depictio/keys
            chown -R 1000:2000 /app/depictio/.depictio
            chown -R 1000:2000 /tmp/depictio-uploads
            chmod -R 775 /app/depictio/keys
            chmod -R 775 /app/depictio/.depictio
            chmod -R 775 /tmp/depictio-uploads
            echo "Celery worker PVC permissions fixed!"
          volumeMounts:
            - name: depictio-keys
              mountPath: /app/depictio/keys
            - name: depictio-config
              mountPath: /app/depictio/.depictio
            - name: depictio-uploads
              mountPath: /tmp/depictio-uploads
          securityContext:
            {{- toYaml .Values.celery.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        # STEP 1: Wait for MongoDB
        - name: wait-for-mongo
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-mongo {{ .Values.mongo.service.port }}; do echo "Waiting for mongo..."; sleep 2; done']
          securityContext:
            {{- toYaml .Values.celery.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        # STEP 2: Wait for Redis
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redis {{ .Values.redis.service.port }}; do echo "Waiting for redis..."; sleep 2; done']
          securityContext:
            {{- toYaml .Values.celery.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        {{- end }}
        # STEP 3: Wait for backend service to be available
        - name: wait-for-backend
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for backend service..."
              timeout=300
              elapsed=0
              while [ $elapsed -lt $timeout ]; do
                if nc -z {{ .Release.Name }}-depictio-backend {{ .Values.backend.service.httpPort }}; then
                  echo "Backend service is available"
                  exit 0
                fi
                echo "Backend not ready... (${elapsed}s/${timeout}s)"
                sleep 5
                elapsed=$((elapsed + 5))
              done
              echo "Timeout waiting for backend"
              exit 1
          securityContext:
            {{- toYaml .Values.celery.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
        # STEP 4: Verify API key files are available
        - name: wait-for-api-key
          image: "{{ .Values.initContainerImage.repository }}:{{ .Values.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.initContainerImage.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for API key files..."
              timeout=120
              elapsed=0
              while [ $elapsed -lt $timeout ]; do
                if [ -f /app/depictio/keys/api_internal_key.pem ]; then
                  echo "API key file found"
                  exit 0
                fi
                echo "Waiting for key file... (${elapsed}s/${timeout}s)"
                sleep 3
                elapsed=$((elapsed + 3))
              done
              echo "API key file not found"
              exit 1
          securityContext:
            {{- toYaml .Values.celery.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
          volumeMounts:
            - name: depictio-keys
              mountPath: /app/depictio/keys
      containers:
        - name: celery-worker
          image: "{{ .Values.celery.image.repository | default .Values.backend.image.repository }}:{{ .Values.celery.image.tag | default .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.celery.image.pullPolicy | default .Values.backend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.celery.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-celery-config
          env:
            {{- if .Values.minio.enabled }}
            - name: DEPICTIO_MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-depictio-secrets
                  key: MINIO_ROOT_USER
            - name: DEPICTIO_MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-depictio-secrets
                  key: MINIO_ROOT_PASSWORD
            {{- end }}
            - name: PYTHONUNBUFFERED
              value: "1"
          command:
            - "/app/run_celery_worker.sh"
          resources:
            {{- toYaml .Values.celery.resources | nindent 12 }}
          volumeMounts:
            - name: depictio-keys
              mountPath: /app/depictio/keys
            - name: depictio-config
              mountPath: /app/depictio/.depictio
            - name: depictio-uploads
              mountPath: /tmp/depictio-uploads
            - name: depictio-screenshots
              mountPath: /app/depictio/api/static/screenshots
            {{- if .Values.local_development }}
            - name: depictio-source
              mountPath: /app
            {{- end }}
      volumes:
        - name: depictio-keys
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-keys-pvc
        - name: depictio-config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-config-pvc
        - name: depictio-uploads
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-uploads-pvc
        - name: depictio-screenshots
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-depictio-screenshots-pvc
        {{- if .Values.local_development }}
        - name: depictio-source
          hostPath:
            path: /app
            type: Directory
        {{- end }}
{{- end }}
