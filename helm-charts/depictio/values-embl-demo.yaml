# EMBL Stable Demo Environment - demo.depictio.embl.org
# Only stable tags (without -b* suffix) deploy to this environment
#
# Layered on top of:
#   - values.yaml (base configuration)
#   - values-embl-demo-base.yaml (EMBL infrastructure + demo mode)
#   - values-embl-secrets.yaml (S3 + admin bootstrap credentials)
#
# ⚠ REQUIRED in values-embl-secrets.yaml (never commit to git):
#     secrets:
#       minioRootPassword: <strong-secret>
#       bootstrapAdminEmail:    <chosen-admin-email>
#       bootstrapAdminPassword: <strong-secret, ≥16 chars>
#
# The chart used to ship admin@example.com / changeme as the seeded admin,
# and the wipe-job below would silently reseed those defaults on every
# upgrade. The API now refuses to boot if no admin exists in MongoDB AND
# bootstrapAdminPassword is unset — that's the fail-fast contract.
#
# Tenant quota: 32 CPU / 64 GiB / 30 pods, shared with values-embl-demo-dev.yaml
# Per-env target: ~6 CPU / 12 GiB requests, ~14 CPU / 28 GiB limits — two
# envs sum to ~28 / 56 limits with margin for mongo-init / wipe-job hooks.
# Same rebalance rationale as the dev env values file — see header there
# for details.

# Demo environment configuration - auto-wipe on upgrades
demo:
  autoWipeOnUpgrade: true  # Delete PVCs before each upgrade for fresh demo state

# Viewer (nginx SPA) — stateless and tiny, so run 2 replicas for HA + a
# zero-downtime rolling deploy (no PVC, so RollingUpdate is safe here; the
# rest of the stack stays on Recreate). Cost is negligible (~50m CPU each).
viewer:
  replicas: 2
  strategy: "RollingUpdate"

# Protect the multi-replica workloads during node drains / cluster upgrades.
# Only emitted for components with >1 replica (see values.yaml), so celery
# (1 replica on stable) is intentionally left without a PDB here.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Celery worker — biggest share of the budget because it's the
# advanced-viz compute bottleneck. Threads pool so polars C-extension
# compute scales past the GIL.
celery:
  enabled: true
  replicas: 1   # multi-replica celery not validated yet on this chart
  resources:
    requests:
      memory: "6Gi"
      cpu: "3"
    limits:
      memory: "16Gi"
      cpu: "8"
  env:
    DEPICTIO_CELERY_WORKERS: "8"  # parallel tasks per worker

# Backend API — serves the React viewer's data-fetching endpoints
# (render_figure, bulk_compute_cards, …) + the SPA static assets.
# Run 2 replicas for HA + better tail latency under concurrent dashboard
# loads. Budget-neutral: per-pod requests/limits are halved vs the old single
# pod, so the aggregate (2 CPU / 4 Gi requests, 4 CPU / 8 Gi limits, 4 gunicorn
# workers) is unchanged. The init seed/wipe is safe across pods — one wins the
# Mongo `init_lock`, the rest wait. Kept on Recreate (the default): this env
# auto-wipes PVCs on upgrade, so overlapping old/new pods must be avoided.
backend:
  replicas: 2
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
  env:
    # 2 gunicorn workers per pod × 2 pods = 4 total (same as the single-pod
    # default), sized to the 2-CPU per-pod limit.
    DEPICTIO_FASTAPI_WORKERS: "2"
    # Demo mode with guided tour tooltips
    DEPICTIO_AUTH_DEMO_MODE: "true"
    DEPICTIO_AUTH_PUBLIC_MODE: "true"
    # Anonymous user configuration
    DEPICTIO_AUTH_ANONYMOUS_USER_EMAIL: "anonymous@depict.io"
    DEPICTIO_AUTH_TEMPORARY_USER_EXPIRY_HOURS: "1"
    # Configuration
    DEPICTIO_DEV_MODE: "false"
    DEPICTIO_MONGODB_WIPE: "true"
    DEPICTIO_GOOGLE_ANALYTICS_ENABLED: "true"
    DEPICTIO_GOOGLE_ANALYTICS_TRACKING_ID: "G-GM8MYRJDHL"
    # Explicit API URL to match ingress host (overrides computed URL)
    DEPICTIO_FASTAPI_PUBLIC_URL: "https://api.demo.depictio.embl.org"

# Ingress - Stable Demo Environment
ingress:
  enabled: true
  ingressClassName: "external-users"

  annotations:
    cert-manager.io/cluster-issuer: harica-issuer
    # Traefik automatically handles WebSocket upgrades

  hosts:
    - host: "demo.depictio.embl.org"
      paths:
        - path: /
          pathType: Prefix
          service:
            name: depictio-viewer
            portName: http
    - host: "api.demo.depictio.embl.org"
      paths:
        - path: /
          pathType: Prefix
          service:
            name: depictio-backend
            portName: http

  tls:
    - hosts:
        - "demo.depictio.embl.org"
        - "api.demo.depictio.embl.org"
      secretName: demo-depictio-tls

# Global domain settings
global:
  domain: "depictio.embl.org"
  urlPattern:
    type: "prefix"
    subdomain: ""
