# EMBL Dev Environment - dev.demo.depictio.embl.org
# All tags (including beta) deploy to this environment
#
# Layered on top of:
#   - values.yaml (base configuration)
#   - values-embl-demo-base.yaml (EMBL infrastructure + demo mode)
#   - values-embl-secrets.yaml (S3 credentials)
#
# Tenant quota: 32 CPU / 64 GiB / 30 pods, shared between this env and
# values-embl-demo.yaml. Per-env target: ~6 CPU / 12 GiB requests,
# ~14 CPU / 28 GiB limits — two envs sum to ~28 / 56 limits with margin
# for mongo-init / wipe-job hooks.
#
# Celery gets the largest share because it's the advanced-viz compute
# bottleneck — concurrency bumped to 8 (`replicas: 1` kept; multi-replica
# celery isn't supported yet on this chart). Dash frontend slimmed because
# the React viewer (served as static assets by the backend at
# /dashboard-beta) is taking over.

# Demo environment configuration - auto-wipe on upgrades
demo:
  autoWipeOnUpgrade: true  # Delete PVCs before each upgrade for fresh demo state

# Viewer (nginx SPA) — stateless and tiny, so run 2 replicas for HA + a
# zero-downtime rolling deploy (no PVC, so RollingUpdate is safe here).
viewer:
  replicas: 2
  strategy: "RollingUpdate"

# Protect the multi-replica workloads during node drains / cluster upgrades.
# dev runs >1 replica for backend, viewer AND celery, so all three get a PDB.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Celery worker — the advanced-viz compute bottleneck (volcano / heatmap /
# coverage_track / sankey / upset / …). dev is where we VALIDATE multi-replica
# celery before promoting to stable: Redis is a multi-consumer broker and the
# screenshots PVC is ReadWriteMany, so 2 workers is architecturally sound.
# Budget-neutral: per-pod halved, aggregate (3 CPU / 6 Gi requests, 8 CPU /
# 16 Gi limits, 8 task slots) unchanged vs the old single pod.
celery:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: "3Gi"
      cpu: "1.5"
    limits:
      memory: "8Gi"
      cpu: "4"
  env:
    DEPICTIO_CELERY_WORKERS: "4"  # 4 slots per pod × 2 pods = 8 total

# Backend API — serves the React viewer SPA + its data-fetching endpoints
# (render_figure, bulk_compute_cards, …). 2 replicas for HA + tail latency;
# budget-neutral (per-pod halved, aggregate 2 CPU / 4 Gi req, 4 CPU / 8 Gi
# limit, 4 gunicorn workers unchanged). Safe across pods via the Mongo
# `init_lock`. Kept on Recreate — this env auto-wipes PVCs on upgrade.
backend:
  replicas: 2
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
  env:
    # Demo mode with guided tour tooltips
    DEPICTIO_AUTH_DEMO_MODE: "true"
    DEPICTIO_AUTH_PUBLIC_MODE: "true"
    # Anonymous user configuration
    DEPICTIO_AUTH_ANONYMOUS_USER_EMAIL: "anonymous@depict.io"
    DEPICTIO_AUTH_TEMPORARY_USER_EXPIRY_HOURS: "1"
    # Performance — 2 gunicorn workers per pod × 2 pods = 4 total, sized to
    # the 2-CPU per-pod limit.
    DEPICTIO_FASTAPI_WORKERS: "2"  # Gunicorn workers for API
    DEPICTIO_DEV_MODE: "false"
    DEPICTIO_MONGODB_WIPE: "true"
    DEPICTIO_GOOGLE_ANALYTICS_ENABLED: "true"
    DEPICTIO_GOOGLE_ANALYTICS_TRACKING_ID: "G-MCC33FDF2Z"
    # Explicit API URL to match ingress host (for browser-based requests)
    DEPICTIO_FASTAPI_PUBLIC_URL: "https://dev.api.demo.depictio.embl.org"

# Ingress - Dev Environment
ingress:
  enabled: true
  ingressClassName: "external-users"

  annotations:
    cert-manager.io/cluster-issuer: harica-issuer
    # Traefik automatically handles WebSocket upgrades

  hosts:
    - host: "dev.demo.depictio.embl.org"
      paths:
        - path: /
          pathType: Prefix
          service:
            name: depictio-viewer
            portName: http
    - host: "dev.api.demo.depictio.embl.org"
      paths:
        - path: /
          pathType: Prefix
          service:
            name: depictio-backend
            portName: http

  tls:
    - hosts:
        - "dev.demo.depictio.embl.org"
        - "dev.api.demo.depictio.embl.org"
      secretName: devdemo-depictio-tls

# Global domain settings
global:
  domain: "depictio.embl.org"
  urlPattern:
    type: "subdomain"
    subdomain: "dev"
