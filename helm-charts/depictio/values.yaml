# =====================================================
# Depictio Helm Chart Configuration
# =====================================================
# This file contains the default configuration values for Depictio deployment.
# Override these values in environment-specific values files.

# Global values
nameOverride: ""
fullnameOverride: ""

# Kubernetes cluster DNS domain. Used to build fully-qualified Service DNS
# names for the viewer's nginx proxy (its `resolver` does raw DNS queries and
# ignores resolv.conf search domains). Most clusters use cluster.local, but
# some (e.g. EMBL ops-k1: ops-k1.embl.de) customise it.
clusterDomain: "cluster.local"

# Application configuration
appname: "depictio"

# Project configuration (required for Kubernetes labels and selectors)
project:
  slug: "depictio"  # Used in matchLabels - change for different project instances

# Storage settings
storageClass: "standard"
persistence:
  mongo:
    size: 1Gi
    accessMode: ReadWriteOnce  # Fixed: Use ReadWriteOnce for better performance with single-pod MongoDB
  minio:
    size: 1Gi
    accessMode: ReadWriteMany
  screenshots:
    size: 100Mi
    accessMode: ReadWriteMany
  keys:
    size: 1Mi
    accessMode: ReadWriteMany
  config:
    size: 10Mi
    accessMode: ReadWriteMany
  uploads:
    size: 5Gi
    accessMode: ReadWriteMany

# Secrets
secrets:
  # Optionally override the generated MinIO access key
  minioRootUser: ""
  # Optionally override the generated MinIO secret key
  minioRootPassword: ""
  # First-boot admin bootstrap. Replaces the legacy initial_users.yaml file
  # that shipped admin@example.com / changeme. Both REQUIRED for fresh
  # installs — backend pods refuse to start when no admin exists in MongoDB
  # and these are unset. Subsequent boots are no-ops, so password rotations
  # done via the UI survive Helm upgrades and PVC wipes.
  #   - bootstrapAdminEmail: any RFC-5321 email; doesn't need to be admin@example.com
  #   - bootstrapAdminPassword: ≥16 chars, not in the well-known-default list
  # In production, supply both via External Secrets Operator / SealedSecrets /
  # `helm install --set-file secrets.bootstrapAdminPassword=./admin.pw`.
  bootstrapAdminEmail: ""
  bootstrapAdminPassword: ""
  # Optional CI / Cypress fixture user. Leave seedTestUser=false in any
  # public-facing deployment so a known-credentials account never ships.
  seedTestUser: false
  testUserEmail: "test_user@example.com"
  testUserPassword: "test_pwd"

local_development: false # Set to true for local development

# Demo environment configuration
demo:
  autoWipeOnUpgrade: false  # Set to true to automatically delete PVCs before upgrades (for demo environments)

# MongoDB settings
mongo:
  # useOperator: false = self-managed StatefulSet (default, no auth, single or multi-replica)
  # useOperator: true  = Percona PSMDB Operator manages the replica set (requires operator pre-installed by cluster admin)
  useOperator: false
  auth:
    enabled: false      # Enable SCRAM auth (required when useOperator: true)
    username: depictio
    # password must be supplied via a separate secrets values file — never commit it.
    # The operator reads it from the {release}-mongo-password Secret (key: password).
    password: ""
  image:
    repository: mongo
    # Pinned to a specific 8.x release — :latest is mutable and was a CI/supply-chain
    # risk. Override per-deployment if a different minor is required.
    # When useOperator: true, set repository to percona/percona-server-mongodb and tag to 6.x.
    tag: "8.0.5"
    pullPolicy: IfNotPresent
  replicas: 1 # Set to 3 for high availability replica set
  # Cluster DNS suffix used by the Percona operator to build replica set member hostnames.
  # Only used when mongo.useOperator: true. Override per-cluster if the cluster DNS suffix
  # differs from the default (e.g. "svc.ops-k1.embl.de" for EMBL ops cluster).
  clusterServiceDNSSuffix: "svc.cluster.local"
  resources:
    requests:
      memory: "1Gi"
      cpu: "0.5"
    limits:
      memory: "1Gi"
      cpu: "1"
  service:
    type: ClusterIP
    port: 27018
  # Run as the mongo image's non-root user (UID 999). The official image
  # supports this via fsGroup; previous runAsNonRoot:false setting was a
  # leftover from the bitnami image transition and isn't required.
  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault

# Redis settings
redis:
  enabled: true
  # useOperator: false = self-managed StatefulSet (default)
  # Reserved for future Sentinel/Cluster operator support.
  useOperator: false
  image:
    repository: redis
    tag: "8.2.1"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      memory: "512Mi"  # Increased for 8 concurrent workers (4 FastAPI + 4 Dash)
      cpu: "100m"
    limits:
      memory: "1Gi"    # Doubled to prevent cache evictions under load
      cpu: "500m"
  service:
    type: ClusterIP
    port: 6379
  persistence:
    size: 1Gi
    accessMode: ReadWriteOnce
  securityContext:
    runAsNonRoot: true
    runAsUser: 999  # Redis default user
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault

# MinIO settings
minio:
  enabled: true
  image:
    repository: minio/minio
    # Pin to a specific MinIO release. The :latest tag is mutable and was
    # flagged as a supply-chain risk; override per-deployment when MinIO
    # publishes a security update you want to roll out deliberately.
    tag: "RELEASE.2024-12-18T13-15-44Z"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "1Gi"
      cpu: "0.5"
    limits:
      memory: "1Gi"
      cpu: "1"
  service:
    type: ClusterIP
    httpPort: 9000
    consolePort: 9001
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  env:
    # No default credentials. Root user / password come from the
    # ``{{ .Release.Name }}-depictio-secrets`` Kubernetes Secret (set via
    # secrets.minioRootUser / secrets.minioRootPassword in this values file)
    # and are injected into the pod via envFrom: secretRef in the MinIO
    # Deployment template. Shipping `minio` / `minio123` as a baked default
    # was a Critical finding — handing the bucket to anyone who could reach
    # the service on the cluster network.
    DEPICTIO_MINIO_BUCKET: "depictio-bucket"
    DEPICTIO_MINIO_SERVICE_PORT: "9000"
  ingress:
    separateRoute: false
    ingressClassName: ""
    annotations: {}
    labels: {}
    hosts: []
    tls: []

# Backend settings
backend:
  image:
    repository: ghcr.io/depictio/depictio-api # FastAPI backend image (post-Dash split)
    tag: "1.0.0-b7"
    pullPolicy: Always
  replicas: 1 # Balanced for stability and performance
  resources:
    requests:
      memory: "1Gi"
      cpu: "0.5"
    limits:
      memory: "4Gi"
      cpu: "2"
  service:
    type: ClusterIP
    httpPort: 80
    httpsPort: 443
    targetPort: 8058
  env:
    DEPICTIO_CONTEXT: "server"
    DEPICTIO_DEV_MODE: "false"
    DEPICTIO_LOGGING_VERBOSITY_LEVEL: "INFO"
    DEPICTIO_FASTAPI_SERVICE_PORT: "80"
    DEPICTIO_VIEWER_SERVICE_PORT: "80"
    DEPICTIO_MONGODB_WIPE: "false" # Set to true for development to wipe MongoDB on startup
    DEPICTIO_MONGODB_SERVICE_PORT: "27018"
    # DEPICTIO_MINIO_SERVICE_PORT: "9000"
    # DEPICTIO_VIEWER_SERVICE_NAME: "depictio-viewer"
    # DEPICTIO_FASTAPI_PUBLIC_URL: "https://{{ .Release.Name }}-api.{{ .Values.global.domain }}"
    # DEPICTIO_MINIO_PUBLIC_URL: "https://{{ .Release.Name }}-minio.{{ .Values.global.domain }}"
    # Performance - Reduced workers for better stability with multiple replicas
    DEPICTIO_FASTAPI_WORKERS: "4"

    # Redis Cache Configuration
    DEPICTIO_CACHE_REDIS_HOST: "redis"
    DEPICTIO_CACHE_REDIS_PORT: "6379"
    DEPICTIO_CACHE_REDIS_DB: "0"
    DEPICTIO_CACHE_ENABLE_REDIS_CACHE: "true"

    # Celery Configuration (uses Redis as broker)
    DEPICTIO_CELERY_BROKER_HOST: "redis"
    DEPICTIO_CELERY_BROKER_PORT: "6379"
    DEPICTIO_CELERY_BROKER_DB: "1"
    DEPICTIO_CELERY_RESULT_BACKEND_HOST: "redis"
    DEPICTIO_CELERY_RESULT_BACKEND_PORT: "6379"
    DEPICTIO_CELERY_RESULT_BACKEND_DB: "2"

    # Anonymous user configuration
    DEPICTIO_AUTH_ANONYMOUS_USER_EMAIL: "anonymous@depict.io"
    DEPICTIO_AUTH_TEMPORARY_USER_EXPIRY_HOURS: "24"

    # Analytics configuration
    DEPICTIO_ANALYTICS_ENABLED: "false"
    DEPICTIO_ANALYTICS_SESSION_TIMEOUT_MINUTES: "30"
    DEPICTIO_ANALYTICS_CLEANUP_DAYS: "90"
    DEPICTIO_ANALYTICS_TRACK_ANONYMOUS_USERS: "true"
    DEPICTIO_ANALYTICS_CLEANUP_ENABLED: "true"

    # Google Analytics configuration (GA4)
    # Enable to track page views, user interactions, and engagement metrics
    # Get your tracking ID from Google Analytics dashboard (Property → Data Streams)
    DEPICTIO_GOOGLE_ANALYTICS_ENABLED: "false"
    DEPICTIO_GOOGLE_ANALYTICS_TRACKING_ID: "G-XXXXXXXXXX"

    # Dashboard YAML Sync Feature (disabled by default in K8s)
    # When enabled, dashboards are synced to/from YAML files for version control
    # Requires writable persistent storage mounted at /app/dashboards
    DEPICTIO_DASHBOARD_YAML_ENABLED: "false"
    DEPICTIO_DASHBOARD_YAML_AUTO_EXPORT_ON_SAVE: "false"
    DEPICTIO_DASHBOARD_YAML_WATCHER_AUTO_START: "false"
    DEPICTIO_DASHBOARD_YAML_WATCH_LOCAL_DIR: "false"

    # Realtime Events (WebSocket / SSE / MongoDB change streams) — disabled
    # by default. Set DEPICTIO_EVENTS_ENABLED=true to expose the WebSocket /
    # SSE endpoints and start the MongoDB change-stream watcher.
    # NOTE: change streams require a replica set or sharded cluster; on a
    # standalone mongod (this chart's default with `mongo.replicas: 1`)
    # the watcher will detect the topology and stay disabled with a warning.
    # WebSocket / direct event publishing still work even on standalone.
    # DEPICTIO_EVENTS_ENABLED: "true"
    # DEPICTIO_EVENTS_MONGODB_CHANGE_STREAMS_ENABLED: "true"

  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 2000
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  ingress:
    # Set separateRoute: true to keep shared-ingress auth annotations away from the API.
    separateRoute: false
    ingressClassName: ""
    annotations: {}
    labels: {}
    hosts: []
    tls: []

# Celery Worker settings
celery:
  enabled: true
  image:
    # Distinct worker image (Celery + Playwright/chromium for screenshots).
    repository: ghcr.io/depictio/depictio-worker
    tag: "1.0.0-b7"
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"
  env:
    DEPICTIO_CELERY_WORKERS: "2"
    DEPICTIO_CELERY_ENABLED: "false"  # Controls dashboard view mode callbacks
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 2000
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault

# Viewer settings (nginx serving the built React SPA + proxying the API)
# Replaces the legacy Dash `frontend` block. The viewer is a stateless
# static server: no Python env, no PVCs, no MongoDB/Redis waits — it proxies
# to the backend at request time.
viewer:
  image:
    repository: ghcr.io/depictio/depictio-viewer # nginx + built React SPA
    tag: "1.0.0-b7"
    pullPolicy: Always
  replicas: 1 # Balanced for stability and performance
  # Deployment update strategy. Default "Recreate" matches the other
  # workloads (and is required where a single pod holds a ReadWriteOnce PVC).
  # The viewer is stateless (no PVC), so environments that run >1 replica can
  # set "RollingUpdate" here for zero-downtime deploys.
  strategy: "Recreate"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  service:
    type: ClusterIP
    httpPort: 80
    httpsPort: 443
    # 8080: the viewer image is nginx-unprivileged (uid 101) listening on
    # 8080. The Service port stays 80 for callers; only the pod target moved.
    targetPort: 8080
  # Non-root hardening so the viewer pod passes Pod Security Standards
  # "restricted" — matches backend / celery / mongo / minio. The
  # nginx-unprivileged image already runs as uid 101 on an unprivileged
  # port, so no NET_BIND_SERVICE capability is required.
  podSecurityContext:
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault

# PodDisruptionBudget for the HA-critical workloads (backend, viewer, celery).
# Opt-in and off by default so single-replica environments are unaffected: a
# PDB with minAvailable:1 on a 1-replica Deployment would block every voluntary
# node drain / cluster upgrade. The template therefore emits a PDB for a
# component only when this is enabled AND that component runs >1 replica.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Generic base ingress values
ingress:
  enabled: true
  ingressClassName: "nginx" # Default ingress class

  # You can leave hosts empty here since environment-specific values will override
  hosts: []

  # Default empty annotations and labels
  annotations: {}
  labels: {}

  # Empty TLS configuration by default
  tls: []

# Init container resource configuration
initContainerResources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# Shared image for the busybox-based init containers
# (wait-for-mongo, wait-for-redis, fix-permissions-*, etc.).
# pullPolicy defaults to Always so PSA / Capsule policies that forbid
# IfNotPresent on tagged images don't reject pod creation.
initContainerImage:
  repository: busybox
  tag: "1.35"
  pullPolicy: Always

# Curl-based init containers that probe HTTP readiness of dependent
# services (wait-for-backend-startup on frontend, wait-for-frontend on
# celery). Same pullPolicy=Always reasoning as initContainerImage.
curlInitContainerImage:
  repository: curlimages/curl
  tag: "8.5.0"
  pullPolicy: Always

global:
  domain: "example.com" # Default domain, can be overridden in environment-specific values

  # URL pattern configuration
  # Controls how service URLs are constructed for ingress and public access
  urlPattern:
    # Pattern type: "prefix" | "subdomain" | "custom"
    # - "prefix" (default): {release}-{service}.{domain}
    #     Example: demo-api.example.com
    # - "subdomain": {subdomain}{service}.{release}.{domain}
    #     Example: dev.api.demo.example.com
    # - "custom": Use custom template strings defined below
    type: "prefix"

    # Optional subdomain prefix (used with "subdomain" pattern type)
    # Examples: "dev", "staging", "prod"
    # Will automatically add trailing dot if not present
    subdomain: ""

    # Custom URL templates (used when type is "custom")
    # Available template variables: .Release.Name, .Values.global.domain, .Values.global.urlPattern.subdomain
    # These are Go templates evaluated at deployment time
    templates:
      # API service URL pattern
      # Default: "{{ .Release.Name }}-api.{{ .Values.global.domain }}"
      api: ""
      # Frontend service URL pattern
      # Default: "{{ .Release.Name }}.{{ .Values.global.domain }}"
      frontend: ""
      # MinIO service URL pattern
      # Default: "{{ .Release.Name }}-minio.{{ .Values.global.domain }}"
      minio: ""
