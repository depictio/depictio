services:
  mongo:
    image: mongo:8.0.14
    container_name: mongo
    command: mongod --dbpath /data/db --port 27018
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - 127.0.0.1:${MONGO_PORT:-27018}:27018
    volumes:
      - ./${DATA_DIR:-data}/depictioDB:/data/db
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]

  redis:
    image: redis:8.2.1
    container_name: redis
    ports:
      - 127.0.0.1:${REDIS_PORT:-6379}:6379
    volumes:
      - ./${DATA_DIR:-data}/redis:/data
    command: redis-server --dir /data --save 60 1
    user: "${UID:-1000}:${GID:-1000}"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./${DATA_DIR:-data}/minio_data:/data
    environment:
      MINIO_ROOT_USER: ${DEPICTIO_MINIO_ROOT_USER:?DEPICTIO_MINIO_ROOT_USER must be set in docker-compose/.env}
      MINIO_ROOT_PASSWORD: ${DEPICTIO_MINIO_ROOT_PASSWORD:?DEPICTIO_MINIO_ROOT_PASSWORD must be set in docker-compose/.env (>=16 chars, not a known default)}
    command: server /data --console-address :9001
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  depictio-backend:
    container_name: depictio-backend
    # Use prebuilt image if DEPICTIO_VERSION is set, otherwise build locally
    image: ${DEPICTIO_VERSION:-depictio-api:dev}
    build:
      dockerfile: docker-images/Dockerfile.api
      context: .
    ports:
      - 127.0.0.1:${FASTAPI_PORT:-8058}:8058
    volumes:
      - ./depictio:/app/depictio
      - ./dashboards:/app/dashboards
      - ./pyproject.toml:/app/pyproject.toml
      - ./packages/plotly-complexheatmap:/app/packages/plotly-complexheatmap
      - ./packages/plotly-upset:/app/packages/plotly-upset
      - ./VERSION:/app/VERSION
      - ./docker-images/run_fastapi.sh:/app/run_fastapi.sh
      - ./${DATA_DIR}/prof_files:/app/prof_files
      - ./${DATA_DIR}/minio_data:/app/minio_data
      # Phase 2: shared with the celery worker so the worker writes
      # pre-rendered MultiQC figures here and the backend reads them on
      # Redis miss. Survives `docker compose down`, so a container restart
      # never replays the 76s parse+build cost.
      - ./${DATA_DIR}/multiqc_prerender:/app/multiqc_prerender
    env_file:
      - docker-compose/.env
    environment:
        DEPICTIO_DEV_MODE: "${DEPICTIO_DEV_MODE:-false}"
        DEPICTIO_LOGGING_VERBOSITY_LEVEL: "${DEPICTIO_LOGGING_VERBOSITY_LEVEL:-DEBUG}"
        DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-false}"
        DEPICTIO_FASTAPI_WORKERS: "${DEPICTIO_FASTAPI_WORKERS:-4}"
        DEPICTIO_FASTAPI_EXTERNAL_PORT: "${DEPICTIO_FASTAPI_EXTERNAL_PORT:-8058}"
        DEPICTIO_FASTAPI_EXTERNAL_HOST: "${DEPICTIO_FASTAPI_EXTERNAL_HOST:-localhost}"
        DEPICTIO_VIEWER_EXTERNAL_PORT: "${DEPICTIO_VIEWER_EXTERNAL_PORT:-5080}"
        DEPICTIO_VIEWER_EXTERNAL_HOST: "${DEPICTIO_VIEWER_EXTERNAL_HOST:-localhost}"
        # Internal viewer target (server context). Defaults to the Vite dev server
        # (the no-profile default viewer). The screenshot worker navigates to this
        # URL to render dashboards. CI overrides it to the nginx `depictio-viewer`
        # (the `ci`-profile viewer below) so screenshots exercise the shipped
        # bundle; locally it stays on Vite (service name + in-container port 5173).
        DEPICTIO_VIEWER_SERVICE_NAME: "${DEPICTIO_VIEWER_SERVICE_NAME:-depictio-viewer-dev}"
        DEPICTIO_VIEWER_SERVICE_PORT: "${DEPICTIO_VIEWER_SERVICE_PORT:-5173}"
        DEPICTIO_MINIO_EXTERNAL_PORT: "${DEPICTIO_MINIO_EXTERNAL_PORT:-9000}"
        DEPICTIO_MINIO_EXTERNAL_HOST: "${DEPICTIO_MINIO_EXTERNAL_HOST:-localhost}"
        # Point the prerender store at the in-container mount instead of the
        # host-friendly `~/.depictio/multiqc_prerender` default. Backend +
        # worker must agree on this path or they'd write to different dirs.
        DEPICTIO_MULTIQC_PRERENDER_DIR: "/app/multiqc_prerender"
        # Realtime event system — opt-in. Backend hosts the MongoDB watcher
        # and the WebSocket / SSE endpoints — both gated on this flag.
        DEPICTIO_EVENTS_ENABLED: "${DEPICTIO_EVENTS_ENABLED:-false}"
        # Belt-and-suspenders: the editable plotly-upset / plotly-complexheatmap
        # packages are installed into the venv at image build (uv sync). If the
        # build re-used a cached layer (pre-dating the package addition), the
        # venv's .pth files are missing — these explicit PYTHONPATH entries make
        # the imports work regardless. /app stays first so depictio.* resolves
        # normally (overrides the Dockerfile's ENV PYTHONPATH=/app).
        PYTHONPATH: "/app:/app/packages/plotly-upset:/app/packages/plotly-complexheatmap"
    command: ["/app/run_fastapi.sh"]
    user: "${UID:-1000}:${GID:-1000}"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      - mongo
      - redis
      - minio

  # ─────────────────────────────────────────────────────────────────────
  # Dev viewer: Vite dev server with hot-module reload — the default viewer in
  # the dev stack. Runs by default (no profile); the nginx prod-bundle viewer
  # below is gated behind the `ci` profile, so a plain `up` is Vite-only.
  # The React source trees are bind-mounted so
  # host-side edits reflect live in the browser:
  #   docker compose -f docker-compose.dev.yaml up
  # ─────────────────────────────────────────────────────────────────────
  depictio-viewer-dev:
    container_name: depictio-viewer-dev
    image: ${DEPICTIO_VIEWER_DEV_VERSION:-depictio-viewer-dev:dev}
    build:
      dockerfile: docker-images/Dockerfile.viewer.dev
      context: .
    ports:
      - "${VIEWER_DEV_PORT:-5173}:5173"
    environment:
      # Proxy /depictio/api to the dockerised backend on the compose network
      # (internal port 8058), NOT the host default 0.0.0.0:8122 from
      # vite.config.ts — that's unreachable from inside the container.
      VITE_API_TARGET: "http://depictio-backend:8058"
      # macOS/Colima bind mounts don't deliver native fs events into the
      # Linux VM, so HMR misses host-side saves — poll instead.
      VITE_USE_POLLING: "true"
      # The browser's HMR WebSocket connects back to the host-facing port,
      # not the in-container 5173. Without this, HMR fails behind the port
      # mapping (e.g. multi-instance VIEWER_DEV_PORT).
      VITE_HMR_CLIENT_PORT: "${VIEWER_DEV_PORT:-5173}"
    volumes:
      # Live source only — node_modules stay in the image (never masked).
      # A dependency change means a rebuild; source edits hot-reload.
      - ./depictio/viewer/src:/build/depictio/viewer/src
      - ./depictio/viewer/index.html:/build/depictio/viewer/index.html
      # vite.config.ts mounted so config edits are live (Vite auto-restarts).
      - ./depictio/viewer/vite.config.ts:/build/depictio/viewer/vite.config.ts
      - ./depictio/viewer/public:/build/depictio/viewer/public
      - ./packages/depictio-components/src:/build/packages/depictio-components/src
      - ./packages/depictio-react-core/src:/build/packages/depictio-react-core/src
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      - depictio-backend
    restart: unless-stopped

  # Production-style viewer: nginx serving the built SPA bundle (mirrors the
  # `depictio-viewer` in docker-compose.yaml). OFF by default — local dev uses
  # the Vite `depictio-viewer-dev` above. It carries a `ci` profile so a plain
  # `up` skips it; CI activates it with `--profile ci` so the integration suite
  # exercises the nginx artifact that actually ships (built from PR source via
  # the `build:` block, not pulled from the registry).
  depictio-viewer:
    container_name: depictio-viewer
    image: ${DEPICTIO_VIEWER_VERSION:-depictio-viewer:dev}
    build:
      dockerfile: docker-images/Dockerfile.viewer
      context: .
    profiles: ["ci"]
    ports:
      # Container listens on 8080 (nginx-unprivileged / non-root); published
      # host port unchanged.
      - "${VIEWER_PORT:-5080}:8080"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      - depictio-backend
    restart: unless-stopped

  depictio-celery-worker:
    container_name: depictio-celery-worker
    image: ${DEPICTIO_WORKER_VERSION:-depictio-worker:dev}
    build:
      dockerfile: docker-images/Dockerfile.worker
      context: .
    volumes:
      - ./depictio:/app/depictio
      - ./dashboards:/app/dashboards
      - ./packages/plotly-complexheatmap:/app/packages/plotly-complexheatmap
      - ./packages/plotly-upset:/app/packages/plotly-upset
      - ./docker-images/run_celery_worker.sh:/app/run_celery_worker.sh
      - ./${DATA_DIR}/prof_files:/app/prof_files
      # Phase 2: same mount as the backend — worker writes here during
      # ``build_multiqc_prerender``, backend reads on cache miss.
      - ./${DATA_DIR}/multiqc_prerender:/app/multiqc_prerender
      # Worker also needs the S3 file cache mount the backend has:
      # ``_get_or_parse_multiqc_logs`` downloads MultiQC parquets to
      # /app/cache/s3_files via ``S3CacheConfig``. Without this mount the
      # worker re-downloads on every build instead of reusing what the
      # backend already fetched.
      - ./${DATA_DIR}/cache:/app/cache
    env_file:
      - docker-compose/.env
    environment:
        DEPICTIO_DEV_MODE: "${DEPICTIO_DEV_MODE:-false}"
        DEPICTIO_LOGGING_VERBOSITY_LEVEL: "${DEPICTIO_LOGGING_VERBOSITY_LEVEL:-DEBUG}"
        DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-false}"
        DEPICTIO_CONTEXT: "server"
        # The screenshot task renders dashboards by navigating to the viewer's
        # internal URL. Defaults to the Vite dev server (service name + in-container
        # port 5173); CI overrides it to the nginx `depictio-viewer:80` (ci profile)
        # so screenshots render against the shipped bundle.
        DEPICTIO_VIEWER_SERVICE_NAME: "${DEPICTIO_VIEWER_SERVICE_NAME:-depictio-viewer-dev}"
        DEPICTIO_VIEWER_SERVICE_PORT: "${DEPICTIO_VIEWER_SERVICE_PORT:-5173}"
        # Match the backend flag — keeps event publishers consistent whether
        # the work runs on the API process or the celery worker.
        DEPICTIO_EVENTS_ENABLED: "${DEPICTIO_EVENTS_ENABLED:-false}"
        # Mirror the backend mount so both processes write to the same dir.
        DEPICTIO_MULTIQC_PRERENDER_DIR: "/app/multiqc_prerender"
        DEPICTIO_S3_CACHE_DIR: "/app/cache/s3_files"
        DEPICTIO_DELTA_CACHE_DIR: "/app/cache/delta_cache"
        # Editable in-tree packages — see backend block above. The celery worker
        # is the actual importer of plotly_upset / plotly_complexheatmap from
        # compute_upset / compute_complex_heatmap tasks, so this PYTHONPATH
        # entry is mandatory here when the venv lacks the .pth files.
        PYTHONPATH: "/app:/app/packages/plotly-upset:/app/packages/plotly-complexheatmap"
    command: ["/app/run_celery_worker.sh"]
    user: "${UID:-1000}:${GID:-1000}"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      - mongo
      - redis
      - depictio-backend
      - minio

  # Optional Celery monitoring UI. Enable with `docker compose --profile monitoring up`.
  # Bound to 127.0.0.1 only — do not expose without auth.
  flower:
    image: mher/flower:2.0
    container_name: depictio-flower
    profiles: ["monitoring"]
    command:
      - celery
      - --broker=redis://redis:6379/1
      - flower
      - --port=5555
      - --persistent=True
      - --db=/data/flower.db
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"
    volumes:
      - ./${DATA_DIR:-data}/flower:/data
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      - redis
      - depictio-celery-worker
