services:
  mongo:
    image: mongo:8.0.14
    container_name: mongo
    command: mongod --dbpath /data/db --port 27018
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - ${MONGO_PORT:-27018}:27018
    volumes:
      - ./${DATA_DIR:-data}/depictioDB:/data/db

  redis:
    image: redis:8.2.1
    container_name: redis
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - ./${DATA_DIR:-data}/redis:/data
    command: redis-server --dir /data --save 60 1
    user: "${UID:-1000}:${GID:-1000}"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./${DATA_DIR:-data}/minio_data:/data
    environment:
      MINIO_ROOT_USER: ${DEPICTIO_MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${DEPICTIO_MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address :9001
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  depictio-frontend:
    container_name: depictio-frontend
    # Use prebuilt image if DEPICTIO_VERSION is set, otherwise build locally
    image: ${DEPICTIO_VERSION:-depictio:dev}
    build:
      # Use simplified uv-based Dockerfile (faster builds, pure Python)
      # Falls back to conda-based Dockerfile_depictio.dockerfile if needed
      dockerfile: docker-images/Dockerfile_depictio_uv.dockerfile
      context: .
    ports:
      - ${DASH_PORT:-5080}:5080
    volumes:
      - ./depictio:/app/depictio
      - ./docker-images/run_dash.sh:/app/run_dash.sh
      - ./pyproject.toml:/app/pyproject.toml
      - ./packages/plotly-complexheatmap:/app/packages/plotly-complexheatmap
      - ./VERSION:/app/VERSION
      - ./${DATA_DIR}/prof_files:/app/prof_files
      - ./${DATA_DIR}/cache:/app/cache
      - ./${DATA_DIR}/minio_data:/app/minio_data
    env_file:
      - docker-compose/.env
    environment:
        DEPICTIO_DEV_MODE: "${DEPICTIO_DEV_MODE:-false}"
        DEPICTIO_LOGGING_VERBOSITY_LEVEL: "${DEPICTIO_LOGGING_VERBOSITY_LEVEL:-DEBUG}"
        DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-false}"
        # Use mounted volume for S3 cache persistence across container restarts
        DEPICTIO_S3_CACHE_DIR: "/app/cache/s3_files"
        DEPICTIO_DELTA_CACHE_DIR: "/app/cache/delta_cache"
        # Browser-facing URLs the Dash app needs to know about. Without these,
        # settings.fastapi.external_url falls back to the default port and
        # cross-port links (e.g. the sidebar's beta switcher pointing at the
        # FastAPI-served React SPA) point at the wrong host:port.
        DEPICTIO_FASTAPI_EXTERNAL_PORT: "${DEPICTIO_FASTAPI_EXTERNAL_PORT:-8058}"
        DEPICTIO_FASTAPI_EXTERNAL_HOST: "${DEPICTIO_FASTAPI_EXTERNAL_HOST:-localhost}"
        DEPICTIO_DASH_EXTERNAL_PORT: "${DEPICTIO_DASH_EXTERNAL_PORT:-5080}"
        DEPICTIO_DASH_EXTERNAL_HOST: "${DEPICTIO_DASH_EXTERNAL_HOST:-localhost}"
        # Realtime event system — opt-in. Set DEPICTIO_EVENTS_ENABLED=true in
        # your shell or docker-compose/.env to turn on the WebSocket / SSE
        # endpoints and the MongoDB change-stream watcher. Dev compose's mongo
        # is standalone, so the change-stream watcher will fail-fast with a
        # warning even when enabled — but WebSocket and direct event publishing
        # still work.
        DEPICTIO_EVENTS_ENABLED: "${DEPICTIO_EVENTS_ENABLED:-false}"
    command: ["/app/run_dash.sh"]
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - mongo
      - redis
      - depictio-backend
      - minio

  depictio-backend:
    container_name: depictio-backend
    # Use prebuilt image if DEPICTIO_VERSION is set, otherwise build locally
    image: ${DEPICTIO_VERSION:-depictio:dev}
    build:
      dockerfile: docker-images/Dockerfile_depictio_uv.dockerfile
      context: .
    ports:
      - ${FASTAPI_PORT:-8058}:8058
    volumes:
      - ./depictio:/app/depictio
      - ./dashboards:/app/dashboards
      - ./pyproject.toml:/app/pyproject.toml
      - ./packages/plotly-complexheatmap:/app/packages/plotly-complexheatmap
      - ./VERSION:/app/VERSION
      - ./docker-images/run_fastapi.sh:/app/run_fastapi.sh
      - ./${DATA_DIR}/prof_files:/app/prof_files
      - ./${DATA_DIR}/minio_data:/app/minio_data
      # Phase 2: shared with the celery worker so the worker writes
      # pre-rendered MultiQC figures here and the backend reads them on
      # Redis miss. Survives `docker compose down`, so a container restart
      # never replays the 76s parse+build cost.
      - ./${DATA_DIR}/multiqc_prerender:/app/multiqc_prerender
    env_file:
      - docker-compose/.env
    environment:
        DEPICTIO_DEV_MODE: "${DEPICTIO_DEV_MODE:-false}"
        DEPICTIO_LOGGING_VERBOSITY_LEVEL: "${DEPICTIO_LOGGING_VERBOSITY_LEVEL:-DEBUG}"
        DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-false}"
        DEPICTIO_FASTAPI_WORKERS: "${DEPICTIO_FASTAPI_WORKERS:-4}"
        DEPICTIO_FASTAPI_EXTERNAL_PORT: "${DEPICTIO_FASTAPI_EXTERNAL_PORT:-8058}"
        DEPICTIO_FASTAPI_EXTERNAL_HOST: "${DEPICTIO_FASTAPI_EXTERNAL_HOST:-localhost}"
        DEPICTIO_DASH_EXTERNAL_PORT: "${DEPICTIO_DASH_EXTERNAL_PORT:-5080}"
        DEPICTIO_DASH_EXTERNAL_HOST: "${DEPICTIO_DASH_EXTERNAL_HOST:-localhost}"
        DEPICTIO_MINIO_EXTERNAL_PORT: "${DEPICTIO_MINIO_EXTERNAL_PORT:-9000}"
        DEPICTIO_MINIO_EXTERNAL_HOST: "${DEPICTIO_MINIO_EXTERNAL_HOST:-localhost}"
        # Point the prerender store at the in-container mount instead of the
        # host-friendly `~/.depictio/multiqc_prerender` default. Backend +
        # worker must agree on this path or they'd write to different dirs.
        DEPICTIO_MULTIQC_PRERENDER_DIR: "/app/multiqc_prerender"
        # Realtime event system — opt-in. See the depictio-frontend env block
        # above for the full note. Backend hosts the MongoDB watcher and the
        # WebSocket / SSE endpoints — both gated on this flag.
        DEPICTIO_EVENTS_ENABLED: "${DEPICTIO_EVENTS_ENABLED:-false}"
    command: ["/app/run_fastapi.sh"]
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - mongo
      - redis
      - minio

  # ─────────────────────────────────────────────────────────────────────
  # Vite dev server for the React viewer SPA. Runs `pnpm dev` with HMR so
  # frontend edits land in <1s instead of the ~28s `pnpm build` cycle the
  # production path requires (FastAPI serves the prebuilt `dist/`).
  #
  # Builds the `dev-viewer` Dockerfile target — same as the backend image
  # plus Node.js + corepack on top — and tags it separately so the leaner
  # prod image used by backend/frontend/celery stays unaffected. Anonymous
  # node_modules volumes prevent the host's macOS-built modules from
  # leaking into the linux container.
  #
  # Browser entry: http://localhost:${VIEWER_DEV_PORT:-5173}/dashboard-beta/<id>
  # ─────────────────────────────────────────────────────────────────────
  depictio-viewer-dev:
    container_name: depictio-viewer-dev
    profiles: ["dev"]
    image: ${DEPICTIO_VERSION:-depictio:dev-viewer}
    build:
      dockerfile: docker-images/Dockerfile_depictio_uv.dockerfile
      context: .
      target: dev-viewer
      # Build the image's `depictio` user with the host's UID/GID so it
      # matches the `user:` override below. Without this the image bakes
      # depictio as 1000:1000; on macOS the host is typically 501:20, and
      # the named-volume node_modules dirs (pre-created in the Dockerfile
      # as `depictio:depictio`) end up unwritable by the runtime UID.
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    ports:
      - ${VIEWER_DEV_PORT:-5173}:5173
    volumes:
      - ./depictio:/app/depictio
      - ./packages:/app/packages
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      # NOTE: this repo has no root `package.json` (pnpm workspace works
      # without one — each workspace package has its own). Mounting a non-
      # existent host file would make Docker silently create an empty host
      # directory, which then breaks `pnpm` everywhere.
      # Anonymous volumes shadow the bind mount's node_modules so Linux
      # binaries (esbuild, sass, etc.) don't get clobbered by macOS builds
      # the host's `pnpm install` produced.
      - viewer_node_modules:/app/depictio/viewer/node_modules
      - core_node_modules:/app/packages/depictio-react-core/node_modules
      - components_node_modules:/app/packages/depictio-components/node_modules
      - root_node_modules:/app/node_modules
    environment:
      # Vite proxy target — backend's internal port inside the docker
      # network. The production-only `0.0.0.0:8122` default in vite.config
      # is overridden by this when set.
      VITE_API_TARGET: "http://depictio-backend:8058"
      # HMR client port — what the BROWSER uses to connect back. When the
      # user hits :5173 directly this is the same; if proxied through
      # FastAPI later, override this to the FastAPI port.
      VITE_HMR_CLIENT_PORT: "${VIEWER_DEV_PORT:-5173}"
      # Force chokidar/Vite to poll the bind-mounted source. macOS →
      # Colima/Docker Desktop VMs don't deliver inotify events reliably
      # for host bind mounts, so native fs.watch silently misses host
      # saves and HMR appears frozen. Polling is the standard workaround.
      VITE_USE_POLLING: "true"
    working_dir: /app
    command:
      - sh
      - -c
      # The dev-viewer Dockerfile stage already runs `corepack prepare pnpm@10 --activate`,
      # so do NOT re-prepare here. `pnpm@latest` at runtime pulls pnpm 11, which requires
      # `node:sqlite` and crashes on Node 20 with ERR_UNKNOWN_BUILTIN_MODULE.
      - |
        pnpm install --frozen-lockfile --prefer-offline --child-concurrency=2 --network-concurrency=4 &&
        pnpm --filter depictio-viewer dev --host 0.0.0.0 --port 5173
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - depictio-backend

  depictio-celery-worker:
    container_name: depictio-celery-worker
    # Use the same image as backend
    image: ${DEPICTIO_VERSION:-depictio:dev}
    build:
      dockerfile: docker-images/Dockerfile_depictio_uv.dockerfile
      context: .
    volumes:
      - ./depictio:/app/depictio
      - ./dashboards:/app/dashboards
      - ./pyproject.toml:/app/pyproject.toml
      - ./packages/plotly-complexheatmap:/app/packages/plotly-complexheatmap
      - ./docker-images/run_celery_worker.sh:/app/run_celery_worker.sh
      - ./${DATA_DIR}/prof_files:/app/prof_files
      # Phase 2: same mount as the backend — worker writes here during
      # ``build_multiqc_prerender``, backend reads on cache miss.
      - ./${DATA_DIR}/multiqc_prerender:/app/multiqc_prerender
      # Worker also needs the S3 file cache mount the frontend already
      # has: ``_get_or_parse_multiqc_logs`` downloads MultiQC parquets to
      # /app/cache/s3_files via ``S3CacheConfig``. Without this mount the
      # worker re-downloads on every build instead of reusing what the
      # frontend already fetched.
      - ./${DATA_DIR}/cache:/app/cache
    env_file:
      - docker-compose/.env
    environment:
        DEPICTIO_DEV_MODE: "${DEPICTIO_DEV_MODE:-false}"
        DEPICTIO_LOGGING_VERBOSITY_LEVEL: "${DEPICTIO_LOGGING_VERBOSITY_LEVEL:-DEBUG}"
        DEPICTIO_AUTH_SINGLE_USER_MODE: "${DEPICTIO_AUTH_SINGLE_USER_MODE:-false}"
        DEPICTIO_CONTEXT: "server"
        # Match the backend / dash flag — keeps event publishers consistent
        # whether the work runs on the API process or the celery worker.
        DEPICTIO_EVENTS_ENABLED: "${DEPICTIO_EVENTS_ENABLED:-false}"
        # Mirror the backend mount so both processes write to the same dir.
        DEPICTIO_MULTIQC_PRERENDER_DIR: "/app/multiqc_prerender"
        DEPICTIO_S3_CACHE_DIR: "/app/cache/s3_files"
        DEPICTIO_DELTA_CACHE_DIR: "/app/cache/delta_cache"
    command: ["/app/run_celery_worker.sh"]
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - mongo
      - redis
      - depictio-backend
      - minio

  # Optional Celery monitoring UI. Enable with `docker compose --profile monitoring up`.
  # Bound to 127.0.0.1 only — do not expose without auth.
  flower:
    image: mher/flower:2.0
    container_name: depictio-flower
    profiles: ["monitoring"]
    command:
      - celery
      - --broker=redis://redis:6379/1
      - flower
      - --port=5555
      - --persistent=True
      - --db=/data/flower.db
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"
    volumes:
      - ./${DATA_DIR:-data}/flower:/data
    depends_on:
      - redis
      - depictio-celery-worker

# Named volumes for the viewer dev container's node_modules paths.
# Anonymous volumes work for the bind-mount shadow trick but named volumes
# survive `docker compose down` (without `-v`), so the slow first-start
# `pnpm install` doesn't replay every time the stack is recreated.
volumes:
  viewer_node_modules:
  core_node_modules:
  components_node_modules:
  root_node_modules:
