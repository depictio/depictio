services:
  app:
    # Use pre-built image from GHCR if available, fallback to local build
    # To use cached image: set DEVCONTAINER_IMAGE=ghcr.io/depictio/depictio-devcontainer:latest
    image: ${DEVCONTAINER_IMAGE:-}
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      # Enable BuildKit cache
      cache_from:
        - ghcr.io/depictio/depictio-devcontainer:latest
        - ghcr.io/depictio/depictio-devcontainer:main
    init: true
    volumes:
      - .:/workspace:cached
      # Docker socket - use environment variable for Codespaces compatibility
      # In Codespaces, docker-outside-of-docker feature handles this automatically
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      # Gemini and Qwen: direct bind mounts (working)
      - ~/.gemini:/home/vscode/.gemini
      - ~/.qwen:/home/vscode/.qwen
      # Claude Code: Docker volume (Mac/Linux credential incompatibility)
      - claude-code-config:/home/vscode/.claude
      # uv cache: Docker volume for fast package installation
      - uv-cache:/home/vscode/.cache/uv
    command: sleep infinity
    user: vscode
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      depictio-backend:
        condition: service_started
      depictio-viewer-dev:
        condition: service_started
      depictio-celery-worker:
        condition: service_started
    environment:
      - DEPICTIO_CONTEXT=server
      - DEPICTIO_MONGODB_SERVICE_NAME=mongo
      - DEPICTIO_MONGODB_PORT=27018
      # Devcontainer dev creds — long enough to pass the Settings()
      # weak-password validator. Override via Codespaces secrets in any
      # network-accessible workspace.
      - DEPICTIO_MINIO_ROOT_USER=depictio_devcontainer
      - DEPICTIO_MINIO_ROOT_PASSWORD=devcontainer_minio_pw_x9aKqR
      - DEPICTIO_BOOTSTRAP_ADMIN_EMAIL=admin@example.com
      - DEPICTIO_BOOTSTRAP_ADMIN_PASSWORD=devcontainer_admin_pw_4Ks8r2qZ
      - DEPICTIO_BOOTSTRAP_SEED_TEST_USER=true
      - DEPICTIO_MINIO_ENDPOINT_URL=http://minio:9000
      - CLAUDE_CONFIG_DIR=/home/vscode/.claude
      # Fix Docker API version mismatch in Codespaces
      - DOCKER_API_VERSION=1.43

  # Force single-user auth mode for the devcontainer/Codespaces stack.
  #
  # docker-compose.dev.yaml declares DEPICTIO_AUTH_SINGLE_USER_MODE under the
  # backend's `environment:` as "${DEPICTIO_AUTH_SINGLE_USER_MODE:-false}", and
  # Compose's `environment:` ALWAYS overrides `env_file:` — so the `=true` in
  # docker-compose/.env gets clobbered to `false` whenever that variable isn't
  # present in the interpolation context (a git-ignored, init-generated .env /
  # override that easily goes missing on Codespaces). This file is committed and
  # loaded AFTER both dev.yaml and the generated override, so pinning the value
  # here makes single-user mode deterministic regardless of that chain.
  depictio-backend:
    environment:
      - DEPICTIO_AUTH_SINGLE_USER_MODE=true
      - DEPICTIO_AUTH_PUBLIC_MODE=false
      - DEPICTIO_AUTH_UNAUTHENTICATED_MODE=false

  depictio-celery-worker:
    environment:
      - DEPICTIO_AUTH_SINGLE_USER_MODE=true
      - DEPICTIO_AUTH_PUBLIC_MODE=false
      - DEPICTIO_AUTH_UNAUTHENTICATED_MODE=false

volumes:
  claude-code-config:
  uv-cache:
