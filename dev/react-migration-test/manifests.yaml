# ─────────────────────────────────────────────────────────────────────
# Throwaway test deploy for the Dash → React migration.
# Single-file manifest, ephemeral storage, no ingress.
# Apply with: sed "s|__IMAGE_TAG__|<tag>|g" manifests.yaml | kubectl apply -f -
# Tear down:  kubectl delete namespace depictio-react-test
# ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: depictio-react-test
---
# Non-sensitive config. All sensitive values live in the Secret below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: depictio-config
  namespace: depictio-react-test
data:
  DEPICTIO_DEV_MODE: "false"
  DEPICTIO_LOGGING_VERBOSITY_LEVEL: "INFO"
  DEPICTIO_AUTH_SINGLE_USER_MODE: "false"
  DEPICTIO_FASTAPI_HOST: "0.0.0.0"
  DEPICTIO_FASTAPI_PORT: "8058"
  DEPICTIO_FASTAPI_WORKERS: "2"
  DEPICTIO_FASTAPI_EXTERNAL_HOST: "localhost"
  DEPICTIO_FASTAPI_EXTERNAL_PORT: "8058"
  DEPICTIO_VIEWER_EXTERNAL_HOST: "localhost"
  DEPICTIO_VIEWER_EXTERNAL_PORT: "5080"
  DEPICTIO_VIEWER_INTERNAL_HOST: "depictio-viewer"
  DEPICTIO_VIEWER_INTERNAL_PORT: "80"
  DEPICTIO_MONGODB_HOST: "mongo"
  DEPICTIO_MONGODB_PORT: "27018"
  DEPICTIO_MONGODB_DB_NAME: "depictioDB"
  DEPICTIO_MINIO_INTERNAL_ENDPOINT: "http://minio:9000"
  DEPICTIO_MINIO_EXTERNAL_HOST: "localhost"
  DEPICTIO_MINIO_EXTERNAL_PORT: "9000"
  DEPICTIO_MINIO_BUCKET: "depictio-bucket"
  DEPICTIO_REDIS_HOST: "redis"
  DEPICTIO_REDIS_PORT: "6379"
  DEPICTIO_CELERY_BROKER_HOST: "redis"
  DEPICTIO_CELERY_RESULT_BACKEND_HOST: "redis"
  DEPICTIO_EVENTS_ENABLED: "false"
  DEPICTIO_MULTIQC_PRERENDER_DIR: "/app/multiqc_prerender"
  DEPICTIO_CONTEXT: "server"
---
apiVersion: v1
kind: Secret
metadata:
  name: depictio-secret
  namespace: depictio-react-test
type: Opaque
stringData:
  # Change these for any non-throwaway use.
  DEPICTIO_MINIO_ROOT_USER: "minio"
  DEPICTIO_MINIO_ROOT_PASSWORD: "minio12345"
---
# ─────────────────────────────────────────────────────────────────────
# MongoDB (ephemeral)
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: depictio-react-test
spec:
  replicas: 1
  selector: { matchLabels: { app: mongo } }
  template:
    metadata: { labels: { app: mongo } }
    spec:
      containers:
        - name: mongo
          image: mongo:8.0.14
          command: ["mongod", "--port", "27018", "--dbpath", "/data/db"]
          ports: [{ containerPort: 27018 }]
          volumeMounts: [{ name: data, mountPath: /data/db }]
          readinessProbe:
            exec:
              command: ["mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: depictio-react-test
spec:
  selector: { app: mongo }
  ports: [{ port: 27018, targetPort: 27018 }]
---
# ─────────────────────────────────────────────────────────────────────
# Redis (ephemeral)
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: depictio-react-test
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:8.2.1
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: depictio-react-test
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
# ─────────────────────────────────────────────────────────────────────
# MinIO (ephemeral, console exposed via port-forward)
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: depictio-react-test
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-01-20T14-49-07Z
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef: { name: depictio-secret }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          volumeMounts: [{ name: data, mountPath: /data }]
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: depictio-react-test
spec:
  selector: { app: minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
# ─────────────────────────────────────────────────────────────────────
# Depictio API (FastAPI)
# Shared screenshots/static_assets PV — single ReadWriteMany emptyDir
# would also work for a single-node cluster; here we use one emptyDir
# per pod since worker writes screenshots to its OWN local path and the
# API only reads back the screenshots THIS pod's worker partner wrote.
# For a real multi-node deploy this needs a shared PVC.
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: depictio-api
  namespace: depictio-react-test
spec:
  replicas: 1
  selector: { matchLabels: { app: depictio-api } }
  template:
    metadata: { labels: { app: depictio-api } }
    spec:
      # Uncomment if the GHCR images are private:
      # imagePullSecrets: [{ name: ghcr-pull }]
      containers:
        - name: api
          image: ghcr.io/depictio/depictio-api:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          command: ["/app/run_fastapi.sh"]
          envFrom:
            - configMapRef: { name: depictio-config }
            - secretRef: { name: depictio-secret }
          ports: [{ containerPort: 8058 }]
          volumeMounts:
            - { name: screenshots, mountPath: /app/depictio/api/static/screenshots }
            - { name: prerender, mountPath: /app/multiqc_prerender }
          readinessProbe:
            httpGet: { path: /depictio/api/v1/utils/status, port: 8058 }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - { name: screenshots, emptyDir: {} }
        - { name: prerender, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: depictio-api
  namespace: depictio-react-test
spec:
  selector: { app: depictio-api }
  ports: [{ port: 8058, targetPort: 8058 }]
---
# ─────────────────────────────────────────────────────────────────────
# Depictio Celery worker
# No Service — worker doesn't accept inbound traffic; it polls Redis.
# Co-locates with API via shared emptyDir IF you wanted screenshot
# delivery; for a true multi-pod setup, replace with a PVC + RWX.
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: depictio-worker
  namespace: depictio-react-test
spec:
  replicas: 1
  selector: { matchLabels: { app: depictio-worker } }
  template:
    metadata: { labels: { app: depictio-worker } }
    spec:
      # imagePullSecrets: [{ name: ghcr-pull }]
      containers:
        - name: worker
          image: ghcr.io/depictio/depictio-worker:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          command: ["/app/run_celery_worker.sh"]
          envFrom:
            - configMapRef: { name: depictio-config }
            - secretRef: { name: depictio-secret }
          volumeMounts:
            - { name: screenshots, mountPath: /app/depictio/api/static/screenshots }
            - { name: prerender, mountPath: /app/multiqc_prerender }
      volumes:
        - { name: screenshots, emptyDir: {} }
        - { name: prerender, emptyDir: {} }
---
# ─────────────────────────────────────────────────────────────────────
# Depictio Viewer (nginx + React SPA)
# Proxies /depictio/api/* and /static/* to depictio-api:8058 per
# docker-images/nginx.conf.
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: depictio-viewer
  namespace: depictio-react-test
spec:
  replicas: 1
  selector: { matchLabels: { app: depictio-viewer } }
  template:
    metadata: { labels: { app: depictio-viewer } }
    spec:
      # imagePullSecrets: [{ name: ghcr-pull }]
      containers:
        - name: viewer
          image: ghcr.io/depictio/depictio-viewer:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /dashboard-beta/, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: depictio-viewer
  namespace: depictio-react-test
spec:
  selector: { app: depictio-viewer }
  ports: [{ port: 80, targetPort: 80 }]
